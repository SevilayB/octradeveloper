    ['best-for','Best for',`<div class="grid"><div class="card"><h3>Faster authentication setup</h3><p>Useful when the integrator does not want to operate its own 3DS Server.</p></div><div class="card"><h3>Octra-hosted checkout</h3><p>A natural fit where Octra controls the hosted payment experience.</p></div><div class="card"><h3>Consistent Gateway flow</h3><p>Authentication, authorization and result handling are connected through the Gateway journey.</p></div><div class="card"><h3>Central operational support</h3><p>Support teams can follow authentication and payment outcomes in one operational model.</p></div></div>`],
    ['flow','Octra-managed 3DS flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Payment is initiated</h3><p>The merchant, PSP or platform starts the payment through the selected checkout model.</p></div></div><div class="step"><div class="num">2</div><div><h3>3DS is triggered when required</h3><p>Octra connects the payment flow to the supported 3DS authentication path.</p></div></div><div class="step"><div class="num">3</div><div><h3>Authentication outcome is produced</h3><p>The outcome may be frictionless, challenge completed, failed or abandoned.</p></div></div><div class="step"><div class="num">4</div><div><h3>Payment continues</h3><p>The payment is authorized, completed or stopped depending on the authentication outcome and payment rules.</p></div></div></div>`]
  ]},
  'gateway-own-3ds-server':{area:'Product Guides / Payment Gateway',label:'Use your own 3DS Server',eyebrow:'Authentication and Stored Credentials',title:'Use your own 3DS Server',subtitle:'Perform authentication through your existing 3DS Server and submit the authentication result with the payment request.',sections:[
    ['model','Model',`<p class="lead">In the integrator-managed model, the merchant, PSP or platform performs 3DS authentication outside the Octra-managed 3DS flow. The integrator then submits the required authentication result values with the payment authorization or Sale request.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Clear responsibility boundary</strong><p>If the integrator uses its own 3DS Server, Octra does not own the cardholder authentication flow. The integrator is responsible for performing authentication correctly and providing the required authentication result data in the payment request.</p></div></div>`],
    ['best-for','Best for',`<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>Why this model fits</th></tr></thead><tbody><tr><td><strong>Existing 3DS provider</strong></td><td>The integrator already has a certified 3DS Server or authentication provider.</td></tr><tr><td><strong>PSP portfolio model</strong></td><td>The PSP centralizes 3DS authentication across multiple merchants.</td></tr><tr><td><strong>Merchant-hosted checkout</strong></td><td>The merchant or platform controls checkout UI and authentication continuation.</td></tr><tr><td><strong>Custom risk strategy</strong></td><td>The integrator wants to manage authentication logic as part of its own risk and compliance model.</td></tr></tbody></table></div>`],
    ['flow','Own 3DS Server flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Customer starts checkout</h3><p>The customer starts payment in the merchant, PSP or platform checkout experience.</p></div></div><div class="step"><div class="num">2</div><div><h3>Integrator performs 3DS</h3><p>The integrator authenticates the customer through its own 3DS Server or provider.</p></div></div><div class="step"><div class="num">3</div><div><h3>Authentication data is captured</h3><p>The authentication outcome and required values are prepared for authorization.</p></div></div><div class="step"><div class="num">4</div><div><h3>Payment is submitted to Octra</h3><p>The payment request is sent to Octra Gateway with the required authentication result data.</p></div></div><div class="step"><div class="num">5</div><div><h3>Authorization continues</h3><p>Octra processes the payment request according to the provided authentication data and payment rules.</p></div></div></div>`]
  ]},
  'gateway-sca-exemptions':{area:'Product Guides / Payment Gateway',label:'SCA exemptions',eyebrow:'Authentication, Risk and Stored Credentials',title:'SCA exemptions',subtitle:'Understand how Strong Customer Authentication exemptions and out-of-scope indicators affect eligible payment flows.',sections:[
    ['purpose','Purpose',`<p class="lead">Strong Customer Authentication is important for eligible electronic payments in regulated markets such as Europe and the UK. SCA may require the customer to complete additional authentication before a payment can be authorized or completed.</p><p>Exemptions may reduce customer friction for eligible transactions, but an exemption does not guarantee a frictionless payment. The issuer, acquirer, scheme rules, region and transaction risk can still require a challenge or decline the transaction.</p>`],
    ['exemption-types','Supported exemption concepts',`<div class="table-wrap"><table><thead><tr><th>Concept</th><th>Typical use</th><th>Important handling rule</th></tr></thead><tbody><tr><td><strong>Low-value payment</strong></td><td>An eligible low-value transaction may request exemption handling within applicable regulatory limits.</td><td>Cumulative amount or transaction-count rules may still trigger authentication.</td></tr><tr><td><strong>Transaction Risk Analysis (TRA)</strong></td><td>An eligible transaction may request exemption handling based on risk analysis and the configured acquirer model.</td><td>Availability depends on amount thresholds, fraud performance, acquirer support and issuer decisioning.</td></tr><tr><td><strong>Trusted beneficiary</strong></td><td>A cardholder may identify a merchant as trusted through an issuer-controlled process.</td><td>The issuer controls the trusted-beneficiary relationship and may still require authentication.</td></tr><tr><td><strong>Secure corporate payment</strong></td><td>Eligible corporate payment processes may receive specific exemption treatment.</td><td>The payment instrument and process must meet the applicable requirements.</td></tr><tr><td><strong>Recurring / MIT context</strong></td><td>Subsequent merchant-initiated recurring payments may be treated as out of scope after a correctly established initial agreement.</td><td>The initial customer-initiated transaction, consent, authentication and recurring references must be handled correctly.</td></tr><tr><td><strong>Issuer-applied exemption</strong></td><td>The issuer may allow a transaction to proceed without a challenge based on its own risk and rules.</td><td>The integration must still handle challenge, soft decline or decline outcomes.</td></tr></tbody></table></div>`],
    ['flow','Exemption decision flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Determine SCA scope</h3><p>Evaluate region, transaction type, customer presence, stored credential context and regulatory applicability.</p></div></div><div class="step"><div class="num">2</div><div><h3>Select eligible exemption context</h3><p>Use only the exemption or out-of-scope indicator supported by the merchant, acquirer and payment configuration.</p></div></div><div class="step"><div class="num">3</div><div><h3>Submit the payment context</h3><p>Send the configured exemption, 3DS and stored credential information through the supported Gateway request.</p></div></div><div class="step"><div class="num">4</div><div><h3>Handle issuer decision</h3><p>Continue on approval, perform a challenge after a soft decline where supported, or return the decline outcome.</p></div></div></div>`],
    ['guidance','Guide-level wording',`<div class="notice"><div class="callout-icon">!</div><div><strong>Do not promise frictionless approval.</strong><p>SCA exemption handling should be described as eligibility and request/decision handling, not as a guaranteed bypass of authentication. Configuration, regional scope and acquiring responsibilities must be confirmed before production.</p></div></div>`]
  ]},
  'gateway-avs':{area:'Product Guides / Payment Gateway',label:'Address Verification Service (AVS)',eyebrow:'Authentication, Risk and Stored Credentials',title:'Address Verification Service (AVS)',subtitle:'Compare submitted billing address information with issuer records and use the result in payment risk decisions.',sections:[
    ['overview','Overview',`<p class="lead">Octra Payment Gateway supports Address Verification Service for eligible card, merchant, acquirer and regional configurations. AVS compares supported billing address elements, commonly the street number and postal code, with information available to the card issuer and returns a verification result with the payment response.</p><div class="notice"><div class="callout-icon">!</div><div><strong>AVS is a risk signal, not authentication.</strong><p>An AVS match does not prove cardholder identity, and a mismatch does not always mean fraud. Use AVS together with 3DS, CVV, device, velocity and other configured risk controls.</p></div></div>`],
    ['flow','AVS flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Collect billing address</h3><p>The checkout collects the supported address fields required for the configured AVS flow.</p></div></div><div class="step"><div class="num">2</div><div><h3>Submit with the payment</h3><p>The trusted backend sends the billing address with the payment and merchant context.</p></div></div><div class="step"><div class="num">3</div><div><h3>Issuer comparison occurs</h3><p>Supported address elements are compared with the issuer's available cardholder records.</p></div></div><div class="step"><div class="num">4</div><div><h3>Evaluate the result</h3><p>The merchant or configured risk rules use the AVS result alongside authorization and other risk signals.</p></div></div></div>`],
    ['results','AVS result categories',`<div class="table-wrap"><table><thead><tr><th>Result category</th><th>Meaning</th><th>Recommended treatment</th></tr></thead><tbody><tr><td><strong>Match</strong></td><td>Supported address elements match the issuer information.</td><td>Continue evaluating authorization and the remaining risk signals.</td></tr><tr><td><strong>Partial match</strong></td><td>Some supported elements match while others do not.</td><td>Apply the merchant's configured review, challenge or acceptance policy.</td></tr><tr><td><strong>No match</strong></td><td>The submitted supported elements do not match.</td><td>Use the configured risk policy; do not expose issuer data to the customer.</td></tr><tr><td><strong>Unavailable / unsupported</strong></td><td>The issuer, card, region or transaction did not provide an AVS comparison.</td><td>Do not treat an unavailable result as an automatic mismatch.</td></tr><tr><td><strong>Not checked</strong></td><td>AVS was not requested or was not applicable to the payment.</td><td>Continue according to the payment method and risk configuration.</td></tr></tbody></table></div>`],
    ['testing','Recommended tests',`<div class="pill-row"><span class="pill">Full match</span><span class="pill">Postal code only match</span><span class="pill">Street only match</span><span class="pill">No match</span><span class="pill">Unavailable</span><span class="pill">Missing optional fields</span><span class="pill">3DS + AVS</span><span class="pill">Decline handling</span></div>`]
  ]},
  'gateway-credential-on-file':{area:'Product Guides / Payment Gateway',label:'Credential-on-file',eyebrow:'Authentication and Stored Credentials',title:'Credential-on-file',subtitle:'Identify stored credential payments correctly across initial and subsequent transactions.',sections:[
    ['purpose','Purpose',`<p class="lead">Credential-on-file is used when a customer's payment credential is stored, tokenized or referenced for future payments. Correct classification is important for authorization, authentication, compliance, dispute handling and scheme requirements.</p>`],
    ['lifecycle','COF lifecycle',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Initial customer-initiated transaction</h3><p>The customer is present and agrees to the payment and, where applicable, storing or reusing the credential.</p></div></div><div class="step"><div class="num">2</div><div><h3>Credential reference is stored</h3><p>A token, reference or stored credential indicator is retained according to the agreed model.</p></div></div><div class="step"><div class="num">3</div><div><h3>Future transaction uses the credential</h3><p>Subsequent payments must be classified correctly as customer-initiated or merchant-initiated.</p></div></div></div>`],
    ['types','Stored credential transaction types',`<div class="table-wrap"><table><thead><tr><th>Type</th><th>Meaning</th><th>Example</th></tr></thead><tbody><tr><td><strong>Initial CIT</strong></td><td>Customer is actively present and initiates the first transaction.</td><td>Customer saves card during checkout.</td></tr><tr><td><strong>Subsequent CIT</strong></td><td>Customer is present and chooses a stored credential for a later payment.</td><td>Customer selects saved card at checkout.</td></tr><tr><td><strong>MIT</strong></td><td>Merchant initiates payment without the customer actively present, based on prior agreement.</td><td>Recurring billing, installment, delayed charge or unscheduled payment.</td></tr></tbody></table></div>`]
  ]},
  'gateway-recurring-mit':{area:'Product Guides / Payment Gateway',label:'Subscriptions and recurring payments',eyebrow:'Authentication, Risk and Stored Credentials',title:'Subscriptions and recurring payments',subtitle:'Build recurring billing and merchant-initiated payment flows after establishing customer consent and the initial stored credential relationship.',sections:[
    ['purpose','Purpose',`<p class="lead">Octra Payment Gateway supports subscription, recurring and merchant-initiated payment scenarios. A correct integration establishes the agreement during an initial customer-initiated transaction, stores or references the credential securely, and classifies every subsequent payment according to scheme, acquirer and regional requirements.</p>`],
    ['lifecycle','Subscription lifecycle',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Create the subscription agreement</h3><p>Show the amount or calculation method, billing frequency, cancellation terms and how the payment credential will be used.</p></div></div><div class="step"><div class="num">2</div><div><h3>Complete the initial customer payment</h3><p>Process the initial customer-initiated transaction and perform 3DS or SCA when required.</p></div></div><div class="step"><div class="num">3</div><div><h3>Store the credential reference</h3><p>Retain the supported token or credential reference and the original transaction relationship; do not store sensitive card data outside the agreed model.</p></div></div><div class="step"><div class="num">4</div><div><h3>Submit recurring payments</h3><p>Send subsequent payments with the correct recurring or MIT classification and required original relationship reference.</p></div></div><div class="step"><div class="num">5</div><div><h3>Manage the subscription</h3><p>Handle retries, updated credentials, plan changes, customer cancellation, final payment state and operational reconciliation.</p></div></div></div>`],
    ['examples','Supported scenarios',`<div class="grid"><div class="card"><h3>Fixed subscription</h3><p>Charge a fixed amount on an agreed daily, weekly, monthly or annual schedule.</p></div><div class="card"><h3>Variable recurring billing</h3><p>Charge an amount that can vary according to usage or the customer agreement.</p></div><div class="card"><h3>Installment payment</h3><p>Collect a planned series of payments linked to an initial purchase or agreement.</p></div><div class="card"><h3>Unscheduled credential-on-file</h3><p>Initiate payments whose timing or amount is not fixed but is covered by the customer agreement.</p></div></div>`],
    ['responsibilities','Responsibilities',`<div class="table-wrap"><table><thead><tr><th>Responsibility</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Capture customer consent</strong></td><td>The initial transaction must establish clear permission for future charges and describe cancellation terms.</td></tr><tr><td><strong>Classify every transaction</strong></td><td>CIT, recurring and MIT indicators affect authorization, SCA treatment, scheme processing and disputes.</td></tr><tr><td><strong>Reference the initial relationship</strong></td><td>Subsequent payments should link to the original credential, agreement or transaction where required.</td></tr><tr><td><strong>Protect stored credentials</strong></td><td>Use the supported token or reference model and avoid storing sensitive card data outside the agreed PCI scope.</td></tr><tr><td><strong>Manage cancellation and retries</strong></td><td>Stop future charges promptly after cancellation and use controlled retry rules for declined payments.</td></tr></tbody></table></div>`],
    ['testing','Recommended tests',`<div class="pill-row"><span class="pill">Initial CIT + consent</span><span class="pill">Initial 3DS/SCA</span><span class="pill">Fixed recurring payment</span><span class="pill">Variable recurring payment</span><span class="pill">Expired credential</span><span class="pill">Soft decline</span><span class="pill">Controlled retry</span><span class="pill">Plan change</span><span class="pill">Cancellation</span></div>`]
  ]},

  'gateway-manage-payments':{area:'Product Guides / Payment Gateway',label:'Manage payments overview',eyebrow:'Manage Payments',title:'Manage payments after authorization',subtitle:'Use Octra Payment Gateway operations to investigate payment outcomes, complete eligible authorizations, cancel reversible payments, refund completed payments and manage batch-level workflows.',sections:[
    ['purpose','What Manage Payments covers',`<p class="lead">Creating a payment is only the start of the payment lifecycle. After the payment is initiated, Octra Payment Gateway provides operational tools to confirm status, complete eligible authorizations, cancel payments that are still reversible, return funds through refunds, investigate unclear outcomes and operate batch-level workflows where applicable.</p><p>Manage Payments should be used by developers, operations teams, customer support and finance teams to keep merchant order state, payment state and downstream operational records aligned.</p>`],
    ['operations-matrix','Payment operations matrix',`<div class="table-wrap"><table><thead><tr><th>Operation</th><th>When to use</th><th>Typical state</th><th>Financial impact</th><th>Recommended next action</th></tr></thead><tbody><tr><td><strong>Status inquiry</strong></td><td>Final result is unclear, timeout occurred or customer return is uncertain.</td><td>Any uncertain state</td><td>No direct financial impact.</td><td>Confirm latest state before retrying or updating the order.</td></tr><tr><td><strong>Capture / PostAuth</strong></td><td>A previously authorized payment must be completed.</td><td>Authorized</td><td>Moves the payment toward completion according to the supported model.</td><td>Confirm capture result and update the order.</td></tr><tr><td><strong>Void</strong></td><td>An eligible payment should be cancelled before the completion or settlement path has progressed.</td><td>Authorized or otherwise reversible, depending on model</td><td>Prevents or reverses completion where supported.</td><td>Do not refund if the void is successful.</td></tr><tr><td><strong>Refund</strong></td><td>Funds must be returned after payment completion or settlement.</td><td>Completed or settled</td><td>Creates a financial return to the customer according to the supported model.</td><td>Track refund result and update operations records.</td></tr><tr><td><strong>Transaction detail</strong></td><td>Support, finance or technical teams need to investigate the payment.</td><td>Any state</td><td>No direct financial impact.</td><td>Review identifiers, status, references and action history.</td></tr><tr><td><strong>Batch list</strong></td><td>Merchant or terminal processing groups need to be reviewed.</td><td>Open or closed batch</td><td>No direct financial impact.</td><td>Decide whether the batch is ready to close.</td></tr><tr><td><strong>Close batch</strong></td><td>The merchant or terminal processing window is complete.</td><td>Open batch</td><td>Prepares downstream processing; it is not settlement.</td><td>Continue downstream acquiring, settlement and reconciliation flow.</td></tr></tbody></table></div>`],
    ['state-transition','Payment state and available actions',`<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Payment created</strong><p>The payment attempt is created through merchant-hosted or Octra-hosted checkout.</p></div><div class="flow-box"><strong>Authentication state</strong><p>3DS may be required, completed, failed or abandoned before authorization continues.</p></div><div class="flow-box primary"><strong>Authorized</strong><p>The payment is approved but may still require capture or may be eligible for void.</p></div><div class="flow-box"><strong>Captured / Sale completed</strong><p>The payment moves into completion and downstream operational processing.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box"><strong>Unknown / timeout</strong><p>Use status inquiry before retrying or changing order state.</p></div><div class="flow-box"><strong>Void path</strong><p>Use void only while the payment is still reversible under the supported model.</p></div><div class="flow-box"><strong>Refund path</strong><p>Use refund after the payment has completed or settled according to the model.</p></div><div class="flow-box"><strong>Batch path</strong><p>Review batch list and close batch before downstream acquiring and reconciliation where applicable.</p></div></div></div>`],
    ['principles','Operational principles',`<div class="grid"><div class="card"><h3>Confirm before retry</h3><p>When the final result is unclear, use status inquiry before creating another payment attempt.</p></div><div class="card"><h3>Use the right reversal path</h3><p>Void applies to reversible payments; refund applies after completion or settlement according to the supported model.</p></div><div class="card"><h3>Track every action</h3><p>Operations teams should be able to see captures, voids, refunds, inquiries and batch actions as payment history.</p></div><div class="card"><h3>Keep boundaries clear</h3><p>Gateway manages payment operations; settlement accounting, reconciliation and disputes continue in Acquiring or Processing.</p></div></div>`]
  ]},

  'gateway-transactions':{area:'Product Guides / Payment Gateway',label:'Transactions and payment details',eyebrow:'Manage Payments',title:'Transactions and payment details',subtitle:'Use transaction detail to investigate payment outcomes, operational actions and downstream references.',sections:[
    ['usage','How transaction data is used',`<p class="lead">Transaction records help support teams, finance teams and integrators understand what happened to a payment after it was created. A transaction detail view should connect customer checkout, merchant order state, authentication outcome, authorization result, follow-up actions and downstream operational references.</p>`],
    ['detail-fields','What payment detail should show',`<div class="table-wrap"><table><thead><tr><th>Information area</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Payment identifiers</strong></td><td>Used to investigate, reconcile and reference the payment across systems.</td></tr><tr><td><strong>Merchant and order references</strong></td><td>Connect the payment to the merchant order, PSP reference or platform seller context.</td></tr><tr><td><strong>Amount and currency</strong></td><td>Supports operational review, finance checks and refund validation.</td></tr><tr><td><strong>Payment status</strong></td><td>Shows whether the payment is approved, declined, pending, voided, refunded or unknown.</td></tr><tr><td><strong>Authentication status</strong></td><td>Shows 3DS frictionless, challenge, failed or abandoned outcomes where applicable.</td></tr><tr><td><strong>Authorization and capture result</strong></td><td>Explains whether the payment was only authorized, completed as Sale or captured later.</td></tr><tr><td><strong>Void and refund actions</strong></td><td>Shows post-payment actions and their results.</td></tr><tr><td><strong>Batch reference</strong></td><td>Links the transaction to batch review or close-batch workflows where applicable.</td></tr><tr><td><strong>Downstream reference</strong></td><td>Links Gateway activity to acquiring, processing, reporting or reconciliation outputs where applicable.</td></tr></tbody></table></div>`],
    ['action-history','Action history',`<p class="lead">Transaction detail should not be a static record only. It should show a timeline of payment actions such as creation, authentication, authorization, capture, inquiry, void, refund, batch assignment and batch close where those actions apply.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Operational visibility matters.</strong><p>Support and finance teams need to understand not only the current status, but also how the payment reached that status.</p></div></div>`]
  ]},

  'gateway-status-inquiry':{area:'Product Guides / Payment Gateway',label:'Payment status inquiry',eyebrow:'Manage Payments',title:'Payment status inquiry',subtitle:'Use inquiry as the operational playbook for timeout handling, duplicate prevention and unclear payment outcomes.',sections:[
    ['when','When to use inquiry',`<div class="table-wrap"><table><thead><tr><th>Situation</th><th>Why inquiry is required</th></tr></thead><tbody><tr><td><strong>API response timed out</strong></td><td>The payment may have succeeded, failed or remained pending even if the integrator did not receive the response.</td></tr><tr><td><strong>Customer browser returned late</strong></td><td>The browser return path may not reflect the final payment state.</td></tr><tr><td><strong>Hosted checkout result is unclear</strong></td><td>The merchant should confirm the payment result from the backend before marking the order as paid or failed.</td></tr><tr><td><strong>Network connection failed</strong></td><td>The payment attempt may still exist in the Gateway even if the merchant system lost connection.</td></tr><tr><td><strong>Order state and payment state do not match</strong></td><td>Inquiry helps align merchant order records with the actual payment outcome.</td></tr><tr><td><strong>Support team investigates a payment</strong></td><td>Inquiry provides the latest known payment status before operational action is taken.</td></tr></tbody></table></div>`],
    ['playbook','Timeout and retry playbook',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Do not assume failure</h3><p>A timeout or unclear response does not prove the payment failed.</p></div></div><div class="step"><div class="num">2</div><div><h3>Retrieve latest status</h3><p>Use payment status inquiry with the original payment or order reference.</p></div></div><div class="step"><div class="num">3</div><div><h3>Update order state</h3><p>Mark the order as paid, failed, pending or requiring support action based on the returned status.</p></div></div><div class="step"><div class="num">4</div><div><h3>Retry only when safe</h3><p>Create a new payment attempt only after the previous attempt is confirmed as failed, cancelled or otherwise not successful.</p></div></div></div>`],
    ['warning','Duplicate prevention rule',`<div class="notice"><div class="callout-icon">!</div><div><strong>Check before retrying.</strong><p>Do not create a new payment attempt before checking the latest status of the previous attempt when the result is unclear. This reduces the risk of duplicate charges and inconsistent order state.</p></div></div>`]
  ]},

  'gateway-capture-postauth':{area:'Product Guides / Payment Gateway',label:'Capture / PostAuth',eyebrow:'Manage Payments',title:'Capture / PostAuth',subtitle:'Complete an eligible previously authorized payment according to the supported payment model.',sections:[
    ['purpose','Purpose',`<p class="lead">Capture or PostAuth is used when authorization and payment completion happen separately. A previous PreAuth reserves or authorizes the amount, and a later Capture/PostAuth completes the payment according to the supported model.</p>`],
    ['when','When to use Capture / PostAuth',`<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>Why capture is used</th></tr></thead><tbody><tr><td><strong>Delayed fulfillment</strong></td><td>The merchant authorizes first and captures after goods or services are confirmed.</td></tr><tr><td><strong>Final amount confirmation</strong></td><td>The merchant needs to confirm the final amount before completion where supported.</td></tr><tr><td><strong>Operational control</strong></td><td>The merchant separates approval from completion to align with business process.</td></tr></tbody></table></div>`],
    ['flow','Capture flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>PreAuth is approved</h3><p>The payment is authorized but not yet completed as a captured transaction.</p></div></div><div class="step"><div class="num">2</div><div><h3>Merchant decides to complete</h3><p>The order, fulfillment or final amount is confirmed according to the merchant process.</p></div></div><div class="step"><div class="num">3</div><div><h3>Capture/PostAuth is submitted</h3><p>The capture request references the original authorization according to API rules.</p></div></div><div class="step"><div class="num">4</div><div><h3>Result is confirmed</h3><p>The merchant updates order state and continues downstream operations based on the capture result.</p></div></div></div>`],
    ['boundary','Boundary',`<div class="notice"><div class="callout-icon">→</div><div><strong>Capture is not a refund or void.</strong><p>Capture completes a previous authorization. If the merchant wants to cancel an eligible authorization, use void. If the payment has already completed or settled, use refund where supported.</p></div></div>`]
  ]},

  'gateway-void-payment':{area:'Product Guides / Payment Gateway',label:'Void a payment',eyebrow:'Manage Payments',title:'Void a payment',subtitle:'Cancel an eligible payment before it moves beyond the supported void window.',sections:[
    ['purpose','Purpose',`<p class="lead">Void is used to cancel an eligible payment while it is still reversible under the supported payment model. It is typically used before the payment has moved into a completed or settled state.</p>`],
    ['when','When void is the right action',`<div class="table-wrap"><table><thead><tr><th>Use void when...</th><th>Do not use void when...</th></tr></thead><tbody><tr><td>The payment is authorized but should not be completed.</td><td>The payment has already completed or settled and requires funds to be returned.</td></tr><tr><td>The customer cancelled before fulfillment or completion.</td><td>The operation is actually a customer refund after a completed payment.</td></tr><tr><td>The merchant detects an order issue before capture or completion.</td><td>The transaction is under chargeback or dispute handling.</td></tr></tbody></table></div>`],
    ['principles','Void principles',`<div class="notice"><div class="callout-icon">!</div><div><strong>Void before refund when eligible.</strong><p>If a payment can still be voided successfully, void is normally the cleaner operational action. If the payment is already completed or settled, refund may be required instead.</p></div></div>`]
  ]},

  'gateway-refund-payment':{area:'Product Guides / Payment Gateway',label:'Refund a payment',eyebrow:'Manage Payments',title:'Refund a payment',subtitle:'Return funds for a completed or settled payment according to the supported refund model.',sections:[
    ['purpose','Purpose',`<p class="lead">Refund is a post-completion payment lifecycle action. Use refund when funds must be returned to the customer after a payment has been completed or settled according to the supported model.</p>`],
    ['when','When refund is the right action',`<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>Refund behavior</th></tr></thead><tbody><tr><td><strong>Customer return or cancellation after completion</strong></td><td>Refund returns the payment amount or eligible portion according to merchant policy and supported rules.</td></tr><tr><td><strong>Partial service or order adjustment</strong></td><td>Partial refund may be used where supported by the payment model.</td></tr><tr><td><strong>Operational correction</strong></td><td>Refund may correct a completed payment when void is no longer available.</td></tr></tbody></table></div>`],
    ['not-dispute','Refund is not dispute handling',`<div class="notice"><div class="callout-icon">i</div><div><strong>Chargeback is not refund.</strong><p>A refund is merchant-initiated. Chargeback and dispute operations belong to the Acquiring guide because they involve issuer, scheme, merchant response and financial adjustment workflows.</p></div></div>`]
  ]},

  'gateway-void-refund-decision':{area:'Product Guides / Payment Gateway',label:'Void vs refund decision guide',eyebrow:'Manage Payments',title:'Void vs refund decision guide',subtitle:'Choose the right follow-up action based on payment state, timing and financial impact.',sections:[
    ['decision-table','Decision table',`<div class="table-wrap"><table><thead><tr><th>Question</th><th>Use void</th><th>Use refund</th><th>Use inquiry first</th></tr></thead><tbody><tr><td><strong>Is the payment status unclear?</strong></td><td>No</td><td>No</td><td>Yes. Confirm the latest status before action.</td></tr><tr><td><strong>Was the payment only authorized?</strong></td><td>Usually yes, if still reversible.</td><td>No, unless already completed according to the model.</td><td>Use inquiry if you are not sure.</td></tr><tr><td><strong>Was the payment completed or settled?</strong></td><td>Usually no.</td><td>Yes, where supported.</td><td>Use inquiry if completion state is unclear.</td></tr><tr><td><strong>Is the customer disputing the transaction?</strong></td><td>No</td><td>Maybe, if merchant chooses to refund.</td><td>Chargeback/dispute belongs to Acquiring.</td></tr><tr><td><strong>Was a previous void or refund already attempted?</strong></td><td>Check action history first.</td><td>Check action history first.</td><td>Yes. Prevent duplicate operational actions.</td></tr></tbody></table></div>`],
    ['decision-flow','Decision flow',`<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Need to reverse or return?</strong><p>Start by identifying the latest payment state.</p></div><div class="flow-box"><strong>Status unclear?</strong><p>Use inquiry before taking any financial action.</p></div><div class="flow-box"><strong>Authorized only?</strong><p>Void if eligible under the supported model.</p></div><div class="flow-box"><strong>Completed or settled?</strong><p>Refund where supported and record the result.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box primary"><strong>Update order state</strong><p>Keep merchant order state aligned with payment action result.</p></div><div class="flow-box"><strong>Track history</strong><p>Record inquiry, void, refund and related references.</p></div><div class="flow-box"><strong>Review batch impact</strong><p>Check whether the action affects batch or downstream operations.</p></div><div class="flow-box"><strong>Escalate disputes</strong><p>Use Acquiring dispute workflows for chargebacks.</p></div></div></div>`]
  ]},

  'gateway-action-history':{area:'Product Guides / Payment Gateway',label:'Payment action history',eyebrow:'Manage Payments',title:'Payment action history',subtitle:'Track the sequence of actions that changed or confirmed a payment state.',sections:[
    ['purpose','Purpose',`<p class="lead">Payment action history gives support, finance and technical teams a timeline of what happened to the payment. It reduces investigation time and helps prevent duplicate operational actions.</p>`],
    ['events','Events to track',`<div class="table-wrap"><table><thead><tr><th>Event</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Payment created</strong></td><td>Shows when the payment attempt started and which order or merchant reference was used.</td></tr><tr><td><strong>Authentication action</strong></td><td>Shows whether 3DS was required, completed, failed or abandoned.</td></tr><tr><td><strong>Authorization result</strong></td><td>Shows whether the payment was approved, declined or pending.</td></tr><tr><td><strong>Capture/PostAuth</strong></td><td>Shows completion of a previous authorization.</td></tr><tr><td><strong>Status inquiry</strong></td><td>Shows when the latest state was checked after timeout or uncertainty.</td></tr><tr><td><strong>Void</strong></td><td>Shows whether an eligible payment was cancelled successfully.</td></tr><tr><td><strong>Refund</strong></td><td>Shows returned amount, timing and result.</td></tr><tr><td><strong>Batch action</strong></td><td>Shows batch list, assignment or close-batch activity where applicable.</td></tr></tbody></table></div>`],
    ['audit','Operational audit principle',`<div class="notice"><div class="callout-icon">i</div><div><strong>Action history supports operations.</strong><p>It should be possible to answer who or what triggered an action, when it happened, what reference it used and how the payment state changed.</p></div></div>`]
  ]},

  'gateway-batch-lifecycle':{area:'Product Guides / Payment Gateway',label:'Batch lifecycle',eyebrow:'Manage Payments',title:'Batch lifecycle',subtitle:'Understand how payment transactions are grouped for merchant or terminal operational handling.',sections:[
    ['concept','What is a batch?',`<p class="lead">A batch groups payment transactions for a merchant, terminal or processing window. It helps integrators and operations teams review transaction activity before closing the batch where that workflow is required.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Batch close is not settlement.</strong><p>Batch close prepares a group of transactions for downstream operational processing. Settlement and reconciliation are explained under Acquiring and Processing.</p></div></div>`],
    ['batch-flow','Batch operating flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Transactions are accepted</h3><p>Payments accumulate under a merchant, terminal or processing window.</p></div></div><div class="step"><div class="num">2</div><div><h3>Batch is reviewed</h3><p>Operations teams use batch list and transaction detail to review open batch activity.</p></div></div><div class="step"><div class="num">3</div><div><h3>Batch is closed</h3><p>The processing window is closed when the transaction group is ready for downstream handling.</p></div></div><div class="step"><div class="num">4</div><div><h3>Downstream operations continue</h3><p>Acquiring, processing, settlement and reconciliation continue according to the customer model.</p></div></div></div>`],
    ['batch-attributes','Batch attributes to expose',`<div class="table-wrap"><table><thead><tr><th>Attribute</th><th>Purpose</th></tr></thead><tbody><tr><td><strong>Merchant / terminal</strong></td><td>Identifies the operating context of the batch.</td></tr><tr><td><strong>Batch number</strong></td><td>Provides a unique operational reference.</td></tr><tr><td><strong>Open / closed status</strong></td><td>Shows whether more transactions can be added or whether the window is finalized.</td></tr><tr><td><strong>Transaction count</strong></td><td>Supports operational review before close.</td></tr><tr><td><strong>Total amount and currency</strong></td><td>Supports finance and downstream reconciliation review.</td></tr><tr><td><strong>Created / closed date</strong></td><td>Supports end-of-day, settlement and investigation workflows.</td></tr><tr><td><strong>Downstream processing status</strong></td><td>Shows whether the closed batch has moved into later operational layers where available.</td></tr></tbody></table></div>`]
  ]},

  'gateway-batch-list':{area:'Product Guides / Payment Gateway',label:'Batch list',eyebrow:'Manage Payments',title:'Batch list',subtitle:'Retrieve available batches for merchant, terminal or processing-period review.',sections:[
    ['purpose','Purpose',`<p class="lead">Use Batch List to identify open or closed batches and review their status before performing operational actions such as close batch, transaction investigation or end-of-day checks.</p>`],
    ['when','When to use Batch List',`<div class="table-wrap"><table><thead><tr><th>Situation</th><th>Why Batch List helps</th></tr></thead><tbody><tr><td><strong>End-of-day review</strong></td><td>Confirm which batches remain open before closing the processing window.</td></tr><tr><td><strong>Terminal investigation</strong></td><td>Find batches connected to a specific merchant or terminal.</td></tr><tr><td><strong>Operational exception</strong></td><td>Check whether a transaction belongs to an open or closed batch.</td></tr><tr><td><strong>Pre-settlement preparation</strong></td><td>Review transaction grouping before downstream acquiring and settlement processes continue.</td></tr></tbody></table></div>`],
    ['fields','Recommended batch list fields',`<div class="pill-row"><span class="pill">Merchant</span><span class="pill">Terminal / TID</span><span class="pill">Batch number</span><span class="pill">Open / closed</span><span class="pill">Transaction count</span><span class="pill">Total amount</span><span class="pill">Currency</span><span class="pill">Created date</span><span class="pill">Closed date</span></div>`]
  ]},

  'gateway-close-batch':{area:'Product Guides / Payment Gateway',label:'Close a batch',eyebrow:'Manage Payments',title:'Close a batch',subtitle:'Close an open merchant or terminal batch after the processing window is complete.',sections:[
    ['purpose','Purpose',`<p class="lead">Close a batch when the relevant merchant or terminal processing window is complete and the transaction group is ready for downstream operational handling.</p><div class="notice"><div class="callout-icon">→</div><div><strong>Operational boundary</strong><p>Closing a batch does not mean funds have been settled to the merchant. It is a gateway operation that supports downstream acquiring, processing and reconciliation flows.</p></div></div>`],
    ['workflow','Close batch workflow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Review open batch</h3><p>Use Batch List and transaction detail to verify the batch contents.</p></div></div><div class="step"><div class="num">2</div><div><h3>Close the batch</h3><p>Close the merchant or terminal processing window according to operational rules.</p></div></div><div class="step"><div class="num">3</div><div><h3>Confirm close result</h3><p>Record the close result and batch reference for downstream processing.</p></div></div><div class="step"><div class="num">4</div><div><h3>Continue downstream</h3><p>Settlement, reconciliation and reporting continue in Acquiring or Processing depending on the customer model.</p></div></div></div>`],
    ['before-close','Before closing a batch',`<div class="table-wrap"><table><thead><tr><th>Check</th><th>Reason</th></tr></thead><tbody><tr><td><strong>Batch is open</strong></td><td>Only open batches should be submitted for close-batch action.</td></tr><tr><td><strong>Merchant and terminal are correct</strong></td><td>Prevents closing the wrong processing window.</td></tr><tr><td><strong>Transaction count and amount are reviewed</strong></td><td>Supports operational control before downstream processing.</td></tr><tr><td><strong>Unclear transaction states are investigated</strong></td><td>Inquiry should be used before close if transaction outcomes are uncertain.</td></tr></tbody></table></div>`]
  ]},

  'gateway-request-signing':{area:'Product Guides / Payment Gateway',label:'Request signing',eyebrow:'Build Your Integration',title:'Request signing',subtitle:'Secure Gateway requests with the assigned credential and signing model.',sections:[
    ['why','Why signing matters',`<p class="lead">Gateway requests can create or modify payment activity. Request signing helps ensure the request came from the expected integrator and was not changed in transit.</p>`]
  ]},
  'gateway-server-to-server':{area:'Product Guides / Payment Gateway',label:'Server-to-server integration',eyebrow:'Build Your Integration',title:'Server-to-server integration',subtitle:'Connect your backend to Octra Gateway APIs using signed server-side requests.',sections:[
    ['model','Model',`<p class="lead">Server-to-server integration is the technical foundation for customer-owned payment flows. The merchant, PSP or platform backend prepares the order, amount, currency, merchant context and payment references, then sends signed requests to Octra Payment Gateway.</p><p>This model is used when the integrator wants direct backend control over payment creation, payment status handling, retries, duplicate prevention, voids, refunds, batch operations and operational support.</p>`],
    ['responsibilities','Integrator responsibilities',`<div class="table-wrap"><table><thead><tr><th>Responsibility</th><th>What the integrator must handle</th></tr></thead><tbody><tr><td><strong>Order state</strong></td><td>Keep merchant order state aligned with payment result, timeout, cancellation, void and refund outcomes.</td></tr><tr><td><strong>Request signing</strong></td><td>Sign each server-side request according to assigned credential and gateway rules.</td></tr><tr><td><strong>Retry behavior</strong></td><td>Use inquiry and duplicate prevention before creating another payment attempt after unclear outcomes.</td></tr><tr><td><strong>Security posture</strong></td><td>Confirm PCI and sensitive payment data handling responsibilities before production.</td></tr></tbody></table></div>`]
  ]},
  'gateway-merchant-hosted-checkout':{area:'Product Guides / Payment Gateway',label:'Merchant-hosted checkout',eyebrow:'Build Your Integration',title:'Merchant-hosted checkout',subtitle:'Use your own checkout page while sending signed payment requests to Octra Gateway from your backend.',sections:[
    ['model','Model',`<p class="lead">In the merchant-hosted checkout model, the merchant, PSP or platform owns the checkout page and customer experience. The customer stays inside the merchant-controlled journey while the backend sends signed payment requests to Octra Payment Gateway.</p><p>This model is best when the business needs full control over checkout design, payment form behavior, user experience, order state and platform-specific logic.</p>`],
    ['flow','Merchant-hosted checkout flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Customer checks out on your page</h3><p>The merchant, PSP or platform controls the checkout UI and collects the required order context.</p></div></div><div class="step"><div class="num">2</div><div><h3>Backend prepares the payment</h3><p>Your backend prepares amount, currency, merchant reference, order identifier and payment information according to the supported model.</p></div></div><div class="step"><div class="num">3</div><div><h3>Signed request is sent to Octra</h3><p>Your backend sends a signed API request to Octra Payment Gateway.</p></div></div><div class="step"><div class="num">4</div><div><h3>Authentication and authorization continue</h3><p>3DS, authorization, sale or capture flows continue according to the payment type and configuration.</p></div></div><div class="step"><div class="num">5</div><div><h3>You handle the result</h3><p>Your system updates order state and uses inquiry, void, refund or batch operations when needed.</p></div></div></div>`],
    ['best-for','Best for',`<div class="grid"><div class="card"><h3>Full UX control</h3><p>Keep checkout design, business rules and customer journey inside your own channel.</p></div><div class="card"><h3>PSP and platform flows</h3><p>Support multiple merchants, sellers or tenants with your own onboarding and checkout logic.</p></div><div class="card"><h3>Custom business rules</h3><p>Apply merchant-specific logic, order validation or sector-specific checkout steps before payment.</p></div><div class="card"><h3>Higher responsibility</h3><p>Confirm payment data, PCI and security responsibilities because your environment controls more of the checkout journey.</p></div></div>`]
  ]},
  'gateway-octra-hosted-checkout':{area:'Product Guides / Payment Gateway',label:'Octra-hosted checkout',eyebrow:'Build Your Integration',title:'Octra-hosted checkout',subtitle:'Use an Octra-hosted payment page when you want a faster payment experience with reduced payment form complexity.',sections:[
    ['model','Model',`<p class="lead">In the Octra-hosted checkout model, the merchant, PSP or platform prepares the order and creates a hosted checkout session. Octra provides the hosted payment experience where the customer enters payment details and completes the payment flow.</p><p>This model is useful when the customer wants faster implementation, a controlled payment experience and less need to build and maintain the full payment form directly.</p>`],
    ['flow','Octra-hosted checkout flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Merchant prepares the order</h3><p>The merchant, PSP or platform prepares amount, currency, merchant reference, order identifier and return/callback expectations.</p></div></div><div class="step"><div class="num">2</div><div><h3>Hosted checkout session is created</h3><p>The backend requests a hosted checkout session from Octra using assigned credentials and the required payment context.</p></div></div><div class="step"><div class="num">3</div><div><h3>Customer opens Octra-hosted page</h3><p>The customer is redirected to, or shown, the Octra-hosted payment experience according to the supported model.</p></div></div><div class="step"><div class="num">4</div><div><h3>Payment details and authentication are handled</h3><p>The customer enters payment details in the hosted experience. 3DS or other authentication continues when required.</p></div></div><div class="step"><div class="num">5</div><div><h3>Result is returned or retrieved</h3><p>The customer returns to the merchant result page and the merchant confirms the payment result using the supported result handling flow.</p></div></div></div>`],
    ['benefits','Key benefits',`<div class="grid"><div class="card"><h3>Faster implementation</h3><p>Start accepting payments without building the entire payment form and payment page experience from scratch.</p></div><div class="card"><h3>Reduced form complexity</h3><p>Use an Octra-controlled payment experience for collecting payment details.</p></div><div class="card"><h3>Controlled payment flow</h3><p>Authentication, payment completion and result handling follow a defined hosted checkout path.</p></div><div class="card"><h3>Clear limitations</h3><p>Hosted checkout may provide less UI flexibility than a fully merchant-owned checkout page. Supported customization should be confirmed before implementation.</p></div></div>`]
  ]},
  'gateway-hosted-result-handling':{area:'Product Guides / Payment Gateway',label:'Checkout result handling',eyebrow:'Build Your Integration',title:'Checkout result handling',subtitle:'Handle success, failure, cancellation, timeout and unclear outcomes without creating duplicate payments.',sections:[
    ['states','Result states to handle',`<div class="table-wrap"><table><thead><tr><th>Result</th><th>Meaning</th><th>Recommended behavior</th></tr></thead><tbody><tr><td><strong>Success / approved</strong></td><td>The payment was authorized or completed successfully.</td><td>Confirm the order and continue fulfillment or capture where the model requires it.</td></tr><tr><td><strong>Declined / failed</strong></td><td>The payment did not complete successfully.</td><td>Show a clear customer-facing message and allow another payment attempt where appropriate.</td></tr><tr><td><strong>Cancelled</strong></td><td>The customer cancelled or left the checkout experience.</td><td>Keep the order unpaid and allow retry without assuming a successful payment.</td></tr><tr><td><strong>Timeout / unknown</strong></td><td>The final payment state is unclear.</td><td>Use payment status inquiry before retrying or creating a new payment attempt.</td></tr><tr><td><strong>Refunded / voided</strong></td><td>A follow-up lifecycle action changed the payment state.</td><td>Update order, support and operations records accordingly.</td></tr></tbody></table></div>`],
    ['principles','Result handling principles',`<div class="notice"><div class="callout-icon">i</div><div><strong>Never rely only on the browser return path.</strong><p>A customer returning to the merchant page is not always enough to confirm the final payment result. Use the supported inquiry, notification or backend confirmation flow before updating the order as paid, retrying the payment or triggering fulfillment.</p></div></div>`]
  ]},
  'gateway-duplicate-prevention':{area:'Product Guides / Payment Gateway',label:'Duplicate prevention',eyebrow:'Build Your Integration',title:'Duplicate prevention',subtitle:'Prevent duplicate charges caused by retries, network interruptions or unclear payment outcomes.',sections:[
    ['strategy','Recommended strategy',`<div class="table-wrap"><table><thead><tr><th>Risk</th><th>Recommended behavior</th></tr></thead><tbody><tr><td><strong>Network timeout</strong></td><td>Use payment status inquiry before creating another payment attempt.</td></tr><tr><td><strong>User refresh or retry</strong></td><td>Reuse merchant order reference or idempotency approach where supported.</td></tr><tr><td><strong>Unclear result</strong></td><td>Do not assume failure; investigate status first.</td></tr><tr><td><strong>Duplicate operational action</strong></td><td>Check current payment state before void, refund or close-batch actions.</td></tr></tbody></table></div>`]
  ]},
  'gateway-testing':{area:'Product Guides / Payment Gateway',label:'Testing',eyebrow:'Build Your Integration',title:'Testing',subtitle:'Validate approved, declined, authenticated, void, refund, inquiry and batch scenarios before production.',sections:[
    ['scenarios','Recommended scenarios',`<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>What it validates</th></tr></thead><tbody><tr><td><strong>Approved Sale</strong></td><td>Successful payment acceptance and order completion.</td></tr><tr><td><strong>Declined payment</strong></td><td>Correct customer-facing and operational decline handling.</td></tr><tr><td><strong>3DS frictionless</strong></td><td>Authentication completes without customer challenge and payment continues correctly.</td></tr><tr><td><strong>3DS challenge</strong></td><td>Challenge continuation, result handling and authorization handoff work correctly.</td></tr><tr><td><strong>Own 3DS Server</strong></td><td>Integrator-provided authentication result data is accepted and handled correctly.</td></tr><tr><td><strong>SCA exemption requested</strong></td><td>The flow handles exemption request, challenge fallback or decline outcome correctly.</td></tr><tr><td><strong>Initial COF transaction</strong></td><td>Customer consent and first stored credential transaction are classified correctly.</td></tr><tr><td><strong>Subsequent CIT / MIT</strong></td><td>Stored credential reuse, recurring or merchant-initiated payment classification is correct.</td></tr><tr><td><strong>Timeout + inquiry</strong></td><td>Duplicate prevention and result investigation.</td></tr><tr><td><strong>Void</strong></td><td>Cancellation behavior before completion where supported.</td></tr><tr><td><strong>Refund</strong></td><td>Post-completion refund behavior.</td></tr><tr><td><strong>Batch list / close</strong></td><td>Operational batch handling before downstream processing.</td></tr></tbody></table></div>`]
  ]},
  'gateway-result-codes':{area:'Product Guides / Payment Gateway',label:'Result codes',eyebrow:'Build Your Integration',title:'Result codes',subtitle:'Interpret Gateway response, decline and operational result codes consistently.',sections:[
    ['pattern','Result handling pattern',`<p class="lead">Result codes should be documented as business outcomes with recommended next actions. The guide explains how to interpret categories; endpoint-level code lists and schemas should remain in the API reference.</p>`]
  ]},

  acquiring:{area:'Product Guides / Acquiring',label:'Overview',eyebrow:'Acquiring',title:'Operate merchant acquiring with Octra Acquiring',subtitle:'Octra Acquiring is the merchant acceptance and financial operations layer that connects merchant setup, terminal configuration, transaction processing, settlement, reconciliation, pricing and dispute operations.',actions:[['acquiring-operating-model','View acquiring flow','primary'],['acquiring-who-uses','Who uses it','']],sections:[
    ['what-is','What is Octra Acquiring?',`<p class="lead">Octra Acquiring enables institutions to onboard merchants, configure acceptance channels, process acquiring transactions and operate the financial workflows that follow payment acceptance.</p><p>It is the layer that defines how merchants are configured, how terminals and acceptance identifiers are used, how transactions move into batch and clearing preparation, how settlement and reconciliation are performed, and how merchant-level finance, pricing, reporting and dispute operations are managed.</p><p>Payment Gateway explains how online payments are initiated and managed. Acquiring explains how merchant acceptance, settlement, reconciliation and merchant finance operate behind those transactions.</p><div class="notice"><div class="callout-icon">→</div><div><strong>In one sentence</strong><p>Acquiring is the merchant acceptance and financial operations layer of the Octra platform.</p></div></div>`],
    ['key-benefits','Key benefits',`<p class="lead">Octra Acquiring helps institutions operate merchant acceptance and the financial workflows that follow payment activity, including terminal setup, settlement, reconciliation, pricing and dispute operations.</p><div class="grid"><div class="card"><h3>Enable merchant acceptance</h3><p>Support merchant payment acceptance across digital, physical and platform-based channels.</p></div><div class="card"><h3>Centralize acceptance setup</h3><p>Manage merchant profile, terminal, MID/TID, MCC, currency and channel configuration from one operating model.</p></div><div class="card"><h3>Connect transactions to finance</h3><p>Move transaction activity into batch, clearing preparation, settlement and reconciliation operations.</p></div><div class="card"><h3>Manage pricing and deductions</h3><p>Support merchant pricing, scheme fees, interchange, IC+, acquirer markup, commissions and settlement deductions where relevant.</p></div><div class="card"><h3>Support reconciliation control</h3><p>Match transactions, batches, fees, settlement records and finance reports for operational confidence.</p></div><div class="card"><h3>Operate disputes and chargebacks</h3><p>Connect dispute workflows to transaction records, merchant responses, financial adjustments and reporting.</p></div></div>`],
    ['who-uses','Who uses Acquiring?',`<div class="table-wrap"><table><thead><tr><th>User / customer type</th><th>Acquiring need</th></tr></thead><tbody><tr><td><strong>Acquirers</strong></td><td>Operate merchant acceptance, settlement, reconciliation, pricing and dispute workflows.</td></tr><tr><td><strong>PSPs</strong></td><td>Connect merchant portfolios to acquiring operations and downstream finance outputs.</td></tr><tr><td><strong>Financial institutions</strong></td><td>Modernize merchant acquiring infrastructure without treating gateway operations as the full acquiring model.</td></tr><tr><td><strong>Platforms and marketplaces</strong></td><td>Support merchant or seller acceptance models with clear reporting and settlement responsibilities.</td></tr><tr><td><strong>Finance and operations teams</strong></td><td>Review transactions, batches, settlement records, fees, reconciliation and disputes.</td></tr></tbody></table></div>`],
    ['operating-flow','Acquiring operating flow',`${acquiringFlowDiagram()}`],
    ['where-it-fits','Where Acquiring fits in the Octra platform',`<div class="table-wrap"><table><thead><tr><th>Layer</th><th>Role</th></tr></thead><tbody><tr><td><strong>Payment Gateway</strong></td><td>Accepts and manages online payment flows through API or hosted checkout models.</td></tr><tr><td><strong>Acquiring</strong></td><td>Owns merchant acceptance configuration, terminal setup, settlement, reconciliation, pricing and merchant finance operations.</td></tr><tr><td><strong>Processing</strong></td><td>Provides the authorization, clearing, settlement and transaction event infrastructure behind payment operations.</td></tr><tr><td><strong>Orchestration</strong></td><td>Routes and optimizes transactions across providers, acquirers, schemes and payment paths.</td></tr></tbody></table></div>`],
    ['recommended-path','Recommended path',`<div class="steps"><button class="step" data-page="acquiring-who-uses" style="width:100%;text-align:left;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">1</div><div><h3>Confirm the acquiring model</h3><p>Understand whether the customer needs merchant acceptance, terminal configuration, settlement and reconciliation operations.</p></div></button><button class="step" data-page="acquiring-merchant-onboarding" style="width:100%;text-align:left;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">2</div><div><h3>Onboard the merchant</h3><p>Create or connect the merchant relationship and required business profile.</p></div></button><button class="step" data-page="acquiring-merchant-terminal-setup" style="width:100%;text-align:left;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">3</div><div><h3>Configure merchant and terminal setup</h3><p>Prepare merchant, terminal, MCC, currency, channel, settlement and pricing configuration.</p></div></button><button class="step" data-page="acquiring-settlement-lifecycle" style="width:100%;text-align:left;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">4</div><div><h3>Operate settlement and reconciliation</h3><p>Review the finance workflow that follows transaction processing and batch preparation.</p></div></button></div>`]
  ]},
  'acquiring-who-uses':{area:'Product Guides / Acquiring',label:'Who uses Acquiring',eyebrow:'Start Acquiring',title:'Who uses Acquiring?',subtitle:'Identify when Acquiring is the right guide instead of Payment Gateway, Processing or Orchestration.',sections:[
    ['audience','Audience and need',`<div class="table-wrap"><table><thead><tr><th>Audience</th><th>Need</th></tr></thead><tbody><tr><td><strong>Acquirer / acquiring processor</strong></td><td>Operate merchant acceptance, settlement and finance workflows.</td></tr><tr><td><strong>Bank or regulated institution</strong></td><td>Modernize acquiring operations across regions, channels and merchant portfolios.</td></tr><tr><td><strong>PSP</strong></td><td>Connect merchants into an acquiring model with clear terminal, settlement and reporting outputs.</td></tr><tr><td><strong>Marketplace / platform</strong></td><td>Support merchant or seller acceptance where settlement and reporting responsibilities must be clear.</td></tr><tr><td><strong>Finance / operations team</strong></td><td>Track settlement, reconciliation, fees, commissions, chargebacks and merchant reporting.</td></tr></tbody></table></div>`]
  ]},
  'acquiring-first-api-request':{area:'Product Guides / Acquiring',label:'First acquiring API request',eyebrow:'Start Acquiring',title:'Send your first Acquiring API request',subtitle:'Validate access to the acquiring environment before creating or operating merchant workflows.',sections:[
    ['purpose','Purpose',`<p class="lead">Use a low-risk read or lookup request to confirm that the assigned credentials, host, token or signing model are working before performing merchant or terminal operations.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Start with access validation</strong><p>The first acquiring request should not change merchant finance data. It should validate connectivity, credential handling and access to configured values where supported.</p></div></div>`],
    ['next','What comes next',`<p>Once access is confirmed, proceed to merchant onboarding and then merchant/terminal setup before processing any acquiring transactions. Request signing details are covered separately in Build Your Integration.</p>`]
  ]},
  'acquiring-merchant-onboarding':{area:'Product Guides / Acquiring',label:'Merchant onboarding',eyebrow:'Start Acquiring',title:'Merchant onboarding',subtitle:'Prepare the merchant relationship before transactions can be accepted and financially operated.',sections:[
    ['purpose','Purpose',`<p class="lead">Merchant onboarding creates or connects the business relationship that will accept payments under the acquiring model. It should establish the merchant identity, business category, acceptance scope, settlement expectations and operational ownership.</p>`],
    ['merchant-lifecycle-statuses','Merchant lifecycle statuses',`<p class="lead">A merchant lifecycle should clearly identify whether the merchant is being prepared, reviewed, approved, active, suspended or closed. This helps acquiring, risk, operations and finance teams understand when payment acceptance can start, when setup can continue and when restrictions may apply.</p><div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Draft</strong><p>Merchant information is being prepared and is not ready for production processing.</p></div><div class="flow-box"><strong>Under review</strong><p>Risk, compliance or operational review is in progress before activation.</p></div><div class="flow-box"><strong>Approved</strong><p>The merchant passed required review and can move toward activation.</p></div><div class="flow-box primary"><strong>Active</strong><p>The merchant can accept transactions according to configured channels, methods and limits.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box"><strong>Suspended</strong><p>The merchant is temporarily restricted. New processing, settlement or operational actions may be limited depending on the reason.</p></div><div class="flow-box"><strong>Terminated</strong><p>The merchant relationship is closed. No new processing should occur, while historical reporting or disputes may continue.</p></div></div></div><div class="table-wrap"><table><thead><tr><th>Status</th><th>Meaning</th><th>What can happen</th></tr></thead><tbody><tr><td><strong>Draft</strong></td><td>Merchant record is being prepared but is not ready for processing.</td><td>Merchant information can be completed or corrected. No production transaction processing.</td></tr><tr><td><strong>Under review</strong></td><td>Merchant is waiting for risk, compliance or operational approval.</td><td>Setup may continue, but payment acceptance may be restricted until approval.</td></tr><tr><td><strong>Approved</strong></td><td>Merchant has passed the required review and can move to activation.</td><td>Terminal, MID/TID, channel and settlement setup can be finalized.</td></tr><tr><td><strong>Active</strong></td><td>Merchant is enabled for payment acceptance.</td><td>Transactions can be processed according to configured channels, methods and limits.</td></tr><tr><td><strong>Suspended</strong></td><td>Merchant is temporarily restricted.</td><td>New processing, settlement or operational actions may be limited depending on suspension reason.</td></tr><tr><td><strong>Terminated</strong></td><td>Merchant relationship is closed.</td><td>No new transaction processing. Historical reporting, reconciliation and dispute handling may still continue.</td></tr></tbody></table></div><div class="notice"><div class="callout-icon">!</div><div><strong>Status changes can affect finance operations.</strong><p>A merchant status change can affect payment acceptance, settlement timing, reporting visibility and operational follow-up. For example, a suspended merchant may be prevented from accepting new transactions while historical settlement, reconciliation or dispute operations may still need to continue.</p></div></div>`],
    ['not-the-same','Business boundary',`<div class="table-wrap"><table><thead><tr><th>Creates or validates</th><th>Does not replace</th></tr></thead><tbody><tr><td>Merchant profile and business acceptance context</td><td>Gateway checkout integration</td></tr><tr><td>MCC, category and risk classification</td><td>Payment authorization processing rules</td></tr><tr><td>Settlement and reporting responsibilities</td><td>Scheme clearing infrastructure</td></tr><tr><td>Operational merchant relationship</td><td>Orchestration routing strategy</td></tr></tbody></table></div>`]
  ]},
  'acquiring-merchant-terminal-setup':{area:'Product Guides / Acquiring',label:'Merchant and terminal setup',eyebrow:'Start Acquiring',title:'Merchant and terminal setup',subtitle:'Configure how a merchant accepts transactions and how those transactions are identified operationally.',sections:[
    ['setup','What gets configured',`<div class="table-wrap"><table><thead><tr><th>Configuration</th><th>Business role</th></tr></thead><tbody><tr><td><strong>Merchant profile</strong></td><td>Defines the merchant business, operating region, category and acquiring relationship.</td></tr><tr><td><strong>MID / TID / terminal</strong></td><td>Identifies transaction acceptance points and supports reporting, batch and settlement grouping.</td></tr><tr><td><strong>MCC</strong></td><td>Classifies merchant category for risk, compliance, pricing and reporting.</td></tr><tr><td><strong>Channels</strong></td><td>Defines whether e-commerce, POS, SoftPOS, wallet or marketplace acceptance is supported.</td></tr><tr><td><strong>Currencies</strong></td><td>Defines transaction and settlement currency behavior.</td></tr><tr><td><strong>Pricing and settlement profile</strong></td><td>Controls commission, fee, payout and reporting behavior where applicable.</td></tr></tbody></table></div>`]
  ]},
  'acquiring-what-it-does':{area:'Product Guides / Acquiring',label:'What Acquiring does',eyebrow:'Understand Acquiring',title:'What Acquiring does',subtitle:'Understand the role of Acquiring in the payment stack.',sections:[
    ['role','Acquiring role',`<p class="lead">Acquiring is responsible for the merchant side of payment acceptance. It defines who the merchant is, which channels and terminals are enabled, how transactions are grouped, how settlement is calculated, how fees and commissions are applied, and how reconciliation and disputes are managed.</p>`],
    ['outcomes','Business outcomes',`<div class="grid"><div class="card"><h3>Merchant acceptance</h3><p>Enable businesses to accept payments under a defined acquiring relationship.</p></div><div class="card"><h3>Terminal configuration</h3><p>Control transaction identification by MID, TID, terminal or channel.</p></div><div class="card"><h3>Settlement operations</h3><p>Prepare transaction activity for settlement and merchant finance workflows.</p></div><div class="card"><h3>Reconciliation</h3><p>Match transactions, fees, settlement records and reports for financial control.</p></div></div>`]
  ]},
  'acquiring-operating-model':{area:'Product Guides / Acquiring',label:'Acquiring operating model',eyebrow:'Understand Acquiring',title:'Acquiring operating model',subtitle:'See how merchant setup, transaction processing, settlement and reconciliation connect.',sections:[
    ['flow','Operating flow',`${acquiringFlowDiagram()}`],
    ['principle','Core principle',`<p class="lead">Acquiring is not just merchant onboarding and not just settlement reporting. It is the operating model that connects merchant configuration, transaction activity, batch and clearing preparation, settlement calculation, fees, reconciliation, reporting and disputes.</p>`]
  ]},
  'acquiring-object-model':{area:'Product Guides / Acquiring',label:'Merchant, terminal and acquirer model',eyebrow:'Understand Acquiring',title:'Merchant, terminal and acquirer model',subtitle:'Understand the main acquiring objects before implementing operational flows.',sections:[
    ['objects','Core objects',`<div class="table-wrap"><table><thead><tr><th>Object</th><th>Business meaning</th></tr></thead><tbody><tr><td><strong>Acquirer</strong></td><td>Entity or infrastructure layer responsible for merchant acquiring and financial operation of payment acceptance.</td></tr><tr><td><strong>Merchant</strong></td><td>Business accepting payments.</td></tr><tr><td><strong>Merchant account / profile</strong></td><td>Configured relationship that defines merchant identity, category, settlement and reporting behavior.</td></tr><tr><td><strong>Terminal / MID / TID</strong></td><td>Acceptance identifier used for transaction routing, reporting, batch and reconciliation grouping.</td></tr><tr><td><strong>MCC</strong></td><td>Merchant category code used for risk, compliance, pricing and reporting.</td></tr><tr><td><strong>Pricing profile</strong></td><td>Commercial configuration for fees, commissions and settlement deductions.</td></tr><tr><td><strong>Settlement profile</strong></td><td>Defines timing, currency and payout behavior.</td></tr><tr><td><strong>Reconciliation report</strong></td><td>Finance output used to match transaction, batch, fee and settlement records.</td></tr></tbody></table></div>`],
    ['hierarchy','Acquiring hierarchy diagram',`<p class="lead">A typical acquiring setup can be represented through the following hierarchy. The exact relationship between merchant, MID, TID and terminal may vary by region, acquirer, channel and operating model, but the hierarchy should always make clear how payment activity is identified, grouped, reported, settled and reconciled.</p><div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Acquirer</strong><p>The acquiring owner or infrastructure layer responsible for merchant acceptance and financial operations.</p></div><div class="flow-box"><strong>Merchant</strong><p>The business that accepts payments under the acquiring relationship.</p></div><div class="flow-box"><strong>Merchant Account / Profile</strong><p>The configured profile that defines business identity, risk, settlement, pricing and reporting behavior.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box primary"><strong>MID</strong><p>The merchant identifier used for acceptance, processing, reporting, batch grouping and settlement context.</p></div><div class="flow-box"><strong>Terminal / TID</strong><p>The acceptance point or channel instance used to identify transactions operationally.</p></div><div class="flow-box"><strong>Channel</strong><p>E-commerce, POS, SoftPOS, wallet, marketplace or another supported acceptance channel.</p></div></div></div>`],
    ['identifier-relationship','Identifier and reporting relationship',`<div class="table-wrap"><table><thead><tr><th>Level</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Acquirer</strong></td><td>Defines the acquiring relationship and merchant finance operating model.</td></tr><tr><td><strong>Merchant</strong></td><td>Represents the business accepting payments.</td></tr><tr><td><strong>Merchant profile</strong></td><td>Stores business, risk, settlement, pricing and reporting configuration.</td></tr><tr><td><strong>MID</strong></td><td>Groups transaction activity for merchant-level processing, reporting and settlement context.</td></tr><tr><td><strong>TID / terminal</strong></td><td>Identifies the acceptance point or channel-specific transaction source.</td></tr><tr><td><strong>Channel</strong></td><td>Determines how the payment is accepted, such as e-commerce, POS, SoftPOS, wallet or marketplace.</td></tr></tbody></table></div><div class="notice"><div class="callout-icon">→</div><div><strong>Operational connection</strong><p>This hierarchy connects merchant setup to transaction visibility, batch grouping, settlement calculation, reconciliation and dispute investigation. It should be confirmed before production transaction volume starts.</p></div></div>`]
  ]},
  'acquiring-transaction-lifecycle':{area:'Product Guides / Acquiring',label:'Transaction lifecycle',eyebrow:'Understand Acquiring',title:'Acquiring transaction lifecycle',subtitle:'Follow how an acquiring transaction moves from acceptance into finance operations.',sections:[
    ['lifecycle','Lifecycle',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Transaction accepted</h3><p>A payment is accepted through a configured merchant, terminal or channel.</p></div></div><div class="step"><div class="num">2</div><div><h3>Transaction recorded</h3><p>The transaction is associated with merchant, terminal, currency, channel and processing context.</p></div></div><div class="step"><div class="num">3</div><div><h3>Batch or clearing preparation</h3><p>The transaction becomes part of operational grouping for downstream processing.</p></div></div><div class="step"><div class="num">4</div><div><h3>Settlement calculation</h3><p>Amounts, fees, commissions and adjustments are calculated.</p></div></div><div class="step"><div class="num">5</div><div><h3>Reconciliation and reporting</h3><p>Finance teams validate records and review merchant-facing outputs.</p></div></div></div>`]
  ]},
  'acquiring-platform-boundaries':{area:'Product Guides / Acquiring',label:'Gateway vs Acquiring vs Processing',eyebrow:'Understand Acquiring',title:'Gateway vs Acquiring vs Processing',subtitle:'Use the correct guide for the correct layer of the payment stack.',sections:[
    ['boundaries','Platform boundaries',`<div class="table-wrap"><table><thead><tr><th>Layer</th><th>What it owns</th><th>What it does not own</th></tr></thead><tbody><tr><td><strong>Payment Gateway</strong></td><td>Online payment initiation, authentication, authorization/capture workflow, inquiry, void, refund and batch operations.</td><td>Merchant settlement, pricing, reconciliation and chargeback operations.</td></tr><tr><td><strong>Acquiring</strong></td><td>Merchant setup, terminal configuration, settlement, reconciliation, pricing, commissions, disputes and merchant finance operations.</td><td>Full gateway checkout experience or orchestration routing strategy.</td></tr><tr><td><strong>Processing</strong></td><td>Authorization, clearing, settlement infrastructure and transaction events.</td><td>Merchant onboarding strategy or checkout UX.</td></tr><tr><td><strong>Orchestration</strong></td><td>Routing, failover and provider/acquirer selection.</td><td>Merchant finance and settlement ownership.</td></tr></tbody></table></div>`]
  ]},
