        ['configuration-foundation', 'Configuration foundation', `<p class="lead">Octra follows a configuration-first model. Card types, product types, customer types, customer groups, BIN definitions, logo definitions, statement profiles, limit profiles, interest profiles, renewal rules and printing rules are defined before the first customer or card is created.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Not runtime creation</strong><p>These definitions are not created by <code class="inline-code">CreateCustomer</code> or <code class="inline-code">CreateCard</code>. Runtime APIs reference the values that were already configured for the card program.</p></div></div>`],
        ['what-gets-configured', 'What gets configured', `<div class="table-wrap"><table><thead><tr><th>Definition</th><th>Business purpose</th><th>Used later by</th></tr></thead><tbody><tr><td><strong>Card types</strong></td><td>Defines whether the card is virtual, physical, primary, supplementary, renewal or another supported type.</td><td>CreateCard, card lifecycle</td></tr><tr><td><strong>Product types / card products</strong></td><td>Defines card behavior, eligibility, currency, lifecycle rules and supported features.</td><td>CreateCard, controls, transactions</td></tr><tr><td><strong>Customer types</strong></td><td>Defines whether customers are individual, corporate or another configured customer class.</td><td>CreateCustomer</td></tr><tr><td><strong>Customer groups</strong></td><td>Supports segmentation, portfolio ownership, reporting and program-level grouping.</td><td>CreateCustomer, reporting</td></tr><tr><td><strong>BIN definitions</strong></td><td>Defines card network, program identity and issuing range behavior.</td><td>CreateCard, physical card setup</td></tr><tr><td><strong>Logo definitions</strong></td><td>Supports branded physical or digital card programs.</td><td>Card design and shipping</td></tr><tr><td><strong>Statement profiles</strong></td><td>Defines statement cycle and billing behavior for credit products where applicable.</td><td>Funding model, reports</td></tr><tr><td><strong>Limit profiles</strong></td><td>Defines customer, card or transaction limit behavior.</td><td>CreateCustomer, CreateCard, authorization</td></tr><tr><td><strong>Interest profiles</strong></td><td>Defines interest calculation behavior for credit products where applicable.</td><td>Funding model, reports</td></tr><tr><td><strong>Renewal and printing rules</strong></td><td>Defines card renewal, single printing and batch production behavior.</td><td>Cards, card design and shipping</td></tr></tbody></table></div>`],
        ['lookup-configured-values', 'Look up configured values', `<p class="lead">Use lookup APIs to retrieve the codes configured for your program. This helps integrators reference the right product or parameter values without hard-coding assumptions.</p><div class="code-card"><div class="code-head"><span class="dots"><span></span><span></span><span></span></span><span>Example product lookup</span></div><pre><code>curl --location 'https://hilarionapi.corpayss.net/api/IntegrationCommon/GetLookupTable?model.tableName=PRM_CRD_PRODUCT' \\
  --header 'token: &lt;ACCESS_TOKEN&gt;'</code></pre></div>`],
        ['where-values-are-used', 'Where these values are used', `<div class="grid"><div class="card"><h3>CreateCustomer</h3><p>Uses predefined customer type, customer group, SBU, branch and customer-level limit context.</p></div><div class="card"><h3>CreateCard</h3><p>Uses predefined card product, product type, BIN, logo, funding, limit and lifecycle rules.</p></div><div class="card"><h3>Card production</h3><p>Uses logo, design, personalization, renewal and printing rules for physical cards.</p></div><div class="card"><h3>Credit operations</h3><p>Uses statement, limit and interest profiles for billing and credit behavior where applicable.</p></div></div>`]
      ]},
      'issuing-card-design-shipping': { area: 'Product Guides / Issuing', label: 'Card design and shipping', eyebrow: 'Build Your Program', title: 'Card design, production and shipping', subtitle: 'Plan physical card design, printing, personalization, production provider handoff and delivery.', sections: [
        ['physical-card-flow', 'Physical card production flow', `<div class="steps"><div class="step"><div class="num">1</div><div><h3>Card is created</h3><p>A card record exists for the customer and is ready for physical production if the product requires it.</p></div></div><div class="step"><div class="num">2</div><div><h3>Printing request is created</h3><p>The card is selected for single printing or included in a batch production process.</p></div></div><div class="step"><div class="num">3</div><div><h3>Production data is generated</h3><p>Required personalization, embossing, logo and card production details are generated on the Octra side.</p></div></div><div class="step"><div class="num">4</div><div><h3>Production provider receives the data</h3><p>The card production company uses the shared production data to produce the physical card.</p></div></div><div class="step"><div class="num">5</div><div><h3>Card is shipped to the customer</h3><p>The physical card is posted or couriered to the customer according to the agreed fulfillment process.</p></div></div></div>`],
        ['single-vs-batch', 'Single printing and batch upload', `<div class="grid"><div class="card"><h3>Single card printing</h3><p>Use when an individual card needs to be printed after card creation or lifecycle action.</p></div><div class="card"><h3>Batch production</h3><p>Use when multiple cards are prepared and sent to the production provider as a batch.</p></div><div class="card"><h3>Supplementary cards</h3><p>Additional cards may require their own production request and delivery handling.</p></div><div class="card"><h3>Renewal cards</h3><p>Renewal scenarios may create new physical production needs before card expiry.</p></div></div>`],
        ['design-dependencies', 'Design dependencies', `<p>Physical production depends on predefined BIN, logo, card design, personalization and printing rules. These should be configured before the production process starts.</p>`]
      ]},
      'issuing-funding-model': { area: 'Product Guides / Issuing', label: 'Funding model', eyebrow: 'Build Your Program', title: 'Funding, statement and interest model', subtitle: 'Define how spend is funded, authorized, billed and reported.', sections: [
        ['funding-types', 'Funding models', `<div class="grid"><div class="card"><h3>Prepaid</h3><p>Spend is based on loaded or available value.</p></div><div class="card"><h3>Debit</h3><p>Spend is linked to an available balance or account relationship.</p></div><div class="card"><h3>Credit</h3><p>Spend is based on assigned customer or card credit limits.</p></div><div class="card"><h3>Corporate spend</h3><p>Spend may be controlled by employee, department, merchant category, channel or program rule.</p></div></div>`],
        ['credit-profiles', 'Credit card profiles', `<p class="lead">For credit card programs, business logic may include statement profiles, limit profiles and interest profiles. These definitions affect statement generation, billing cycles, limit handling and interest calculation.</p><div class="table-wrap"><table><thead><tr><th>Profile</th><th>Business role</th></tr></thead><tbody><tr><td><strong>Statement profile</strong></td><td>Defines statement period, statement generation behavior and billing-cycle related rules.</td></tr><tr><td><strong>Limit profile</strong></td><td>Defines how customer limits, card limits and transaction limits are controlled.</td></tr><tr><td><strong>Interest profile</strong></td><td>Defines interest calculation behavior for credit products where applicable.</td></tr></tbody></table></div>`]
      ]},
      'issuing-compliance-pci': { area: 'Product Guides / Issuing', label: 'Compliance and PCI', eyebrow: 'Build Your Program', title: 'Compliance and PCI', subtitle: 'Define responsibilities for sensitive data, auditability and secure card operations.', sections: [['pci', 'Security posture', `<div class="notice"><div class="callout-icon">!</div><div><strong>Important</strong><p>Do not expose PAN, PIN, CVV2 or sensitive card data unless your environment, permissions and PCI responsibilities support it.</p></div></div>`]]},
      'issuing-cardholders': { area: 'Product Guides / Issuing', label: 'Cardholders', eyebrow: 'Operate Cards', title: 'Cardholders', subtitle: 'Create, update, retrieve and manage cardholder records.', sections: [['manage-cardholders', 'Lifecycle', `<p>Cardholder operations should cover creation, profile update, status, KYC fields, contact details and customer-level limits.</p>`]]},
      'issuing-cards': { area: 'Product Guides / Issuing', label: 'Cards', eyebrow: 'Operate Cards', title: 'Cards', subtitle: 'Operate the card lifecycle after the card has been created.', sections: [
        ['card-life', 'Card lifecycle', `<div class="pill-row"><span class="pill">Created</span><span class="pill">Printed</span><span class="pill">Shipped</span><span class="pill">Activated</span><span class="pill">PIN set</span><span class="pill">Active</span><span class="pill">Blocked</span><span class="pill">Renewed</span><span class="pill">Closed</span></div>`],
        ['activation-and-pin', 'Activation and PIN', `<p class="lead">After a physical card is delivered, the customer activates the card and creates or changes the PIN or password required for usage. This is the point where the card becomes usable according to program and security rules.</p>`],
        ['lifecycle-actions', 'Lifecycle actions', `<div class="grid"><div class="card"><h3>Retrieve card status</h3><p>Check the operational state of an issued card.</p></div><div class="card"><h3>Activate or block</h3><p>Move the card through supported lifecycle states.</p></div><div class="card"><h3>Replace or renew</h3><p>Support damaged, lost, stolen, expired or renewal scenarios.</p></div><div class="card"><h3>Supplementary card</h3><p>Issue and operate additional cards linked to a primary relationship where supported.</p></div></div>`],
        ['card-status-belongs-here', 'Where card status belongs', `<div class="notice"><div class="callout-icon">→</div><div><strong>Card status is an operational API.</strong><p>It belongs under card operations because it is used after the card exists. It should not be the first API in the Start Issuing flow.</p><p style="margin-top:10px"><a class="btn" href="https://docs.corpayss.com/get-card-status-13104299e0" target="_blank" rel="noopener">Open Get Card Status in Apidog</a></p></div></div>`]
      ]},
      'issuing-controls-limits': { area: 'Product Guides / Issuing', label: 'Controls and limits', eyebrow: 'Operate Cards', title: 'Controls and limits', subtitle: 'Control customer limits, card limits and transaction behavior.', sections: [
        ['limit-levels', 'Limit levels', `<div class="table-wrap"><table><thead><tr><th>Limit level</th><th>Business purpose</th></tr></thead><tbody><tr><td><strong>Customer limit</strong></td><td>Defines the overall limit or allocation available to the customer relationship.</td></tr><tr><td><strong>Card limit</strong></td><td>Defines how much a specific card can use within the customer relationship.</td></tr><tr><td><strong>Transaction limit</strong></td><td>Defines per-transaction, daily, monthly or channel-based restrictions.</td></tr><tr><td><strong>Program limit profile</strong></td><td>Defines default limit behavior assigned during customer or card setup.</td></tr></tbody></table></div>`],
        ['control-types', 'Control types', `<div class="grid"><div class="card"><h3>Spending limits</h3><p>Control amount and frequency of card usage.</p></div><div class="card"><h3>MCC controls</h3><p>Allow or restrict merchant categories.</p></div><div class="card"><h3>Channel controls</h3><p>Control e-commerce, ATM, POS or no-PIN behavior.</p></div><div class="card"><h3>Status controls</h3><p>Block, suspend or reactivate cards.</p></div></div>`]
      ]},
      'issuing-balances-transactions': { area: 'Product Guides / Issuing', label: 'Balances and transactions', eyebrow: 'Operate Cards', title: 'Balances and transactions', subtitle: 'Track available balance, limits and transaction activity.', sections: [['balance-txn', 'Operational view', `<p>Balance and transaction documentation should describe authorization impact, available amount, transaction history, reversals, adjustments and money movement capabilities.</p>`]]},
      'issuing-reports-insights': { area: 'Product Guides / Issuing', label: 'Reports and operational insights', eyebrow: 'Operate Cards', title: 'Reports, statements and operational insights', subtitle: 'Understand which issuing data is available for operations, billing, reporting and reconciliation.', sections: [
        ['reporting-scope', 'Reporting scope', `<p class="lead">Reports and operational insights support finance, reconciliation, support, program monitoring, card production tracking, statement generation and transaction investigations.</p>`],
        ['statements-interest', 'Statements and interest', `<div class="table-wrap"><table><thead><tr><th>Area</th><th>Business purpose</th></tr></thead><tbody><tr><td><strong>Statements</strong></td><td>Show cardholder billing or activity information according to the configured statement profile.</td></tr><tr><td><strong>Interest calculations</strong></td><td>Support credit products where interest rules are configured as part of the program setup.</td></tr><tr><td><strong>Production reports</strong></td><td>Track cards prepared for single printing, batch production or renewal production.</td></tr><tr><td><strong>Lifecycle reports</strong></td><td>Track activation, blocked cards, renewals, replacements and operational exceptions.</td></tr></tbody></table></div>`]
      ]},
      'issuing-sensitive-card-data': { area: 'Product Guides / Issuing', label: 'Sensitive card data', eyebrow: 'Secure and Test', title: 'Sensitive card data', subtitle: 'Handle PAN, tokens and sensitive card details under controlled access and audit rules.', sections: [['sensitive', 'Guidance', `<p>Sensitive card data should be masked by default, revealed only when required, and protected by access control, audit trails and PCI-aligned handling rules.</p>`]]},
      'issuing-pin-cvv2-3ds': { area: 'Product Guides / Issuing', label: 'PIN, CVV2 and 3DS password', eyebrow: 'Secure and Test', title: 'PIN, CVV2 and 3DS password', subtitle: 'Manage card security functions after the customer and card exist.', sections: [
        ['activation-security', 'Activation and secure usage', `<p class="lead">After the customer receives the card, secure operations such as activation, PIN creation, PIN change, CVV2 handling and 3DS password management support safe card usage.</p>`],
        ['security-ops', 'Secure operations', `<div class="pill-row"><span class="pill">Activate card</span><span class="pill">Create PIN</span><span class="pill">Change PIN</span><span class="pill">Verify CVV2</span><span class="pill">Reset CVV2 retry</span><span class="pill">Change 3DS password</span></div>`]
      ]},
      'issuing-testing': { area: 'Product Guides / Issuing', label: 'Testing', eyebrow: 'Secure and Test', title: 'Testing', subtitle: 'Validate happy-path and exception scenarios before production.', sections: [['tests', 'Recommended scenarios', `<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>Expected behavior</th></tr></thead><tbody><tr><td>Issue virtual card</td><td>Card is created and can be retrieved.</td></tr><tr><td>Limit exceeded</td><td>Transaction is declined with a clear reason.</td></tr><tr><td>Blocked card</td><td>Authorization is not approved.</td></tr><tr><td>Sensitive data request</td><td>Access is controlled and auditable.</td></tr></tbody></table></div>`]]},
      'issuing-result-codes': { area: 'Product Guides / Issuing', label: 'Result codes', eyebrow: 'Secure and Test', title: 'Result codes', subtitle: 'Explain errors, declines and next actions clearly.', sections: [['codes', 'Result code pattern', `<div class="table-wrap"><table><thead><tr><th>Code</th><th>Meaning</th><th>Recommended action</th></tr></thead><tbody><tr><td><code>00</code></td><td>Approved</td><td>Continue processing.</td></tr><tr><td><code>51</code></td><td>Insufficient funds</td><td>Ask cardholder to use another funding source or reduce amount.</td></tr><tr><td><code>LIMIT</code></td><td>Limit exceeded</td><td>Review card or customer controls.</td></tr></tbody></table></div>`]]},
  processing:{area:'Product Guides',label:'Processing',eyebrow:'Product Guides',title:'Processing',subtitle:'Authorization, clearing, settlement and transaction event infrastructure.',sections:[['scope','Guide scope',`<p class="lead">Processing explains the infrastructure layer behind authorization, clearing, settlement, transaction events and operational processing models.</p>`]]},
  orchestration:{area:'Product Guides / Payment Orchestration',label:'Overview',eyebrow:'Payment Orchestration',title:'Route every payment through the best available path',subtitle:'Connect multiple payment providers through a unified integration. Apply routing rules, respond to provider availability and operate the complete payment lifecycle through one orchestration layer.',actions:[['orchestration-first-payment','Start your integration','primary'],['orchestration-routing-strategies','Explore routing strategies','']],sections:[
    ['what-is','What is Octra Payment Orchestration?',`<p class="lead">Octra Payment Orchestration is a control layer between your payment application and the providers that process your transactions.</p><p>Instead of implementing separate payment logic for every provider, your application can initiate and manage payments through a consistent Octra integration. Octra evaluates available payment routes, applies configured routing rules, creates provider attempts and returns a normalized payment result.</p><p>This enables payment teams to introduce provider redundancy, change routing strategies and monitor payment performance without rebuilding their core payment integration.</p><div class="notice"><div class="callout-icon">→</div><div><strong>In one sentence</strong><p>Octra Payment Orchestration connects enabled payment routes to one consistent payment lifecycle and operating model.</p></div></div>`],
    ['key-capabilities','Key capabilities',`<div class="grid three"><div class="card"><div class="capability-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="18" cy="18" r="2.5"/><path d="M8.3 10.9 15.7 7.1M8.3 13.1l7.4 3.8"/></svg></div><h3>Unified connectivity</h3><p>Connect enabled payment providers through a consistent payment integration.</p></div><div class="card"><div class="capability-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 6h4a4 4 0 0 1 4 4v8"/><path d="m10 15 3 3 3-3"/><path d="M13 10a4 4 0 0 1 4-4h2"/><path d="m17 4 2 2-2 2"/></svg></div><h3>Configurable routing</h3><p>Route payments according to eligibility, business rules, health signals and optimization strategies.</p></div><div class="card"><div class="capability-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.8 2.9 8.2 7 10 4.1-1.8 7-5.2 7-10V6l-7-3Z"/><path d="M8.5 12h7M13 9.5l2.5 2.5-2.5 2.5"/></svg></div><h3>Provider redundancy</h3><p>Use alternative routes when the selected provider returns an eligible technical failure.</p></div><div class="card"><div class="capability-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 5v6h-6"/><path d="M12 7v5l3 2"/></svg></div><h3>Unified lifecycle</h3><p>Manage payments, attempts, statuses and actions through one consistent model.</p></div><div class="card"><div class="capability-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 7h14M5 12h14M5 17h14"/><circle cx="8" cy="7" r="1"/><circle cx="14" cy="12" r="1"/><circle cx="10" cy="17" r="1"/></svg></div><h3>Normalized results</h3><p>Map provider-specific responses to consistent statuses and error categories.</p></div><div class="card"><div class="capability-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6Z"/><circle cx="12" cy="12" r="2.5"/></svg></div><h3>Operational visibility</h3><p>Follow routing decisions, attempts, actions and webhook delivery in one timeline.</p></div></div>`],
    ['why-orchestration','Why use payment orchestration?',`<p class="lead">Payment operations become more complex as businesses add providers, payment methods, currencies and markets.</p><p>Without an orchestration layer, each provider can introduce separate integrations, credentials, statuses, error codes and operational procedures. Octra centralizes this complexity so payment teams can reduce provider-specific logic, introduce controlled failover, update routing strategies and investigate transactions from a unified view.</p>`],
    ['where-it-fits','Where orchestration fits',`<div class="table-wrap"><table><thead><tr><th>Layer</th><th>Primary responsibility</th></tr></thead><tbody><tr><td><strong>Checkout</strong></td><td>Collects the customer’s payment selection and required payment information.</td></tr><tr><td><strong>Payment Gateway</strong></td><td>Initiates and manages the merchant-facing payment flow.</td></tr><tr><td><strong>Payment Orchestration</strong></td><td>Evaluates routes, selects an eligible provider and manages configured recovery behavior.</td></tr><tr><td><strong>Provider or acquirer</strong></td><td>Processes the payment through the relevant financial network.</td></tr><tr><td><strong>Merchant system</strong></td><td>Owns the order, service and customer-facing business state.</td></tr></tbody></table></div><div class="notice"><div class="callout-icon">i</div><div><strong>Availability depends on configuration.</strong><p>Product availability depends on enabled providers, payment methods, markets, account configuration and commercial scope.</p></div></div>`]
  ]},
  'orchestration-how-it-works':{area:'Product Guides / Payment Orchestration',label:'How orchestration works',eyebrow:'Start Orchestrating',title:'How payment orchestration works',subtitle:'Follow how Octra evaluates eligible routes, creates provider attempts and returns a normalized payment result.',sections:[
    ['high-level-flow','High-level payment flow',`<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Payment application</strong><p>Sends the payment amount, currency, method, merchant reference and routing context.</p></div><div class="flow-box primary"><strong>Octra orchestration</strong><p>Builds the eligible route list and evaluates active routing rules.</p></div><div class="flow-box"><strong>Selected provider</strong><p>Processes the provider-specific payment attempt.</p></div><div class="flow-box"><strong>Merchant system</strong><p>Receives a normalized result through API, inquiry or webhook.</p></div></div></div>`],
    ['decision-sequence','Decision sequence',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Receive the payment request</h3><p>Octra receives the transaction and enabled routing context.</p></div></div><div class="step"><div class="num">2</div><div><h3>Determine eligible providers</h3><p>Routes that do not support the operation, payment method, currency or configuration are excluded.</p></div></div><div class="step"><div class="num">3</div><div><h3>Evaluate routing rules</h3><p>Applicable business rules, priorities, health conditions and traffic allocation are evaluated.</p></div></div><div class="step"><div class="num">4</div><div><h3>Create a provider attempt</h3><p>The selected provider receives a provider-specific payment attempt.</p></div></div><div class="step"><div class="num">5</div><div><h3>Normalize the result</h3><p>The provider response is mapped to the Octra payment and error model.</p></div></div><div class="step"><div class="num">6</div><div><h3>Notify the merchant</h3><p>Updates are made available through API responses, status retrieval and webhooks.</p></div></div></div>`],
    ['sync-async','Synchronous and asynchronous results',`<p class="lead">Some payments return an immediate result. Others require customer action, provider processing or external confirmation before reaching a final state.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Do not assume the first response is final.</strong><p>Use verified webhooks or server-side payment status retrieval before fulfilling an order.</p></div></div>`]
  ]},
  'orchestration-integration-models':{area:'Product Guides / Payment Orchestration',label:'Integration models',eyebrow:'Start Orchestrating',title:'Choose an integration model',subtitle:'Select the payment integration model that matches your checkout, control and security requirements.',sections:[
    ['models','Integration models',`<div class="table-wrap"><table><thead><tr><th>Model</th><th>Best suited for</th><th>Control</th></tr></thead><tbody><tr><td><strong>Hosted checkout</strong></td><td>Faster implementation using a hosted payment experience.</td><td>Standard</td></tr><tr><td><strong>Embedded components</strong></td><td>Branded checkout with supported secure payment components.</td><td>Medium</td></tr><tr><td><strong>Server-to-server</strong></td><td>Organizations requiring maximum payment-flow control.</td><td>High</td></tr><tr><td><strong>Existing gateway integration</strong></td><td>Organizations retaining an existing checkout or gateway layer.</td><td>Architecture-dependent</td></tr></tbody></table></div>`],
    ['selection','What to confirm',`<div class="grid"><div class="card"><h3>Payment data flow</h3><p>Confirm where payment information is collected, transmitted and protected.</p></div><div class="card"><h3>Authentication ownership</h3><p>Confirm how redirects, 3DS and other customer actions are handled.</p></div><div class="card"><h3>Supported capabilities</h3><p>Confirm that the selected model supports the required providers and payment operations.</p></div><div class="card"><h3>Operational ownership</h3><p>Confirm status handling, monitoring, reconciliation and support responsibilities.</p></div></div>`]
  ]},
  'orchestration-first-payment':{area:'Product Guides / Payment Orchestration',label:'First orchestrated payment',eyebrow:'Start Orchestrating',title:'Create your first orchestrated payment',subtitle:'Create a test payment, observe the selected route and confirm the final result using the enabled sandbox and API Reference.',actions:[['api-reference','Open API Reference','primary'],['orchestration-testing','Review testing scenarios','']],sections:[
    ['before-start','Before you start',`<ul><li>Confirm that Payment Orchestration is enabled for your test account.</li><li>Use credentials assigned for the sandbox environment.</li><li>Confirm that at least one test provider route is active.</li><li>Open the Payment Orchestration API Reference in Apidog for the exact endpoint, headers and payload schema.</li></ul>`],
    ['first-flow','Recommended first flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Prepare a unique merchant reference</h3><p>Link the payment to an order or business record in your system.</p></div></div><div class="step"><div class="num">2</div><div><h3>Create an idempotency key</h3><p>Protect the payment operation from accidental duplicate requests.</p></div></div><div class="step"><div class="num">3</div><div><h3>Send the payment request</h3><p>Use the exact sandbox request defined in the API Reference.</p></div></div><div class="step"><div class="num">4</div><div><h3>Store payment identifiers</h3><p>Persist the Octra payment ID, merchant reference and current attempt information.</p></div></div><div class="step"><div class="num">5</div><div><h3>Handle required action</h3><p>Complete any supported redirect, authentication or customer action.</p></div></div><div class="step"><div class="num">6</div><div><h3>Confirm the final result</h3><p>Use a verified webhook or server-side payment status retrieval.</p></div></div></div>`],
    ['reference-boundary','Product Guide and API Reference',`<div class="notice"><div class="callout-icon">→</div><div><strong>Use Apidog as the endpoint-level source of truth.</strong><p>This guide explains the integration journey. Exact URLs, headers, required fields, response schemas and test values belong in the Payment Orchestration API Reference.</p></div></div>`]
  ]},
  'orchestration-provider-connections':{area:'Product Guides / Payment Orchestration',label:'Provider connections',eyebrow:'Connect Providers',title:'Connect payment providers',subtitle:'Add provider routes without changing the merchant-facing payment lifecycle.',sections:[
    ['connection-model','Provider connection model',`<p class="lead">A provider connection allows Octra to submit eligible payment operations to an external payment provider or acquirer.</p><p>Each connection has its own credentials, supported operations, payment methods, currencies, authentication requirements, tokenization behavior and response characteristics.</p>`],
    ['secure-setup','Secure setup principles',`<div class="grid"><div class="card"><h3>Separate environments</h3><p>Keep test and production credentials separate.</p></div><div class="card"><h3>Restricted access</h3><p>Limit provider credentials to authorized systems and operational users.</p></div><div class="card"><h3>Protected secrets</h3><p>Do not expose credentials in client applications, logs, screenshots or public documentation.</p></div><div class="card"><h3>Connection testing</h3><p>Validate the connection and required capabilities before enabling traffic.</p></div></div>`]
  ]},
  'orchestration-provider-capabilities':{area:'Product Guides / Payment Orchestration',label:'Provider capabilities',eyebrow:'Connect Providers',title:'Understand provider capabilities',subtitle:'Confirm which payment operations each configured provider can support before activating a route.',sections:[
    ['capability-checklist','Capability checklist',`<div class="table-wrap"><table><thead><tr><th>Capability</th><th>What to confirm</th></tr></thead><tbody><tr><td><strong>Authorization and capture</strong></td><td>Automatic capture, manual capture and partial capture support.</td></tr><tr><td><strong>Cancellation and refund</strong></td><td>Void timing, full refund and partial refund support.</td></tr><tr><td><strong>Stored credentials</strong></td><td>Customer-initiated, recurring and merchant-initiated payment behavior.</td></tr><tr><td><strong>Authentication</strong></td><td>Supported 3DS and customer-action flows.</td></tr><tr><td><strong>Tokenization</strong></td><td>Provider, network or external token compatibility.</td></tr><tr><td><strong>Payment methods</strong></td><td>Supported methods, currencies, markets and asynchronous behavior.</td></tr></tbody></table></div>`],
    ['capability-boundary','Capability boundary',`<div class="notice"><div class="callout-icon">i</div><div><strong>Connections are not identical.</strong><p>A routing rule should include only providers that support every operation required by the payment flow.</p></div></div>`]
  ]},
  'orchestration-provider-lifecycle':{area:'Product Guides / Payment Orchestration',label:'Provider lifecycle',eyebrow:'Connect Providers',title:'Provider connection lifecycle',subtitle:'Move a provider connection from configuration to controlled production use.',sections:[
    ['lifecycle','Lifecycle',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Draft</h3><p>The connection is being prepared and cannot receive production traffic.</p></div></div><div class="step"><div class="num">2</div><div><h3>Credentials configured</h3><p>Required provider credentials and configuration have been supplied.</p></div></div><div class="step"><div class="num">3</div><div><h3>Connection tested</h3><p>Required validation and sandbox scenarios have been completed.</p></div></div><div class="step"><div class="num">4</div><div><h3>Active</h3><p>The provider can be considered for eligible payment routes.</p></div></div><div class="step"><div class="num">5</div><div><h3>Disabled or archived</h3><p>The connection is excluded from new routing decisions while historical operations remain traceable.</p></div></div></div>`],
    ['disable-impact','Disabling a connection',`<p class="lead">Disabling a provider can affect new payments, captures, refunds, token operations and investigations. Confirm how existing payments will be operated before removing a connection from routing.</p>`]
  ]},
  'orchestration-payment-methods':{area:'Product Guides / Payment Orchestration',label:'Payment Methods overview',eyebrow:'Payment Methods',title:'Offer the right payment methods through one orchestration layer',subtitle:'Connect enabled payment methods to a consistent routing, lifecycle and operational model.',sections:[
    ['fit','How payment methods fit into orchestration',`<p class="lead">A payment method defines how the customer pays. A provider route defines where the payment is processed.</p><p>The same payment-method category can be supported by more than one provider. Octra evaluates the payment request and enabled routing configuration to determine which routes are eligible.</p><div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Customer selection</strong><p>The customer chooses an eligible payment method.</p></div><div class="flow-box primary"><strong>Route evaluation</strong><p>Octra identifies eligible providers and evaluates routing rules.</p></div><div class="flow-box"><strong>Provider attempt</strong><p>The selected provider processes the payment.</p></div><div class="flow-box"><strong>Normalized result</strong><p>The merchant receives a consistent payment status.</p></div></div></div>`],
    ['categories','Payment-method categories',`<div class="table-wrap"><table><thead><tr><th>Category</th><th>Typical customer experience</th><th>Result model</th></tr></thead><tbody><tr><td><strong>Cards</strong></td><td>Card details, stored credential or token.</td><td>Immediate or authentication-dependent.</td></tr><tr><td><strong>Digital wallets</strong></td><td>Wallet selection and wallet authorization.</td><td>Immediate or customer-action dependent.</td></tr><tr><td><strong>Bank redirects</strong></td><td>Redirect to a bank or authorization service.</td><td>Usually asynchronous.</td></tr><tr><td><strong>Bank transfers</strong></td><td>Customer sends funds from a bank account.</td><td>Usually asynchronous.</td></tr><tr><td><strong>Real-time payments</strong></td><td>Bank, mobile or QR-based instant-payment flow.</td><td>Immediate or asynchronous confirmation.</td></tr><tr><td><strong>Buy now, pay later</strong></td><td>Customer selects a financing or installment option.</td><td>Provider and eligibility dependent.</td></tr><tr><td><strong>Direct debit</strong></td><td>Customer authorizes collection from a bank account.</td><td>Asynchronous.</td></tr><tr><td><strong>Local payment methods</strong></td><td>Market-specific customer experience.</td><td>Method-dependent.</td></tr></tbody></table></div>`],
    ['eligibility','Eligibility',`<p class="lead">A payment method should be presented only when it is eligible for the current payment.</p><div class="pill-row"><span class="pill">Merchant configuration</span><span class="pill">Customer country</span><span class="pill">Currency</span><span class="pill">Amount</span><span class="pill">Provider capability</span><span class="pill">Device or channel</span><span class="pill">Recurring requirements</span><span class="pill">Refund requirements</span></div>`],
    ['routing','Routing considerations',`<ul><li>Confirm that the provider supports the method in the required market and currency.</li><li>Confirm support for the requested payment and lifecycle operations.</li><li>Configure redirects, authentication and webhooks before activation.</li><li>Understand refund, cancellation and recurring-payment behavior.</li><li>Document provider-specific limits and operational conditions.</li></ul>`],
    ['sync-async-methods','Synchronous and asynchronous methods',`<p>Some payment methods return a final result during the initial flow. Others remain pending while the customer completes an external action or funds are confirmed.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Do not use a browser return as final confirmation.</strong><p>Use verified webhooks or server-side payment status retrieval before fulfilling an order.</p></div></div><div class="notice"><div class="callout-icon">→</div><div><strong>Use Apidog for exact implementation details.</strong><p>Payment-method identifiers, required fields, availability, action objects, webhook events, test values and result codes belong in the API Reference.</p></div></div>`]
  ]},
  'orchestration-cards':{area:'Product Guides / Payment Orchestration',label:'Cards',eyebrow:'Payment Methods',title:'Orchestrate card payments across enabled provider routes',subtitle:'Route card payments according to provider eligibility, card characteristics, authentication requirements and merchant configuration.',sections:[
    ['card-flow','How card payments work',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Collect and protect payment data</h3><p>Use the supported checkout model and tokenize or securely transmit card information.</p></div></div><div class="step"><div class="num">2</div><div><h3>Evaluate eligible routes</h3><p>Octra evaluates enabled providers and card-routing context.</p></div></div><div class="step"><div class="num">3</div><div><h3>Authenticate when required</h3><p>Complete the supported 3DS or customer-action flow.</p></div></div><div class="step"><div class="num">4</div><div><h3>Authorize and capture</h3><p>The selected provider processes authorization and configured capture behavior.</p></div></div><div class="step"><div class="num">5</div><div><h3>Normalize and notify</h3><p>Octra maps the result and communicates updates through API, inquiry and webhooks.</p></div></div></div>`],
    ['card-routing','Card routing context',`<div class="pill-row"><span class="pill">Card network</span><span class="pill">Issuer country</span><span class="pill">Card type</span><span class="pill">Currency</span><span class="pill">Amount</span><span class="pill">Authentication result</span><span class="pill">Stored-credential type</span><span class="pill">Provider health</span></div><p>Sensitive card data must not be exposed through general merchant metadata, logs or client applications.</p>`],
    ['auth-capture','Authentication and capture',`<div class="grid"><div class="card"><h3>Authentication</h3><p>A card can continue without challenge, require customer action, fail authentication or be declined after successful authentication. Authentication success does not guarantee authorization success.</p></div><div class="card"><h3>Automatic capture</h3><p>The supported amount is captured as part of the payment flow.</p></div><div class="card"><h3>Manual capture</h3><p>The amount is authorized first and captured later through a separate operation.</p></div><div class="card"><h3>Partial capture</h3><p>Only part of the authorized amount is captured where the route supports it.</p></div></div>`],
    ['stored-cards','Tokenization and stored credentials',`<p>Card details should be represented by supported tokens whenever possible. Stored-card scenarios can include customer-initiated, recurring, unscheduled merchant-initiated and delayed payments.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Classify stored credentials correctly.</strong><p>Use the required stored-credential and authentication context defined for the enabled payment model.</p></div></div>`],
    ['card-recovery','Failover, refunds and testing',`<p>A card decline should not automatically be retried through another provider. Distinguish temporary failures from permanent issuer declines, invalid information, authentication failures, fraud restrictions and unknown outcomes.</p><p>Test successful authorization, authentication success and failure, issuer decline, provider timeout, manual and partial capture, cancellation, refunds, stored-card payments and duplicate-request protection.</p><div class="notice"><div class="callout-icon">→</div><div><strong>Use Apidog for exact card fields.</strong><p>Test values, request schemas, status values and result codes belong in the API Reference.</p></div></div>`]
  ]},
  'orchestration-digital-wallets':{area:'Product Guides / Payment Orchestration',label:'Digital wallets',eyebrow:'Payment Methods',title:'Route enabled wallet payments through a consistent lifecycle',subtitle:'Support wallet authorization while preserving provider eligibility, routing and server-side payment confirmation.',sections:[
    ['wallet-flow','How wallet payments work',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Select the wallet</h3><p>The wallet is shown only when it is eligible for the merchant, market, device and currency.</p></div></div><div class="step"><div class="num">2</div><div><h3>Authorize in the wallet</h3><p>The customer authenticates or confirms the payment through the supported wallet experience.</p></div></div><div class="step"><div class="num">3</div><div><h3>Route the credential</h3><p>Octra selects an eligible provider route for the supported wallet credential.</p></div></div><div class="step"><div class="num">4</div><div><h3>Confirm server-side</h3><p>The merchant receives the normalized result through the supported server-side flow.</p></div></div></div>`],
    ['wallet-eligibility','Wallet eligibility',`<ul><li>The wallet is enabled for the merchant.</li><li>An eligible provider route is available.</li><li>The currency, device and browser are supported.</li><li>Required merchant-domain or application configuration is complete.</li><li>The selected checkout model supports the wallet flow.</li></ul>`],
    ['wallet-routing','Routing and failover considerations',`<p>The same wallet can have different capabilities across providers. Confirm market coverage, credentials, token handling, capture, refund and recurring-payment support.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Wallet credentials may not be portable.</strong><p>A wallet credential can be tied to a provider, route or transaction context. Do not assume it can be reused across every connected provider.</p></div></div>`],
    ['wallet-testing','Customer cancellation and testing',`<p>Distinguish customer cancellation, incomplete authorization, provider processing, provider decline, technical failure and confirmed success.</p><p>Test wallet visibility, compatible devices, customer approval and cancellation, provider decline, application return, webhook confirmation and refunds where supported.</p>`]
  ]},
  'orchestration-bank-redirects':{area:'Product Guides / Payment Orchestration',label:'Bank redirects',eyebrow:'Payment Methods',title:'Support bank-authorized redirect payments',subtitle:'Handle external bank authorization with reliable return, expiration and webhook behavior.',sections:[
    ['redirect-flow','How bank redirects work',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Create the payment</h3><p>Octra creates the payment through an eligible provider route.</p></div></div><div class="step"><div class="num">2</div><div><h3>Redirect the customer</h3><p>The customer receives the supported redirect or next-action instruction.</p></div></div><div class="step"><div class="num">3</div><div><h3>Authorize externally</h3><p>The customer authenticates with the bank or external payment service.</p></div></div><div class="step"><div class="num">4</div><div><h3>Confirm the result</h3><p>Octra receives provider confirmation and notifies the merchant.</p></div></div></div>`],
    ['return-result','Redirect URL vs payment result',`<p class="lead">A browser return shows that the customer returned from the external flow. It does not always prove that funds were authorized or received.</p><p>Before fulfillment, verify the payment using a signed webhook or server-side status inquiry and confirm the amount, currency and merchant reference.</p>`],
    ['redirect-states','Lifecycle, expiration and abandonment',`<div class="pill-row"><span class="pill">Requires action</span><span class="pill">Processing</span><span class="pill">Pending</span><span class="pill">Completed</span><span class="pill">Failed</span><span class="pill">Cancelled</span><span class="pill">Expired</span></div><p>Define behavior when the customer does not open the redirect, abandons authorization, returns without completion or the session expires.</p>`],
    ['redirect-failover','Routing and failover limitations',`<p>Routing can depend on customer country, bank, currency, amount, provider coverage and refund capability.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Redirect sessions are commonly provider-specific.</strong><p>After the customer enters the external flow, automatic failover may no longer be safe. An alternative route should normally be considered before a usable redirect is issued.</p></div></div>`],
    ['redirect-testing','Testing',`<p>Test redirect creation, successful authorization, cancellation, abandonment, expiration, delayed confirmation, duplicate return, duplicate webhook, provider failure before redirect and refund where supported.</p>`]
  ]},
  'orchestration-bank-transfers':{area:'Product Guides / Payment Orchestration',label:'Bank transfers',eyebrow:'Payment Methods',title:'Accept bank transfers through enabled provider routes',subtitle:'Create transfer instructions, match incoming funds and operate asynchronous confirmation and reconciliation.',sections:[
    ['transfer-flow','How bank transfers work',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Create instructions</h3><p>Octra creates the payment and supported transfer instructions.</p></div></div><div class="step"><div class="num">2</div><div><h3>Customer sends funds</h3><p>The customer uses the required bank details and payment reference.</p></div></div><div class="step"><div class="num">3</div><div><h3>Match the transfer</h3><p>The provider identifies the received funds using the supported reference.</p></div></div><div class="step"><div class="num">4</div><div><h3>Confirm asynchronously</h3><p>Octra updates the payment and notifies the merchant through a webhook.</p></div></div></div>`],
    ['instructions','Transfer instructions',`<p>Instructions can contain beneficiary information, bank details, payment reference, amount, currency and expiration. Creating instructions does not mean the payment has completed.</p>`],
    ['matching','Matching and reconciliation',`<div class="grid"><div class="card"><h3>Correct match</h3><p>Payment, merchant reference, customer transfer, amount and currency agree.</p></div><div class="card"><h3>Missing reference</h3><p>The received funds cannot be matched automatically.</p></div><div class="card"><h3>Amount exception</h3><p>The transfer can be underpaid, overpaid or sent in the wrong currency.</p></div><div class="card"><h3>Timing exception</h3><p>The transfer can arrive late or after the instruction expires.</p></div></div>`],
    ['transfer-failover','Routing, failover and returns',`<p>Routing can depend on customer and merchant country, currency, provider account coverage, confirmation time and reconciliation capability.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Do not create conflicting instructions.</strong><p>After transfer instructions are presented, moving the payment to another provider can create multiple valid destinations. Failover should normally happen before instructions are issued.</p></div></div><p>A return can require customer bank details or a separate payout process. Do not assume it behaves like a card refund.</p>`],
    ['transfer-testing','Testing',`<p>Test instruction creation, correct matching, delayed transfer, missing reference, underpayment, overpayment, duplicate transfer, expired instruction, return workflow and reconciliation exceptions.</p>`]
  ]},
  'orchestration-real-time-payments':{area:'Product Guides / Payment Orchestration',label:'Real-time payments',eyebrow:'Payment Methods',title:'Orchestrate real-time payment experiences',subtitle:'Support instant bank and account-based payments through QR, mobile, bank application or other enabled customer actions.',sections:[
    ['rtp-flow','How real-time payments work',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Create the payment</h3><p>Octra selects an eligible real-time payment route.</p></div></div><div class="step"><div class="num">2</div><div><h3>Present customer action</h3><p>The customer receives a QR code, bank application request, link or other supported action.</p></div></div><div class="step"><div class="num">3</div><div><h3>Approve the payment</h3><p>The customer authorizes the payment through the relevant network or application.</p></div></div><div class="step"><div class="num">4</div><div><h3>Confirm server-side</h3><p>Octra normalizes the network result and sends the relevant update.</p></div></div></div>`],
    ['rtp-expiration','Customer action and expiration',`<p>The checkout should clearly communicate the amount, currency, required customer action and expiration time. A new payment may be required after the instruction expires.</p>`],
    ['rtp-routing','Routing and result confirmation',`<p>Routing can depend on payment network, country, currency, provider availability, transaction limits and supported action type.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Fast does not mean final.</strong><p>Use the final verified webhook or server-side payment status before completing the merchant order.</p></div></div>`],
    ['rtp-failover','Failover and refunds',`<p>Customer-facing QR codes, links and application requests can be provider-specific. Failover should occur only when it does not create multiple active payment instructions.</p><p>Some methods support native refunds; others require a separate transfer or payout operation.</p>`],
    ['rtp-testing','Testing',`<p>Test customer-action creation, approval, rejection, expiration, delayed confirmation, duplicate callbacks, provider failure before and after customer action, refunds and reconciliation.</p>`]
  ]},
  'orchestration-bnpl':{area:'Product Guides / Payment Orchestration',label:'Buy now, pay later',eyebrow:'Payment Methods',title:'Offer enabled buy now, pay later options',subtitle:'Route eligible financing and installment experiences while preserving provider-specific approval and lifecycle rules.',sections:[
    ['bnpl-flow','How BNPL payments work',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Select BNPL</h3><p>The customer selects an eligible financing or installment option.</p></div></div><div class="step"><div class="num">2</div><div><h3>Begin provider experience</h3><p>The customer is redirected to or presented with the supported provider flow.</p></div></div><div class="step"><div class="num">3</div><div><h3>Evaluate eligibility</h3><p>The provider evaluates the customer and presents available terms.</p></div></div><div class="step"><div class="num">4</div><div><h3>Normalize the result</h3><p>Octra maps approval, decline or pending outcomes to the payment lifecycle.</p></div></div></div>`],
    ['bnpl-eligibility','Eligibility',`<p>Availability can depend on customer country, currency, amount, merchant category, product type, provider configuration and checkout channel.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Provider approval is required.</strong><p>The merchant should not promise a specific financing plan before the provider confirms customer eligibility.</p></div></div>`],
    ['bnpl-routing','Routing and capability considerations',`<div class="table-wrap"><table><thead><tr><th>Area</th><th>What to confirm</th></tr></thead><tbody><tr><td><strong>Coverage</strong></td><td>Market, currency and merchant-category availability.</td></tr><tr><td><strong>Eligibility</strong></td><td>Minimum and maximum amounts and customer conditions.</td></tr><tr><td><strong>Lifecycle</strong></td><td>Authorization, capture, cancellation and expiration behavior.</td></tr><tr><td><strong>Refunds</strong></td><td>Full and partial refund support.</td></tr><tr><td><strong>Operations</strong></td><td>Settlement, reporting and customer-support responsibilities.</td></tr></tbody></table></div>`],
    ['bnpl-failover','Failover limitations',`<p>A financing application belongs to the provider that evaluated the customer. After the customer begins the application, moving it automatically to another provider may not be appropriate. An alternative provider should normally be presented as a new customer-selected attempt.</p>`],
    ['bnpl-testing','Testing',`<p>Test eligible and ineligible customers, approval, decline, cancellation, pending decisions, capture, full and partial refunds, expiration and duplicate webhooks.</p>`]
  ]},
  'orchestration-direct-debit':{area:'Product Guides / Payment Orchestration',label:'Direct debit',eyebrow:'Payment Methods',title:'Collect payments under an authorized bank mandate',subtitle:'Operate asynchronous bank-account collections, mandates, returns and recurring-payment behavior.',sections:[
    ['dd-flow','How direct debit works',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Collect authorization</h3><p>The customer supplies required account information and accepts the mandate.</p></div></div><div class="step"><div class="num">2</div><div><h3>Create or verify mandate</h3><p>The supported mandate is prepared for collection.</p></div></div><div class="step"><div class="num">3</div><div><h3>Submit collection</h3><p>Octra sends the collection through an eligible provider.</p></div></div><div class="step"><div class="num">4</div><div><h3>Receive final updates</h3><p>The provider communicates completion, rejection or return asynchronously.</p></div></div></div>`],
    ['mandates','Mandates',`<p>A mandate records customer authorization for one or more collections. Depending on the method and market, it can be one-time, recurring, fixed amount, variable amount or merchant-initiated under agreed conditions.</p><p>Mandate information must be retained and used according to the applicable payment-method and regulatory requirements.</p>`],
    ['dd-lifecycle','Payment lifecycle',`<div class="pill-row"><span class="pill">Mandate required</span><span class="pill">Mandate active</span><span class="pill">Payment submitted</span><span class="pill">Processing</span><span class="pill">Completed</span><span class="pill">Rejected</span><span class="pill">Returned</span><span class="pill">Cancelled</span></div><div class="notice"><div class="callout-icon">!</div><div><strong>Initial completion may not be irreversible.</strong><p>Direct-debit payments can remain subject to return or customer dispute after submission or initial completion.</p></div></div>`],
    ['dd-routing','Routing and failover limitations',`<p>Routing should account for the direct-debit scheme, country, currency, mandate portability, collection timing, return window and recurring-payment requirements.</p><p>A mandate or bank token can be tied to a provider. A submitted collection should not be sent to another provider while its outcome remains unknown.</p>`],
    ['dd-testing','Testing',`<p>Test mandate creation and rejection, successful collection, insufficient funds, invalid account, customer cancellation, payment return, recurring collection, duplicate prevention, provider timeout and refunds where supported.</p>`]
  ]},
  'orchestration-local-payment-methods':{area:'Product Guides / Payment Orchestration',label:'Local payment methods',eyebrow:'Payment Methods',title:'Support market-specific payment preferences',subtitle:'Present eligible local payment experiences through one integration and one normalized payment lifecycle.',sections:[
    ['why-local','Why local payment methods matter',`<p class="lead">Customer payment preferences vary by market. Local methods can provide a familiar experience, support customers who do not use international cards and enable local currencies and payment networks.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Measure actual performance.</strong><p>No acceptance or conversion improvement should be assumed without comparing relevant merchant data.</p></div></div>`],
    ['local-category','Category and market view',`<p>A local payment method can also be a wallet, bank redirect, transfer, real-time payment or direct debit. This page provides the market and availability view; the category pages explain the underlying payment behavior.</p>`],
    ['directory','Local payment-method directory',`<div class="table-wrap"><table><thead><tr><th>Field</th><th>Description</th></tr></thead><tbody><tr><td><strong>Markets</strong></td><td>Countries or regions where the method is available.</td></tr><tr><td><strong>Currencies</strong></td><td>Supported transaction currencies.</td></tr><tr><td><strong>Category</strong></td><td>Wallet, redirect, transfer, real-time payment, direct debit or another model.</td></tr><tr><td><strong>Customer action</strong></td><td>Redirect, QR, application approval, bank instruction or another action.</td></tr><tr><td><strong>Confirmation</strong></td><td>Immediate or asynchronous result behavior.</td></tr><tr><td><strong>Expiration</strong></td><td>Whether the customer action or instruction expires.</td></tr><tr><td><strong>Recurring support</strong></td><td>Whether repeated merchant-initiated use is supported.</td></tr><tr><td><strong>Refund support</strong></td><td>Native refund, separate return or unsupported.</td></tr><tr><td><strong>Provider routes</strong></td><td>Configured providers that can process the method.</td></tr></tbody></table></div>`],
    ['local-async','Asynchronous behavior and failover',`<p>Many local methods require an external customer action or delayed confirmation. Store the payment ID, keep the order pending, verify webhooks and define expiration behavior.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Avoid duplicate payment instructions.</strong><p>After a customer receives a QR code, redirect, bank reference or payment link, automatically creating another active instruction can cause confusion or duplicate payment.</p></div></div>`],
    ['local-boundary','Documentation boundary',`<p>Only confirmed payment methods should be listed publicly. Use Apidog for exact identifiers, fields, country and currency codes, action payloads, webhook events, result codes and test values.</p><div class="notice"><div class="callout-icon">→</div><div><strong>Availability depends on configuration.</strong><p>Payment-method availability depends on connected providers, merchant configuration, market, currency and commercial scope.</p></div></div>`]
  ]},
  'orchestration-routing-overview':{area:'Product Guides / Payment Orchestration',label:'Routing overview',eyebrow:'Route and Optimize',title:'Control how each payment is routed',subtitle:'Combine eligibility, business rules, provider health and optimization objectives in a predictable routing process.',sections:[
    ['evaluation-order','Routing evaluation order',`<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Eligibility</strong><p>Exclude routes that cannot support the requested transaction.</p></div><div class="flow-box"><strong>Business rules</strong><p>Apply mandatory merchant and transaction conditions.</p></div><div class="flow-box"><strong>Health and optimization</strong><p>Evaluate availability, performance, cost or traffic allocation.</p></div><div class="flow-box primary"><strong>Final selection</strong><p>Select the highest-priority eligible payment route.</p></div></div></div>`],
    ['governance','Routing governance',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Prepare</h3><p>Define the objective, eligible providers and expected traffic.</p></div></div><div class="step"><div class="num">2</div><div><h3>Validate</h3><p>Check capability coverage, conflicts and default behavior.</p></div></div><div class="step"><div class="num">3</div><div><h3>Test</h3><p>Use representative test payments before production publication.</p></div></div><div class="step"><div class="num">4</div><div><h3>Publish and monitor</h3><p>Observe routing outcomes and roll back if the result is not acceptable.</p></div></div></div>`]
  ]},
  'orchestration-routing-strategies':{area:'Product Guides / Payment Orchestration',label:'Routing strategies',eyebrow:'Route and Optimize',title:'Routing strategies',subtitle:'Select the strategy that matches payment eligibility, business commitments, performance and cost objectives.',sections:[
    ['strategies','Available strategy patterns',`<div class="grid"><div class="card"><h3>Rule-based routing</h3><p>Select providers using currency, amount, payment method, country, card characteristics or merchant-defined context.</p></div><div class="card"><h3>Priority routing</h3><p>Evaluate providers in a defined order and use lower-priority routes only when eligible.</p></div><div class="card"><h3>Weighted routing</h3><p>Distribute eligible traffic using configured percentages.</p></div><div class="card"><h3>Health-based routing</h3><p>Exclude or reduce traffic to a provider when defined health conditions indicate degradation.</p></div><div class="card"><h3>Success-based routing</h3><p>Use relevant performance signals for comparable transaction segments.</p></div><div class="card"><h3>Cost-based routing</h3><p>Prefer lower-cost routes while preserving configured success and availability requirements.</p></div></div>`],
    ['priority-conflicts','Rule priority and conflicts',`<p class="lead">Routing must remain predictable when multiple rules match the same payment.</p><ul><li>Define which rule is evaluated first.</li><li>Define whether one or multiple rules can apply.</li><li>Provide a default route for unmatched transactions.</li><li>Define what happens when no provider is eligible.</li><li>Record the matched rule and selected route for auditability.</li><li>Maintain a safe rollback path for published changes.</li></ul>`]
  ]},
  'orchestration-failover-retries':{area:'Product Guides / Payment Orchestration',label:'Failover and retries',eyebrow:'Route and Optimize',title:'Recover eligible failures safely',subtitle:'Use failover and retry only when the payment outcome and provider rules allow another attempt.',sections:[
    ['difference','Failover and retry',`<div class="grid"><div class="card"><h3>Failover</h3><p>Submits an eligible payment to an alternative provider after a technical or recoverable route failure.</p></div><div class="card"><h3>Retry</h3><p>Creates another attempt after an eligible temporary failure or decline condition.</p></div></div><div class="notice"><div class="callout-icon">!</div><div><strong>Do not retry blindly.</strong><p>Repeating an ineligible transaction can create duplicate-payment risk, increase cost or conflict with provider and network rules.</p></div></div>`],
    ['eligibility','Recovery eligibility',`<div class="table-wrap"><table><thead><tr><th>May be eligible</th><th>Normally requires caution or customer action</th></tr></thead><tbody><tr><td>Provider unavailable</td><td>Invalid payment information</td></tr><tr><td>Connection failure</td><td>Closed account</td></tr><tr><td>Provider timeout after outcome recovery</td><td>Lost or stolen payment instrument</td></tr><tr><td>Temporary technical error</td><td>Confirmed fraud or compliance block</td></tr><tr><td>Eligible soft decline</td><td>Permanent issuer decline</td></tr></tbody></table></div>`],
    ['unknown-outcomes','Unknown outcomes',`<p class="lead">A timeout does not always mean that a provider failed to process the payment.</p><p>The provider may have processed the request even when a timely response was not received. Before moving an unknown payment to another provider, use the supported status inquiry, reconciliation or recovery mechanism to reduce duplicate-payment risk.</p>`]
  ]},
  'orchestration-payment-lifecycle':{area:'Product Guides / Payment Orchestration',label:'Unified payment lifecycle',eyebrow:'Understand Payments',title:'Unified payment lifecycle',subtitle:'Use a consistent payment model even when connected providers use different status names and transitions.',sections:[
    ['conceptual-states','Conceptual lifecycle',`<div class="pill-row"><span class="pill">Created</span><span class="pill">Requires payment method</span><span class="pill">Requires action</span><span class="pill">Processing</span><span class="pill">Authorized</span><span class="pill">Captured</span><span class="pill">Settling</span><span class="pill">Settled</span><span class="pill">Declined</span><span class="pill">Failed</span><span class="pill">Cancelled</span><span class="pill">Refunded</span><span class="pill">Reversed</span></div><div class="notice"><div class="callout-icon">i</div><div><strong>Use the API Reference for exact values.</strong><p>The API Reference is the source of truth for exact status names, terminal states and allowed operations.</p></div></div>`],
    ['state-actions','Lifecycle actions',`<div class="table-wrap"><table><thead><tr><th>Action</th><th>Lifecycle requirement</th></tr></thead><tbody><tr><td><strong>Capture</strong></td><td>Requires an eligible authorization and remaining capturable amount.</td></tr><tr><td><strong>Cancel or void</strong></td><td>Normally applies before capture or financial completion.</td></tr><tr><td><strong>Refund</strong></td><td>Requires an eligible captured amount and supported provider operation.</td></tr><tr><td><strong>Retry</strong></td><td>Requires an eligible failure and configured recovery behavior.</td></tr></tbody></table></div>`]
  ]},
  'orchestration-payment-attempts':{area:'Product Guides / Payment Orchestration',label:'Payment attempts',eyebrow:'Understand Payments',title:'Payments and provider attempts',subtitle:'Separate the merchant payment from each submission made to a connected provider.',sections:[
    ['payment-vs-attempt','Payment vs attempt',`<div class="table-wrap"><table><thead><tr><th>Object</th><th>Purpose</th></tr></thead><tbody><tr><td><strong>Payment</strong></td><td>The merchant-facing request to authorize or collect funds. Use this as the primary business object.</td></tr><tr><td><strong>Attempt</strong></td><td>A submission to one specific provider. Use attempts for routing, diagnostics and recovery history.</td></tr></tbody></table></div>`],
    ['attempt-history','Attempt history',`<div class="flow-diagram"><div class="flow-row"><div class="flow-box primary"><strong>Payment</strong><p>One merchant reference and one normalized lifecycle.</p></div><div class="flow-box"><strong>Attempt 1</strong><p>Provider A returns an eligible technical failure.</p></div><div class="flow-box"><strong>Attempt 2</strong><p>Provider B authorizes the payment.</p></div><div class="flow-box"><strong>Final result</strong><p>The payment is authorized and both attempts remain traceable.</p></div></div></div>`]
  ]},
  'orchestration-webhooks':{area:'Product Guides / Payment Orchestration',label:'Webhooks',eyebrow:'Understand Payments',title:'Receive reliable payment updates',subtitle:'Use verified server-side events to keep payment and order states synchronized.',sections:[
    ['source-of-truth','Source of payment truth',`<p class="lead">Client-side callbacks and browser redirect URLs should not be treated as the final source of payment truth.</p><p>Before fulfilling an order, verify the webhook signature, confirm the payment identifier, amount, currency and merchant reference, and ensure the event has not already been processed.</p>`],
    ['handling','Webhook handling principles',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Read and verify</h3><p>Read the raw body and verify the supported signature and timestamp.</p></div></div><div class="step"><div class="num">2</div><div><h3>Deduplicate</h3><p>Check the event identifier before applying a business action.</p></div></div><div class="step"><div class="num">3</div><div><h3>Store and acknowledge</h3><p>Store or enqueue the event and return the required successful HTTP response.</p></div></div><div class="step"><div class="num">4</div><div><h3>Process idempotently</h3><p>Update payment and order state without repeating financial or fulfillment actions.</p></div></div></div>`],
    ['delivery-behavior','Duplicates and event order',`<div class="grid"><div class="card"><h3>Duplicate events</h3><p>The same event may be delivered more than once. Store processed event identifiers.</p></div><div class="card"><h3>Event order</h3><p>Do not assume events always arrive in creation order. Confirm the current payment state before applying an older update.</p></div></div><div class="notice"><div class="callout-icon">→</div><div><strong>Implementation details belong in Apidog.</strong><p>Use the API Reference for exact signature headers, event types, payloads and delivery behavior.</p></div></div>`]
  ]},
  'orchestration-idempotency':{area:'Product Guides / Payment Orchestration',label:'Idempotency and duplicate prevention',eyebrow:'Understand Payments',title:'Safely repeat payment operations',subtitle:'Protect payment operations from duplicate requests, network timeouts and repeated user actions.',sections:[
    ['principle','Core principle',`<div class="notice"><div class="callout-icon">1</div><div><strong>Same operation, same idempotency key.</strong><p>Use a new idempotency key only when intentionally starting a new operation or payment attempt.</p></div></div><p>Duplicate requests can be caused by a network timeout, client retry, user double-click, page refresh, application restart or infrastructure retry.</p>`],
    ['persist','What the merchant should persist',`<div class="table-wrap"><table><thead><tr><th>Value</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Merchant reference</strong></td><td>Links the Octra payment to the merchant’s business record.</td></tr><tr><td><strong>Payment ID</strong></td><td>Supports status retrieval and lifecycle operations.</td></tr><tr><td><strong>Current attempt</strong></td><td>Preserves provider-level recovery context.</td></tr><tr><td><strong>Idempotency key</strong></td><td>Supports safe repetition of the same operation.</td></tr><tr><td><strong>Processed event IDs</strong></td><td>Prevents duplicate webhook processing.</td></tr></tbody></table></div>`],
    ['timeout-recovery','Timeout recovery',`<ol><li>Do not immediately create a new payment.</li><li>Repeat the same operation with the same idempotency key where supported.</li><li>Retrieve the payment using its stored payment or merchant reference.</li><li>Wait for the relevant webhook if the result remains asynchronous.</li><li>Start a new attempt only when the previous outcome is known and a new attempt is intended.</li></ol>`]
  ]},
  'orchestration-errors':{area:'Product Guides / Payment Orchestration',label:'Errors and result codes',eyebrow:'Understand Payments',title:'Errors and normalized results',subtitle:'Use consistent error categories to decide whether to correct, retry, inquire or request customer action.',sections:[
    ['categories','Error categories',`<div class="table-wrap"><table><thead><tr><th>Category</th><th>Recommended response</th></tr></thead><tbody><tr><td><strong>Validation</strong></td><td>Correct the request before trying again.</td></tr><tr><td><strong>Authentication</strong></td><td>Verify credentials, signing and environment configuration.</td></tr><tr><td><strong>Configuration</strong></td><td>Review enabled providers and payment capabilities.</td></tr><tr><td><strong>Unsupported operation</strong></td><td>Select a supported operation or provider route.</td></tr><tr><td><strong>Provider unavailable</strong></td><td>Follow configured recovery behavior or retry later.</td></tr><tr><td><strong>Provider timeout</strong></td><td>Retrieve payment status before starting another attempt.</td></tr><tr><td><strong>Issuer decline</strong></td><td>Follow normalized decline guidance; do not retry permanent declines.</td></tr><tr><td><strong>Authentication failure</strong></td><td>Request another eligible customer action or payment method.</td></tr><tr><td><strong>Duplicate request</strong></td><td>Retrieve the original operation using its reference.</td></tr><tr><td><strong>Internal error</strong></td><td>Use the correlation identifier during investigation.</td></tr></tbody></table></div>`],
    ['reference','Result-code boundary',`<div class="notice"><div class="callout-icon">→</div><div><strong>Use normalized categories for business behavior.</strong><p>The complete error list, exact codes, HTTP responses and provider diagnostic fields belong in the Payment Orchestration API Reference.</p></div></div>`]
  ]},
  'orchestration-transaction-timeline':{area:'Product Guides / Payment Orchestration',label:'Transaction timeline',eyebrow:'Operate Orchestration',title:'Understand the complete payment journey',subtitle:'Investigate routing, provider attempts, lifecycle actions and webhook delivery in chronological order.',sections:[
    ['timeline-events','Timeline events',`<div class="pill-row"><span class="pill">Payment created</span><span class="pill">Rules evaluated</span><span class="pill">Provider selected</span><span class="pill">Attempt created</span><span class="pill">Authentication requested</span><span class="pill">Provider response</span><span class="pill">Failover evaluated</span><span class="pill">Payment updated</span><span class="pill">Webhook delivered</span><span class="pill">Capture or refund</span></div>`],
    ['transparency','Routing transparency',`<p class="lead">Operational users should be able to understand which rule matched, why a provider was eligible, why failover occurred, which normalized result was produced and which webhook updates were delivered.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Protect sensitive diagnostics.</strong><p>Provider credentials and sensitive payment data must remain protected according to access permissions.</p></div></div>`]
  ]},
  'orchestration-provider-health':{area:'Product Guides / Payment Orchestration',label:'Provider health',eyebrow:'Operate Orchestration',title:'Monitor provider health',subtitle:'Use availability, latency and error signals to understand the infrastructure behind each route.',sections:[
    ['signals','Health signals',`<div class="grid three"><div class="card"><h3>Availability</h3><p>Whether the connection can receive and process supported operations.</p></div><div class="card"><h3>Timeout rate</h3><p>The share of attempts without a timely provider result.</p></div><div class="card"><h3>Technical errors</h3><p>Provider, transport and configuration failure patterns.</p></div><div class="card"><h3>Response latency</h3><p>How long provider responses take for comparable operations.</p></div><div class="card"><h3>Payment performance</h3><p>Normalized outcomes across relevant payment segments.</p></div><div class="card"><h3>Recovery</h3><p>When a degraded provider is ready to receive traffic again.</p></div></div>`],
    ['stability','Stable health decisions',`<p class="lead">A single failed transaction should not automatically change every route. Health-based routing should use defined thresholds, observation windows and recovery conditions to avoid unstable route switching.</p>`]
  ]},
  'orchestration-monitoring-alerts':{area:'Product Guides / Payment Orchestration',label:'Monitoring and alerts',eyebrow:'Operate Orchestration',title:'Monitoring and alerts',subtitle:'Detect provider degradation, routing failures and operational exceptions before they affect payment operations.',sections:[
    ['alerts','Recommended alert scenarios',`<div class="table-wrap"><table><thead><tr><th>Alert</th><th>Operational purpose</th></tr></thead><tbody><tr><td><strong>Provider unavailable</strong></td><td>Identify a route that cannot receive traffic.</td></tr><tr><td><strong>Timeout increase</strong></td><td>Detect delayed or unknown payment outcomes.</td></tr><tr><td><strong>Success degradation</strong></td><td>Identify a meaningful performance change in a comparable segment.</td></tr><tr><td><strong>No eligible route</strong></td><td>Detect capability or configuration gaps.</td></tr><tr><td><strong>Webhook delivery failure</strong></td><td>Prevent merchant payment and order state divergence.</td></tr><tr><td><strong>Routing rule failure</strong></td><td>Detect conflicts or invalid rule behavior.</td></tr><tr><td><strong>Reconciliation mismatch</strong></td><td>Identify differences between merchant, provider and financial records.</td></tr></tbody></table></div>`]
  ]},
  'orchestration-analytics-reconciliation':{area:'Product Guides / Payment Orchestration',label:'Analytics and reconciliation',eyebrow:'Operate Orchestration',title:'Analytics and reconciliation',subtitle:'Measure routing performance and compare merchant, provider and financial records.',sections:[
    ['metrics','Recommended metrics',`<div class="grid"><div class="card"><h3>Payment outcomes</h3><p>Payment success, authorization, decline and technical failure rates.</p></div><div class="card"><h3>Recovery performance</h3><p>Failover rate, failover recovery and retry recovery.</p></div><div class="card"><h3>Provider performance</h3><p>Timeout rate, response latency and availability by relevant segment.</p></div><div class="card"><h3>Operations</h3><p>Refund success, webhook delivery and reconciliation exception rates.</p></div></div>`],
    ['dimensions','Analysis dimensions',`<p class="lead">Analyze comparable payments by provider, payment method, currency, country, card network, issuer country, amount range, routing rule, authentication result, payment status and error category.</p>`],
    ['reconciliation','Reconciliation scope',`<p>Reconciliation should help identify missing transactions, amount or currency mismatches, duplicate records, missing captures, missing refunds, unexpected provider outcomes and settlement differences.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Scope depends on configuration.</strong><p>The exact reconciliation model depends on enabled providers and financial operations.</p></div></div>`]
  ]},
  'orchestration-api-integration':{area:'Product Guides / Payment Orchestration',label:'API integration',eyebrow:'Build Your Integration',title:'Build your API integration',subtitle:'Use Product Guides for payment behavior and Apidog for endpoint-level implementation details.',actions:[['api-reference','Open API Reference','primary'],['orchestration-first-payment','First orchestrated payment','']],sections:[
