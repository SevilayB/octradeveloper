function acquiringFlowDiagram(){return `<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Merchant onboarding</strong><p>The merchant relationship is created, validated and prepared for payment acceptance.</p></div><div class="flow-box"><strong>Merchant profile</strong><p>Business category, MCC, currencies, settlement model, pricing and operational rules are configured.</p></div><div class="flow-box"><strong>Terminal / MID / TID setup</strong><p>Acceptance identifiers and channel-specific settings define how transactions are processed and reported.</p></div><div class="flow-box"><strong>Acceptance channels</strong><p>E-commerce, POS, SoftPOS, wallets, marketplaces or other supported channels are enabled.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box primary"><strong>Acquiring transaction</strong><p>Payment activity is processed under the configured merchant and terminal acquiring relationship.</p></div><div class="flow-box"><strong>Batch / clearing preparation</strong><p>Transactions are grouped and prepared for downstream financial processing according to the operating model.</p></div><div class="flow-box"><strong>Settlement calculation</strong><p>Transaction amounts, fees, commissions, adjustments and settlement timing are calculated.</p></div><div class="flow-box"><strong>Reconciliation</strong><p>Transactions, batches, settlement records, fees and reports are matched for financial control.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box"><strong>Merchant reporting</strong><p>Operations, finance and merchant support teams review transaction, settlement and payout outputs.</p></div><div class="flow-box"><strong>Pricing and commission</strong><p>Commercial rules such as scheme fees, interchange, IC+, acquirer markup and merchant pricing are applied where relevant.</p></div><div class="flow-box"><strong>Disputes and chargebacks</strong><p>Issuer disputes, merchant responses, representment and financial adjustments are managed operationally.</p></div><div class="flow-box"><strong>Processing and reporting layers</strong><p>Processing infrastructure and reporting outputs continue according to the customer model.</p></div></div></div>`}

function issuingProgramOperatingModelDiagram(){return `<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Program setup</strong><p>Products, BINs, logos, customer types, limits, statements, interest and lifecycle rules are configured before runtime API calls.</p></div><div class="flow-box"><strong>Customer registration</strong><p>A KYC-completed customer is registered in Octra Issuing through the customer API flow.</p></div><div class="flow-box"><strong>Card issuance</strong><p>A card is created for the customer by referencing the predefined card product and program parameters.</p></div><div class="flow-box"><strong>Card format path</strong><p>The card becomes available as a virtual card or moves into physical card production depending on the program model.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box primary"><strong>Activation and security</strong><p>Physical cards are delivered and activated. PIN, CVV2 and 3DS password operations are handled according to security rules.</p></div><div class="flow-box"><strong>Authorization behavior</strong><p>Card status, customer status, balance, limits, MCC, channel controls and security requirements determine approval or decline.</p></div><div class="flow-box"><strong>Controls and operations</strong><p>Limits, card status, renewals, replacements, supplementary cards and operational actions are managed throughout the lifecycle.</p></div><div class="flow-box"><strong>Statements and reports</strong><p>Transactions, balances, statements, production outputs and lifecycle events feed reporting and investigation workflows.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box"><strong>Renewal</strong><p>Cards approaching expiry can follow renewal and production workflows where supported.</p></div><div class="flow-box"><strong>Replacement</strong><p>Lost, stolen, damaged or reissued cards can create replacement and secure delivery processes.</p></div><div class="flow-box"><strong>Closure</strong><p>Cards and cardholder relationships may be closed according to program and compliance rules.</p></div><div class="flow-box"><strong>Ongoing program operation</strong><p>The issuing program continues through monitoring, reporting, controls, support and configuration governance.</p></div></div></div>`}


function flowDiagram(){return `<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Customer checkout</strong><p>The buyer starts a digital payment from a website, app, marketplace, portal or hosted payment experience.</p></div><div class="flow-box"><strong>Choose checkout model</strong><p>The merchant, PSP or platform uses either its own checkout page or the Octra-hosted checkout page.</p></div><div class="flow-box"><strong>Merchant-hosted checkout</strong><p>The integrator controls the checkout UI and sends signed payment requests from its backend.</p></div><div class="flow-box"><strong>Octra-hosted checkout</strong><p>Octra provides the hosted payment experience where the customer enters payment details.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box"><strong>Merchant / PSP / Platform backend</strong><p>The integrator prepares the order, amount, currency, merchant context and payment references.</p></div><div class="flow-box primary"><strong>Octra Payment Gateway</strong><p>Octra receives the signed request or hosted checkout session and manages the payment lifecycle.</p></div><div class="flow-box"><strong>3DS authentication model</strong><p>The integrator uses Octra-managed 3DS or performs authentication through its own 3DS Server and submits the authentication result with the payment.</p></div><div class="flow-box"><strong>Authorize / Sale / Capture</strong><p>The payment is authorized, completed immediately as a sale, or captured after a previous authorization.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box"><strong>Payment result</strong><p>The integration receives or retrieves an approved, declined, failed, pending, cancelled or timeout outcome.</p></div><div class="flow-box"><strong>Lifecycle operations</strong><p>Inquiry, void, refund, transaction review, batch list and batch close are used when needed.</p></div><div class="flow-box"><strong>Result handling</strong><p>Merchant return page, backend inquiry, notifications or operational review keep order state aligned.</p></div><div class="flow-box"><strong>Downstream layers</strong><p>Acquiring, processing, reporting and reconciliation continue depending on the customer model.</p></div></div></div>`}

const pages = {
  home:{area:'Home',label:'Home',eyebrow:'Octra Developers',title:'Build on Octra payment infrastructure.',subtitle:'Use Product Guides to understand each platform capability, the business flow it supports and the integration path to follow.',sections:[['product-guides','Product Guides',`<div class="grid"><button class="card" data-page="payment-gateway" style="text-align:left"><div class="icon">G</div><h3>Payment Gateway</h3><p>Accept, authenticate, authorize and manage online payments through merchant-hosted or Octra-hosted checkout models.</p><span class="link">Open guide →</span></button><button class="card" data-page="acquiring" style="text-align:left"><div class="icon">A</div><h3>Acquiring</h3><p>Operate merchant acceptance, terminal setup, settlement, reconciliation and merchant finance.</p><span class="link">Open guide →</span></button><button class="card" data-page="issuing-overview" style="text-align:left"><div class="icon">I</div><h3>Issuing</h3><p>Launch and operate card programmes across customer, card and lifecycle operations.</p><span class="link">Open guide →</span></button><button class="card" data-page="processing" style="text-align:left"><div class="icon">P</div><h3>Processing</h3><p>Support authorization, clearing, settlement and transaction event infrastructure.</p><span class="link">Open guide →</span></button><button class="card" data-page="orchestration" style="text-align:left"><div class="icon">O</div><h3>Orchestration</h3><p>Route and optimize transactions across providers, acquirers, schemes and payment paths.</p><span class="link">Open guide →</span></button></div>`]]},

  'api-reference':{area:'Technical Reference',label:'API Reference',eyebrow:'Technical Reference',title:'API Reference',subtitle:'Use API Reference for endpoint-level implementation details while Product Guides explain business flows, operating models and integration decisions.',actions:[['gateway-request-signing','Review request signing','primary'],['gateway-result-codes','Result codes','']],sections:[
    ['what-belongs','What belongs in API Reference?',`<p class="lead">API Reference is the implementation source of truth for endpoint-level technical details. Use it when you need exact URLs, authentication headers, required parameters, request schemas, response schemas, payload examples, result codes and field-level error handling.</p><div class="grid"><div class="card"><h3>Endpoint URLs</h3><p>Find the exact operation path and HTTP method for each supported API.</p></div><div class="card"><h3>Authentication and headers</h3><p>Review required tokens, headers and signing requirements at implementation level.</p></div><div class="card"><h3>Request parameters</h3><p>Check required, optional and conditional fields before building a request.</p></div><div class="card"><h3>Response schemas</h3><p>Understand response objects, status fields, identifiers and next-action values.</p></div><div class="card"><h3>Payload examples</h3><p>Use example payloads to validate request structure during test integration.</p></div><div class="card"><h3>Result codes</h3><p>Map technical result codes and field-level errors to integration behavior.</p></div></div>`],
    ['guides-vs-reference','Product Guides vs API Reference',`<p class="lead">Product Guides and API Reference serve different purposes. Start with Product Guides to understand the business flow, then use API Reference to implement the exact API operation.</p><div class="table-wrap"><table><thead><tr><th>Product Guides</th><th>API Reference / Apidog</th></tr></thead><tbody><tr><td>Business flow and operating model</td><td>Endpoint URL and HTTP method</td></tr><tr><td>Integration decisions and responsibilities</td><td>Request headers, authentication and signing fields</td></tr><tr><td>Lifecycle explanation and next actions</td><td>Request and response schemas</td></tr><tr><td>Checkout, acquiring or issuing model boundaries</td><td>Parameters, data types and validation rules</td></tr><tr><td>Testing strategy and operational guidance</td><td>Payload examples, result codes and field-level errors</td></tr><tr><td>Guide-level terminology and concepts</td><td>Version-specific technical behavior</td></tr></tbody></table></div>`],
    ['api-areas','API areas',`<p class="lead">API areas follow the enabled Octra product scope. Some areas may be available only when the corresponding product, environment and configuration are enabled for the integrator.</p><div class="table-wrap"><table><thead><tr><th>API area</th><th>Used for</th><th>Implementation detail belongs in</th></tr></thead><tbody><tr><td><strong>Payment Gateway APIs</strong></td><td>Create, authenticate, authorize, capture, inquire, void, refund and manage gateway-level batch operations.</td><td>Payment Gateway API Reference / Apidog.</td></tr><tr><td><strong>Acquiring APIs</strong></td><td>Operate merchant onboarding, merchant profile, terminal setup, acquiring transactions, settlement, reconciliation, pricing and disputes where enabled.</td><td>Acquiring API Reference / Apidog.</td></tr><tr><td><strong>Issuing APIs</strong></td><td>Register customers, issue cards, manage card lifecycle, controls, limits, transactions and secure card operations.</td><td>Issuing API Reference / Apidog.</td></tr><tr><td><strong>Processing APIs</strong></td><td>Support authorization, clearing, settlement and transaction event infrastructure where part of the customer scope.</td><td>Processing API Reference / Apidog where available.</td></tr><tr><td><strong>Orchestration APIs</strong></td><td>Support routing, provider selection, failover and optimization workflows where enabled.</td><td>Orchestration API Reference / Apidog where available.</td></tr></tbody></table></div>`],
    ['how-to-use','How to use API Reference during integration',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Start from the Product Guide</h3><p>Confirm the business flow, integration model, responsibilities and prerequisites.</p></div></div><div class="step"><div class="num">2</div><div><h3>Confirm assigned environment access</h3><p>Use assigned test environment credentials and the correct product scope. Do not assume self-service access or unsupported APIs.</p></div></div><div class="step"><div class="num">3</div><div><h3>Open the relevant API area</h3><p>Use API Reference / Apidog to find the exact endpoint, headers, signing rules, request schema and response schema.</p></div></div><div class="step"><div class="num">4</div><div><h3>Implement and test the operation</h3><p>Validate happy-path and exception scenarios using the supported test environment and configured merchant, terminal or program values.</p></div></div><div class="step"><div class="num">5</div><div><h3>Map responses to operational behavior</h3><p>Use result codes, payment statuses, lifecycle states and inquiry/reporting flows to decide the next system action.</p></div></div></div>`],
    ['boundaries','Implementation boundaries',`<div class="notice"><div class="callout-icon">!</div><div><strong>API Reference is the endpoint-level source of truth.</strong><p>Product Guides do not replace API Reference. Required fields, conditional parameters, schemas, endpoint availability, version-specific behavior, sample payloads and result code lists should always be checked in API Reference / Apidog before implementation.</p></div></div><div class="notice"><div class="callout-icon">i</div><div><strong>Availability depends on product scope.</strong><p>API access depends on assigned credentials, enabled Octra products, merchant or program configuration, environment readiness and commercial or operational scope.</p></div></div>`],
    ['recommended-path','Recommended path',`<div class="grid three"><button class="card" data-page="payment-gateway" style="text-align:left"><h3>Payment Gateway guide</h3><p>Understand checkout, payment lifecycle, authentication and manage-payment flows before implementing gateway APIs.</p><span class="link">Open guide →</span></button><button class="card" data-page="acquiring" style="text-align:left"><h3>Acquiring guide</h3><p>Understand merchant, terminal, settlement, reconciliation, pricing and dispute operations before implementing acquiring APIs.</p><span class="link">Open guide →</span></button><button class="card" data-page="issuing-overview" style="text-align:left"><h3>Issuing guide</h3><p>Understand card program setup, customer registration, card issuance and authorization behavior before implementing issuing APIs.</p><span class="link">Open guide →</span></button></div>`]
  ]},


  'security-compliance':{area:'Security & Compliance',label:'Security & Compliance',eyebrow:'Security & Compliance',title:'Security & Compliance',subtitle:'Understand the security, compliance and responsibility model for building on Octra without relying on unsupported assumptions about certification, data retention or SLA commitments.',actions:[['gateway-request-signing','Review request signing','primary'],['gateway-3ds-authentication','3DS authentication models','']],sections:[
    ['overview','Security and compliance overview',`<p class="lead">Security and compliance responsibilities depend on the enabled Octra product scope, integration model, merchant setup, region, payment method and commercial agreement.</p><p>This hub brings together the guide-level principles that apply across Payment Gateway, Acquiring, Issuing, Processing and Orchestration. It explains where security controls fit, which responsibilities must be confirmed before production and which details belong in API Reference / Apidog or onboarding documentation.</p><div class="notice"><div class="callout-icon">!</div><div><strong>No unsupported certification claims</strong><p>This guide does not claim a specific PCI level, ISO certification, SOC report, uptime SLA or data retention period. Certification details, regional compliance scope and operational commitments must be confirmed during onboarding or commercial review.</p></div></div>`],
    ['responsibility-model','Responsibility model',`<p class="lead">A secure integration requires clear ownership between Octra and the integrator. The exact responsibility model depends on the selected product, checkout model, acquiring setup, issuing program and enabled features.</p><div class="table-wrap"><table><thead><tr><th>Area</th><th>Octra role</th><th>Integrator / customer role</th></tr></thead><tbody><tr><td><strong>API authentication</strong></td><td>Provides the supported authentication and request signing model for assigned environments.</td><td>Protect credentials, restrict access and sign requests correctly.</td></tr><tr><td><strong>Payment data handling</strong></td><td>Defines supported secure data handling patterns for the enabled integration model.</td><td>Confirm PCI scope based on checkout model, data collection approach and internal systems.</td></tr><tr><td><strong>3DS / SCA</strong></td><td>Supports configured authentication flows where enabled and applicable.</td><td>Choose the 3DS model, handle required outcomes and submit required authentication context correctly.</td></tr><tr><td><strong>Merchant-hosted checkout</strong></td><td>Processes signed payment requests and returns or exposes payment outcomes.</td><td>Own checkout UI, payment form behavior, order state and related security responsibilities.</td></tr><tr><td><strong>Octra-hosted checkout</strong></td><td>Provides the hosted payment experience where enabled.</td><td>Confirm result handling, merchant order state, operational support and final compliance scope.</td></tr><tr><td><strong>Acquiring finance operations</strong></td><td>Supports settlement, reconciliation, reporting and dispute workflows where enabled.</td><td>Review reports, reconcile records and manage operational exceptions.</td></tr><tr><td><strong>Issuing operations</strong></td><td>Supports configured card program, card lifecycle and secure card operations.</td><td>Ensure upstream onboarding, KYC, program configuration and customer eligibility are complete.</td></tr></tbody></table></div>`],
    ['authentication-signing','Authentication and request signing',`<p class="lead">API authentication and request signing protect operations that create, change or retrieve sensitive payment, merchant or card program data.</p><div class="grid"><div class="card"><h3>Assigned credentials</h3><p>Access is based on credentials assigned for the relevant environment and product scope.</p></div><div class="card"><h3>Request signing</h3><p>Signed requests help confirm that the request came from an expected integrator and was not changed in transit.</p></div><div class="card"><h3>Access control</h3><p>Credentials should be stored securely, rotated according to the agreed process and limited to authorized systems.</p></div><div class="card"><h3>API Reference boundary</h3><p>Exact headers, signing fields, token usage and payload rules belong in API Reference / Apidog.</p></div></div>`],
    ['pci-sensitive-data','PCI and sensitive payment data',`<p class="lead">PCI and sensitive payment data responsibilities depend on the selected integration model. The guide should not assume that one model removes all compliance obligations.</p><div class="table-wrap"><table><thead><tr><th>Integration model</th><th>Security and compliance consideration</th></tr></thead><tbody><tr><td><strong>Merchant-hosted checkout</strong></td><td>The merchant, PSP or platform has greater control over the checkout experience and may also carry greater responsibility for how payment data is collected, transmitted and protected.</td></tr><tr><td><strong>Octra-hosted checkout</strong></td><td>The hosted payment experience can reduce payment form implementation complexity, but final PCI scope and sensitive data responsibilities must be confirmed before production.</td></tr><tr><td><strong>Issuing secure operations</strong></td><td>PAN, PIN, CVV2, 3DS password and other sensitive card data should be handled only through supported secure flows and access-controlled operations.</td></tr></tbody></table></div><div class="notice"><div class="callout-icon">i</div><div><strong>Confirm PCI scope before go-live.</strong><p>PCI scope depends on payment data collection, storage, transmission, checkout model, hosted-page usage and customer environment design.</p></div></div>`],
    ['three-ds-sca','3DS and SCA',`<p class="lead">3DS and SCA are part of the online payment authentication and compliance model. Depending on region, card, issuer, acquirer, risk rules and transaction type, authentication may be required before authorization or completion.</p><div class="grid"><div class="card"><h3>Octra-managed 3DS</h3><p>Where enabled, the gateway flow can use Octra-managed 3DS authentication.</p></div><div class="card"><h3>Own 3DS Server</h3><p>Integrators that operate their own 3DS Server remain responsible for performing authentication correctly and providing the required result data.</p></div><div class="card"><h3>SCA exemptions</h3><p>Exemptions may reduce friction, but they do not guarantee frictionless approval. Issuers may still challenge or decline.</p></div><div class="card"><h3>Stored credentials</h3><p>COF, recurring and MIT scenarios require correct classification and authentication context according to the enabled model.</p></div></div>`],
    ['data-protection-retention','Data protection and retention',`<p class="lead">Data protection, data residency, retention periods and access rules depend on the enabled product scope, region, commercial agreement and regulatory requirements.</p><div class="notice"><div class="callout-icon">→</div><div><strong>Confirm during onboarding.</strong><p>Retention periods, data residency expectations, production access rules, reporting access and audit requirements should be confirmed during onboarding and production readiness review.</p></div></div>`],
    ['auditability-controls','Auditability and operational controls',`<p class="lead">Security and compliance controls should support operational traceability across payment, acquiring and issuing workflows.</p><div class="table-wrap"><table><thead><tr><th>Control area</th><th>Purpose</th></tr></thead><tbody><tr><td><strong>Credential access</strong></td><td>Restrict which systems and users can access credentials or integration secrets.</td></tr><tr><td><strong>Operational actions</strong></td><td>Track important actions such as refund, void, batch close, merchant status changes and card lifecycle changes.</td></tr><tr><td><strong>Reporting access</strong></td><td>Control who can access transaction, settlement, reconciliation, dispute and card program reports.</td></tr><tr><td><strong>Exception handling</strong></td><td>Support investigation of timeouts, mismatched records, declined authorizations and disputed transactions.</td></tr></tbody></table></div>`],
    ['production-readiness','What must be confirmed before production',`<p class="lead">Before production, integrators should confirm the security and compliance responsibilities that apply to their enabled product scope.</p><div class="steps"><div class="step"><div class="num">1</div><div><h3>Assigned credentials and access permissions</h3><p>Confirm who can access the environment, credentials and operational systems.</p></div></div><div class="step"><div class="num">2</div><div><h3>Request signing implementation</h3><p>Validate signing rules and error handling in the target environment.</p></div></div><div class="step"><div class="num">3</div><div><h3>PCI and sensitive data responsibility</h3><p>Confirm payment data collection, storage, transmission and masking responsibilities.</p></div></div><div class="step"><div class="num">4</div><div><h3>3DS model and SCA handling</h3><p>Confirm whether Octra-managed 3DS or own 3DS Server is used and how outcomes are handled.</p></div></div><div class="step"><div class="num">5</div><div><h3>Reporting and reconciliation ownership</h3><p>Confirm who reviews reports, reconciles records and manages finance exceptions.</p></div></div><div class="step"><div class="num">6</div><div><h3>Operational support and escalation</h3><p>Confirm support ownership, incident handling and production readiness contacts.</p></div></div></div>`],
    ['implementation-boundary','Implementation boundary',`<div class="notice"><div class="callout-icon">!</div><div><strong>Keep certification and legal details outside guide-level assumptions.</strong><p>Specific certifications, contractual compliance obligations, data retention periods, SLA commitments and region-specific legal requirements should be confirmed through Octra onboarding, commercial review or the applicable legal and compliance documentation.</p></div></div>`]
  ]},
  'payment-gateway':{area:'Product Guides / Payment Gateway',label:'Overview',eyebrow:'Payment Gateway',title:'Accept, authenticate and manage digital payments with Octra Payment Gateway',subtitle:'Octra Payment Gateway is the secure online payment acceptance layer for merchants, PSPs, platforms and regulated institutions that need to process digital payments through signed server-to-server API integration.',actions:[['gateway-model-flow','View gateway flow','primary'],['gateway-who-uses','Who uses it','']],sections:[
    ['what-is','What is Octra Payment Gateway?',`<p class="lead">Octra Payment Gateway sits between the customer-facing checkout experience and the downstream payment infrastructure. It enables merchants, PSPs and platforms to initiate payments, authenticate cardholders, authorize or capture transactions, manage voids and refunds, investigate payment status and operate batch-level payment workflows.</p><p>The gateway supports merchant-hosted and Octra-hosted checkout, Click to Pay, Apple Pay, Google Pay, subscriptions and recurring payments. It also supports authentication and risk capabilities such as 3DS, SCA exemption handling and Address Verification Service (AVS), subject to merchant, acquirer, region and payment method configuration.</p><p>The gateway is used when the business need is to accept and manage digital payments through API integration. It does not replace acquiring, processing or orchestration. Instead, it connects payment activity to those Octra platform layers where the customer model requires settlement, reconciliation, routing or deeper processing operations.</p><div class="notice"><div class="callout-icon">→</div><div><strong>In one sentence</strong><p>Payment Gateway is the online payment acceptance and lifecycle management layer of the Octra platform.</p></div></div>`],
    ['key-benefits','Key benefits',`<p class="lead">Octra Payment Gateway helps merchants, PSPs and platforms accept and manage digital payments through a secure gateway layer that supports multiple payment methods, checkout, authentication and payment lifecycle models.</p><div class="grid"><div class="card"><h3>Offer modern payment methods</h3><p>Support Click to Pay, Apple Pay and Google Pay alongside online card payments.</p></div><div class="card"><h3>Support multiple checkout models</h3><p>Use merchant-hosted checkout, Octra-hosted checkout or PSP/platform payment flows.</p></div><div class="card"><h3>Use authentication and risk controls</h3><p>Combine 3DS, SCA exemption handling and AVS according to the configured payment flow.</p></div><div class="card"><h3>Manage the payment lifecycle</h3><p>Operate Sale, PreAuth, Capture/PostAuth, Void, Refund and Inquiry flows.</p></div><div class="card"><h3>Support subscriptions</h3><p>Handle initial customer consent, stored credentials, recurring billing and merchant-initiated payments.</p></div><div class="card"><h3>Connect to downstream operations</h3><p>Feed acquiring, processing, reporting and reconciliation flows according to the customer model.</p></div></div>`],
    ['who-uses','Who uses Payment Gateway?',`<div class="table-wrap"><table><thead><tr><th>User / customer type</th><th>Primary need</th><th>Typical payment challenge</th></tr></thead><tbody><tr><td><strong>Merchants</strong></td><td>Accept online payments and manage follow-up actions.</td><td>Handling authorization, 3DS, refunds, voids, status checks and batch operations from one integration.</td></tr><tr><td><strong>PSPs</strong></td><td>Connect and operate multiple merchants through a gateway layer.</td><td>Managing merchant-specific payment flows without building separate payment infrastructure for each merchant.</td></tr><tr><td><strong>Platforms and marketplaces</strong></td><td>Process payments for sellers, tenants, members or business units.</td><td>Coordinating order references, merchant context, payment outcomes and operational support.</td></tr><tr><td><strong>Fintechs and EMIs</strong></td><td>Add digital payment acceptance to financial products.</td><td>Launching payment flows while keeping authentication, lifecycle and reporting responsibilities clear.</td></tr><tr><td><strong>Enterprise and public sector</strong></td><td>Centralize online payment acceptance for high-volume services.</td><td>Reducing operational fragmentation across channels, departments, regions or payment scenarios.</td></tr></tbody></table></div>`],
    ['business-value','Business value',`<div class="grid"><div class="card"><h3>Accept digital payments</h3><p>Enable online card and digital payment flows through a secure gateway integration.</p></div><div class="card"><h3>Reduce payment complexity</h3><p>Use one payment acceptance layer for initiation, authentication, authorization, completion and follow-up operations.</p></div><div class="card"><h3>Support multiple business models</h3><p>Serve merchants, PSPs, platforms, marketplaces, fintechs and regulated institutions from the same gateway model.</p></div><div class="card"><h3>Manage the full payment lifecycle</h3><p>Handle Sale, PreAuth, Capture/PostAuth, 3DS, inquiry, void, refund, batch list and batch close flows.</p></div><div class="card"><h3>Improve operational visibility</h3><p>Use transaction lookup, status inquiry and batch views to understand what happened to each payment.</p></div><div class="card"><h3>Connect to downstream operations</h3><p>Feed acquiring, processing, reporting and reconciliation flows where the customer model requires them.</p></div></div>`],
    ['checkout-model-options','Checkout model options',`<p class="lead">Octra Payment Gateway can support both customer-owned checkout experiences and Octra-hosted payment experiences. This allows customers to choose between full checkout control and faster payment page implementation depending on their operating model, security responsibilities and desired customer experience.</p><div class="table-wrap"><table><thead><tr><th>Model</th><th>Who controls the checkout UI?</th><th>Best for</th><th>Main value</th></tr></thead><tbody><tr><td><strong>Merchant-hosted checkout</strong></td><td>Merchant, PSP or platform</td><td>Businesses that want full control over checkout design, customer journey and backend payment logic.</td><td>Maximum UX control and direct server-to-server payment flow.</td></tr><tr><td><strong>Octra-hosted checkout</strong></td><td>Octra</td><td>Businesses that want a faster route to payment acceptance without building and maintaining the full payment form themselves.</td><td>Faster implementation and reduced payment form complexity.</td></tr><tr><td><strong>PSP / platform model</strong></td><td>PSP or platform, with Octra gateway processing</td><td>PSPs and platforms that process payments for multiple merchants, sellers or business units.</td><td>Portfolio-level payment acceptance through one gateway layer.</td></tr></tbody></table></div>`],
    ['industry-fit','Where it is used most',`<p class="lead">Payment Gateway is most valuable wherever digital payment acceptance must be reliable, secure, traceable and operationally manageable across merchants, platforms or regulated environments.</p><div class="grid three"><div class="card"><h3>E-commerce</h3><p>Online card payments, 3DS, refunds, status checks and order-linked payment operations.</p></div><div class="card"><h3>Travel, airlines and airports</h3><p>High-volume online payments, partial operational follow-up, refunds and batch-level controls.</p></div><div class="card"><h3>Marketplaces and platforms</h3><p>Payment flows across sellers, merchants, tenants or business units.</p></div><div class="card"><h3>Fintechs and EMIs</h3><p>Digital product payment acceptance with clear API responsibilities.</p></div><div class="card"><h3>Enterprise billing</h3><p>Centralized payment acceptance for multiple brands, channels or regions.</p></div><div class="card"><h3>Public sector payments</h3><p>Secure collection flows where auditability, status and operational traceability matter.</p></div></div>`],
    ['gateway-flow','Gateway model flow',flowDiagram()],
    ['lifecycle','How the payment lifecycle works',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Payment settings are ready</h3><p>Merchant, terminal, currency, payment method and 3DS rules are configured before runtime processing.</p></div></div><div class="step"><div class="num">2</div><div><h3>Payment is initiated</h3><p>The merchant, PSP or platform sends a signed API request with order, amount, currency and merchant context.</p></div></div><div class="step"><div class="num">3</div><div><h3>Authentication is performed if required</h3><p>3DS or other authentication outcomes are handled depending on region, card and merchant configuration.</p></div></div><div class="step"><div class="num">4</div><div><h3>Payment is authorized or completed</h3><p>The flow may complete as Sale or continue from PreAuth to Capture/PostAuth depending on the payment model.</p></div></div><div class="step"><div class="num">5</div><div><h3>Payment operations are managed</h3><p>Use inquiry, void, refund, transaction review, batch list and batch close when operationally required.</p></div></div><div class="step"><div class="num">6</div><div><h3>Downstream operations continue</h3><p>Acquiring, processing, reporting and reconciliation continue according to the customer’s Octra model.</p></div></div></div>`],
    ['integration-speed','How fast can teams integrate?',`<p class="lead">Octra Payment Gateway is designed for technical teams that receive assigned test environment credentials and need to validate a working payment flow quickly. A successful test payment can be targeted early in the integration when merchant, terminal, payment method and environment configuration are already prepared.</p><div class="value-strip"><div class="metric-card"><span>First milestone</span><strong>Connectivity</strong><p>Validate credentials, base URL, headers and request signing.</p></div><div class="metric-card"><span>Next milestone</span><strong>Test payment</strong><p>Create a payment and handle an approved or declined outcome.</p></div><div class="metric-card"><span>Operational milestone</span><strong>Lifecycle</strong><p>Validate 3DS, inquiry, refund, void and batch scenarios.</p></div><div class="metric-card"><span>Production milestone</span><strong>Readiness</strong><p>Confirm merchant setup, compliance, support, reporting and operational ownership.</p></div></div><div class="notice"><div class="callout-icon">i</div><div><strong>Production timing varies.</strong><p>Production readiness depends on merchant setup, payment method scope, 3DS requirements, certification, risk review, compliance obligations and operational readiness.</p></div></div>`],
    ['recommended-path','Recommended path',`<div class="steps"><button class="step" data-page="gateway-integration-models" style="border:0;border-bottom:1px solid var(--border);width:100%;text-align:left;cursor:pointer"><div class="num">1</div><div><h3>Choose your integration model</h3><p>Decide whether to use merchant-hosted checkout, Octra-hosted checkout or PSP/platform processing.</p></div></button><button class="step" data-page="gateway-first-api-request" style="border:0;border-bottom:1px solid var(--border);width:100%;text-align:left;cursor:pointer"><div class="num">2</div><div><h3>First API request</h3><p>Validate credentials, environment and request signing.</p></div></button><button class="step" data-page="gateway-create-payment" style="border:0;border-bottom:1px solid var(--border);width:100%;text-align:left;cursor:pointer"><div class="num">3</div><div><h3>Create a payment</h3><p>Start the customer-facing payment flow.</p></div></button><button class="step" data-page="gateway-authenticate-payment" style="border:0;border-bottom:1px solid var(--border);width:100%;text-align:left;cursor:pointer"><div class="num">4</div><div><h3>Authenticate if required</h3><p>Handle 3DS or required authentication outcomes.</p></div></button><button class="step" data-page="gateway-complete-payment" style="border:0;border-bottom:1px solid var(--border);width:100%;text-align:left;cursor:pointer"><div class="num">5</div><div><h3>Complete the payment</h3><p>Use Sale or Capture/PostAuth depending on the payment type.</p></div></button><button class="step" data-page="gateway-transactions" style="border:0;width:100%;text-align:left;cursor:pointer"><div class="num">6</div><div><h3>Manage payment operations</h3><p>Use transaction review, inquiry, void, refund and batch operations as needed.</p></div></button></div>`]
  ]},

  'gateway-what-it-does':{area:'Product Guides / Payment Gateway',label:'What the gateway does',eyebrow:'Understand Payment Gateway',title:'What the gateway does',subtitle:'Understand the payment gateway model before looking at individual payment APIs.',sections:[
    ['role','Core role',`<p class="lead">A payment gateway is the secure layer that receives a payment request from a merchant, PSP or platform and manages the payment journey until a result or next action is available. It turns a customer checkout event into a controlled payment operation.</p><p>In Octra, the gateway is responsible for the online payment acceptance journey: creation, authentication, authorization, completion, operational inquiry, void, refund, transaction review and batch workflows. It is the customer-facing entry point into the wider Octra payment infrastructure.</p>`],
    ['problems','Business problems it solves',`<div class="grid"><div class="card"><h3>Fragmented payment operations</h3><p>Moves core payment lifecycle actions into one documented gateway journey.</p></div><div class="card"><h3>Unclear payment outcomes</h3><p>Uses inquiry, statuses and result handling patterns to resolve timeouts and uncertain responses.</p></div><div class="card"><h3>Authentication complexity</h3><p>Connects online payments to 3DS flows where required by the payment model.</p></div><div class="card"><h3>Operational follow-up</h3><p>Supports void, refund, transaction review, batch list and batch close where applicable.</p></div></div>`]
  ]},
  'gateway-who-uses':{area:'Product Guides / Payment Gateway',label:'Who uses it',eyebrow:'Understand Payment Gateway',title:'Who uses Payment Gateway?',subtitle:'Identify whether Payment Gateway is the right guide for your business model.',sections:[
    ['audiences','Audience matrix',`<div class="table-wrap"><table><thead><tr><th>Audience</th><th>Why they use Payment Gateway</th><th>Common next step</th></tr></thead><tbody><tr><td><strong>Direct merchant</strong></td><td>Accept online payments and manage payment lifecycle operations from its own backend.</td><td>Server-to-server integration.</td></tr><tr><td><strong>PSP</strong></td><td>Connect a portfolio of merchants to Octra payment capabilities.</td><td>PSP / platform model.</td></tr><tr><td><strong>Marketplace or platform</strong></td><td>Coordinate payments across merchants, sellers or business units.</td><td>Merchant context and operational model design.</td></tr><tr><td><strong>Fintech / EMI</strong></td><td>Add payment acceptance to digital financial services.</td><td>Payment method, compliance and reporting scope.</td></tr><tr><td><strong>Enterprise</strong></td><td>Standardize digital payment acceptance across channels, departments or markets.</td><td>Integration model and operational ownership.</td></tr></tbody></table></div>`]
  ]},
  'gateway-business-value':{area:'Product Guides / Payment Gateway',label:'Business value',eyebrow:'Understand Payment Gateway',title:'Business value',subtitle:'Position the gateway by the business outcomes it enables, not only by the APIs it exposes.',sections:[
    ['value','Value drivers',`<div class="grid"><div class="card"><h3>Faster payment launch</h3><p>Start with assigned credentials and a consistent server-to-server request model.</p></div><div class="card"><h3>Higher operational control</h3><p>Track payment states and use defined next actions for inquiry, void, refund and batch operations.</p></div><div class="card"><h3>Secure payment acceptance</h3><p>Use signed API requests and supported authentication flows such as 3DS where required.</p></div><div class="card"><h3>Multi-model fit</h3><p>Support direct merchants, PSPs, platforms, marketplaces and enterprise payment flows.</p></div><div class="card"><h3>Downstream visibility</h3><p>Connect payment activity to reporting, reconciliation, acquiring and processing where applicable.</p></div><div class="card"><h3>Operational scalability</h3><p>Use transaction, inquiry and batch operations to support higher-volume payment environments.</p></div></div>`]
  ]},
  'gateway-industry-use-cases':{area:'Product Guides / Payment Gateway',label:'Industry use cases',eyebrow:'Understand Payment Gateway',title:'Industry use cases',subtitle:'Understand where Payment Gateway creates the clearest business value.',sections:[
    ['industries','Where Payment Gateway is most commonly used',`<div class="table-wrap"><table><thead><tr><th>Industry / model</th><th>Use case</th><th>Gateway capabilities used</th></tr></thead><tbody><tr><td><strong>E-commerce</strong></td><td>Online checkout and card-not-present payment acceptance.</td><td>Create payment, 3DS, sale, refund, inquiry.</td></tr><tr><td><strong>Airlines and travel</strong></td><td>High-volume booking payments, follow-up refunds and batch operations.</td><td>Sale, PreAuth, Capture, refund, status, batch close.</td></tr><tr><td><strong>Marketplaces</strong></td><td>Payments across sellers, merchants or business units.</td><td>Merchant context, platform model, transaction tracking.</td></tr><tr><td><strong>Fintech / EMI</strong></td><td>Digital financial products that need embedded payment acceptance.</td><td>Server-to-server API, 3DS, inquiry, reporting handoff.</td></tr><tr><td><strong>Public sector</strong></td><td>Secure online collection flows with auditability and result tracking.</td><td>Payment status, transaction review, result codes.</td></tr><tr><td><strong>Cross-border commerce</strong></td><td>Regional payment acceptance and operational traceability.</td><td>Currency scope, merchant setup, status and reporting integration.</td></tr></tbody></table></div>`]
  ]},
  'gateway-model-flow':{area:'Product Guides / Payment Gateway',label:'Gateway model flow',eyebrow:'Understand Payment Gateway',title:'Gateway model flow',subtitle:'See how customer checkout, merchant systems, Octra Gateway and downstream operations connect.',sections:[
    ['diagram','End-to-end gateway model',flowDiagram()],
    ['read','How to read this flow',`<p class="lead">The gateway is not just a Sale endpoint. It is the controlled payment acceptance layer between customer checkout and the wider payment infrastructure. The integrator sends the signed payment request; Octra manages the payment lifecycle; downstream Octra layers continue processing, settlement, reconciliation or routing depending on the customer’s model.</p>`]
  ]},
  'gateway-integration-models':{area:'Product Guides / Payment Gateway',label:'Integration models',eyebrow:'Understand Payment Gateway',title:'Integration models',subtitle:'Choose whether the customer owns the checkout page, uses an Octra-hosted payment experience or operates a PSP/platform model.',sections:[
    ['models','Supported checkout and platform models',`<p class="lead">Octra Payment Gateway supports more than one checkout operating model. A customer can keep its own checkout page and connect to Octra through signed server-to-server requests, or use an Octra-hosted checkout page where Octra provides the payment experience. PSPs and platforms can also use the gateway to process payments for multiple merchants or sellers.</p><div class="table-wrap"><table><thead><tr><th>Integration model</th><th>Best for</th><th>Who owns the checkout UI?</th><th>Responsibility model</th></tr></thead><tbody><tr><td><strong>Merchant-hosted checkout</strong></td><td>Merchants, PSPs and platforms that want full control over the checkout journey.</td><td>Merchant, PSP or platform</td><td>The integrator controls the checkout experience, sends signed payment requests to Octra and handles payment state, order state and follow-up actions.</td></tr><tr><td><strong>Octra-hosted checkout</strong></td><td>Customers that want a faster implementation path or prefer not to build and maintain the full payment form directly.</td><td>Octra</td><td>The merchant prepares the order and creates a hosted checkout session. Octra hosts the payment experience and returns or exposes the payment result for merchant follow-up.</td></tr><tr><td><strong>PSP / platform model</strong></td><td>PSPs and platforms connecting multiple merchants, sellers, tenants or business units to Octra Gateway.</td><td>PSP or platform, with Octra gateway processing</td><td>The PSP or platform manages merchant context, seller references, order ownership, support flows and operational reporting across the portfolio.</td></tr></tbody></table></div>`],
    ['decision-guide','Choose the right integration model',`<p class="lead">The right integration model depends on how much checkout control you need, who owns the payment form, how you want to manage 3DS authentication, and whether you process payments for a single merchant or a portfolio of merchants.</p><div class="table-wrap"><table><thead><tr><th>Decision question</th><th>Merchant-hosted checkout</th><th>Octra-hosted checkout</th><th>PSP / platform model</th></tr></thead><tbody><tr><td><strong>Who owns the checkout UI?</strong></td><td>Merchant, PSP or platform owns the checkout page and payment journey.</td><td>Octra provides the hosted payment experience.</td><td>PSP or platform owns the portfolio-level journey and merchant context.</td></tr><tr><td><strong>Do you need full UX control?</strong></td><td>Best fit when full checkout design and customer journey control are required.</td><td>Best fit when speed and simplicity are more important than full UI control.</td><td>Best fit when one platform experience must serve multiple merchants or sellers.</td></tr><tr><td><strong>Who handles payment form complexity?</strong></td><td>The integrator handles the payment form and related implementation responsibilities.</td><td>Octra-hosted experience reduces the need to build and maintain the full payment form directly.</td><td>The PSP or platform defines whether the payment form is owned by the platform or delegated to Octra-hosted checkout.</td></tr><tr><td><strong>3DS model fit</strong></td><td>Can use Octra-managed 3DS or an integrator-owned 3DS Server.</td><td>Octra-managed 3DS is usually the natural fit where Octra controls the hosted experience.</td><td>Can centralize 3DS through the PSP/platform or use Octra-managed 3DS for selected flows.</td></tr><tr><td><strong>Best for</strong></td><td>Custom checkout, enterprise payment flows, PSP-owned UI and advanced backend control.</td><td>Faster launch, simpler payment page implementation and Octra-controlled payment detail collection.</td><td>Multiple merchants, sellers, tenants, business units or portfolio-level payment operations.</td></tr></tbody></table></div><div class="grid three"><div class="card"><h3>Choose Merchant-hosted checkout when...</h3><p>You need full control over checkout design, customer journey, payment form behavior and backend payment logic. This model also fits customers that already operate their own checkout layer or want to use their own 3DS Server.</p></div><div class="card"><h3>Choose Octra-hosted checkout when...</h3><p>You want a faster path to online payment acceptance, prefer Octra to provide the hosted payment experience and do not want to build or maintain the full payment page directly.</p></div><div class="card"><h3>Choose PSP / platform model when...</h3><p>You process payments for multiple merchants, sellers, tenants or business units and need merchant context, platform references, portfolio-level operations and scalable support flows.</p></div></div><div class="notice"><div class="callout-icon">!</div><div><strong>Confirm responsibilities before implementation.</strong><p>Checkout model affects PCI, payment data handling, 3DS continuation, result handling, refunds, voids, batch operations and support ownership. Octra-hosted checkout can reduce payment form implementation complexity, but compliance and operational responsibilities must be confirmed according to the final implementation model.</p></div></div>`],
    ['capability-matrix','Capability matrix by integration model',`<p class="lead">Use this matrix to compare which Gateway capabilities are typically used in each integration model. Final availability depends on merchant setup, payment method scope, 3DS configuration, acquiring model and production readiness.</p><div class="table-wrap"><table><thead><tr><th>Capability</th><th>Merchant-hosted checkout</th><th>Octra-hosted checkout</th><th>PSP / platform model</th></tr></thead><tbody><tr><td><strong>Own checkout UI</strong></td><td>Primary model</td><td>Not primary</td><td>Platform-owned or merchant-owned</td></tr><tr><td><strong>Octra-hosted payment page</strong></td><td>Not primary</td><td>Primary model</td><td>Available where enabled</td></tr><tr><td><strong>Server-to-server payment request</strong></td><td>Primary model</td><td>Used for session and order preparation</td><td>Primary platform backend model</td></tr><tr><td><strong>Hosted checkout session</strong></td><td>Not primary</td><td>Primary model</td><td>Available where enabled</td></tr><tr><td><strong>Create payment</strong></td><td>Supported</td><td>Supported through hosted flow</td><td>Supported</td></tr><tr><td><strong>Sale / PreAuth / Capture</strong></td><td>Supported</td><td>Supported</td><td>Supported</td></tr><tr><td><strong>Octra-managed 3DS</strong></td><td>Supported</td><td>Natural fit</td><td>Supported</td></tr><tr><td><strong>Own 3DS Server</strong></td><td>Supported</td><td>Usually not the primary model</td><td>Supported</td></tr><tr><td><strong>SCA exemption handling</strong></td><td>Supported where configured</td><td>Supported where configured</td><td>Supported where configured</td></tr><tr><td><strong>COF / recurring / MIT</strong></td><td>Supported where configured</td><td>Supported where configured</td><td>Supported where configured</td></tr><tr><td><strong>Payment status inquiry</strong></td><td>Supported</td><td>Supported</td><td>Supported</td></tr><tr><td><strong>Void / refund</strong></td><td>Supported</td><td>Supported</td><td>Supported</td></tr><tr><td><strong>Batch list / close batch</strong></td><td>Supported where applicable</td><td>Supported where applicable</td><td>Supported where applicable</td></tr><tr><td><strong>Result handling ownership</strong></td><td>Merchant / PSP / platform</td><td>Octra return flow + merchant confirmation</td><td>PSP / platform</td></tr><tr><td><strong>PCI and payment data responsibility</strong></td><td>Higher integrator responsibility</td><td>Reduced payment form complexity</td><td>Depends on platform model</td></tr></tbody></table></div><div class="notice"><div class="callout-icon">i</div><div><strong>Use the matrix as a guide, not a production guarantee.</strong><p>Some capabilities depend on configuration, region, payment method, acquiring setup and compliance readiness. Octra-hosted checkout can reduce payment form implementation complexity, but PCI, sensitive data, 3DS, result handling and operational responsibilities must be confirmed before production.</p></div></div>`],
    ['authentication-flexibility','Flexible 3DS authentication models',`<p class="lead">Octra Payment Gateway does not force every integrator into a single 3DS model. Customers can use Octra's 3DS capability inside the Gateway flow, or they can authenticate through their own 3DS Server and submit the required authentication result data with the payment authorization request.</p><div class="table-wrap"><table><thead><tr><th>Model</th><th>Best for</th><th>Responsibility</th></tr></thead><tbody><tr><td><strong>Octra-managed 3DS</strong></td><td>Merchants, PSPs or platforms that want Octra to connect authentication into the Gateway payment flow.</td><td>Octra manages the supported 3DS flow and returns an authentication outcome that the payment lifecycle can continue from.</td></tr><tr><td><strong>Integrator-managed 3DS</strong></td><td>Integrators that already operate their own 3DS Server or use an existing 3DS provider.</td><td>The integrator performs authentication and sends the required authentication values with the payment request.</td></tr></tbody></table></div>`],
    ['compliance-note','Security and PCI responsibility',`<div class="notice"><div class="callout-icon">!</div><div><strong>Checkout model affects responsibility.</strong><p>In a merchant-hosted model, the customer has more control over the payment experience and may also carry greater responsibility for how payment data is collected and handled. In an Octra-hosted model, the hosted payment experience can reduce the need for the merchant to build and maintain the payment form directly. Exact PCI and sensitive data responsibilities depend on the final implementation and must be confirmed before production.</p></div></div>`]
  ]},
  'gateway-platform-boundaries':{area:'Product Guides / Payment Gateway',label:'Gateway vs platform layers',eyebrow:'Understand Payment Gateway',title:'Gateway vs Acquiring vs Processing vs Orchestration',subtitle:'Use the right guide for the right layer of the payment stack.',sections:[
    ['boundary','Boundary matrix',`<div class="table-wrap"><table><thead><tr><th>Layer</th><th>Primary question</th><th>Role</th></tr></thead><tbody><tr><td><strong>Payment Gateway</strong></td><td>How do I accept and manage an online payment?</td><td>Online payment acceptance and payment lifecycle API layer.</td></tr><tr><td><strong>Acquiring</strong></td><td>How is the merchant configured, settled and reconciled?</td><td>Merchant acceptance, terminal setup, settlement, reconciliation, pricing and merchant finance.</td></tr><tr><td><strong>Processing</strong></td><td>How are authorization, clearing, settlement and transaction events processed?</td><td>Infrastructure-level transaction processing and event handling.</td></tr><tr><td><strong>Orchestration</strong></td><td>How is the best acquirer, provider or route selected?</td><td>Routing, failover, provider redundancy and optimization.</td></tr></tbody></table></div>`],
    ['rule','Strategic rule',`<div class="notice"><div class="callout-icon">!</div><div><strong>Do not overload the Gateway guide.</strong><p>Gateway should explain payment acceptance and lifecycle operations. Settlement accounting, merchant pricing, chargeback representment and scheme-level processing should remain in Acquiring or Processing.</p></div></div>`]
  ]},
  'gateway-payment-statuses':{area:'Product Guides / Payment Gateway',label:'Payment statuses',eyebrow:'Understand Payment Gateway',title:'Payment statuses',subtitle:'Design the integration around clear payment states and next actions.',sections:[
    ['statuses','Status model',`<div class="table-wrap"><table><thead><tr><th>Status</th><th>Meaning</th><th>Typical next action</th></tr></thead><tbody><tr><td><strong>Approved</strong></td><td>The payment was authorized or completed successfully.</td><td>Confirm order, continue fulfillment or capture if separate.</td></tr><tr><td><strong>Declined</strong></td><td>The payment was not approved.</td><td>Show failure reason or request another payment method.</td></tr><tr><td><strong>Authentication required</strong></td><td>3DS or another customer step is required.</td><td>Continue authentication flow.</td></tr><tr><td><strong>Pending / timeout</strong></td><td>The final state is not yet confirmed.</td><td>Use status inquiry before retrying.</td></tr><tr><td><strong>Voided / refunded</strong></td><td>A lifecycle action changed the payment after approval.</td><td>Update order and operations records.</td></tr></tbody></table></div>`]
  ]},

  'gateway-first-api-request':{area:'Product Guides / Payment Gateway',label:'First API request',eyebrow:'Start Accepting Payments',title:'Send your first Gateway API request',subtitle:'Validate connectivity, credentials and request signing before creating a real payment flow.',sections:[
    ['purpose','Purpose',`<p class="lead">The first request confirms that your assigned test credentials, environment URL, required headers and signing rules are working. This is a technical access step, not the full payment flow.</p>`],
    ['checklist','Before sending it',`<div class="table-wrap"><table><thead><tr><th>Requirement</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Assigned test credentials</strong></td><td>Gateway access is credential-based; do not use sign-up or self-created sandbox language.</td></tr><tr><td><strong>Merchant / terminal configuration</strong></td><td>Payment requests must be linked to configured merchant and terminal context.</td></tr><tr><td><strong>Request signing rules</strong></td><td>Signed requests prevent unauthorized or tampered payment operations.</td></tr><tr><td><strong>Supported payment type</strong></td><td>Confirm whether the test flow is Sale, PreAuth, 3DS or another supported scenario.</td></tr></tbody></table></div>`]
  ]},
  'gateway-create-payment':{area:'Product Guides / Payment Gateway',label:'Create a payment',eyebrow:'Start Accepting Payments',title:'Create a payment',subtitle:'Start the customer-facing digital payment flow through Octra Gateway.',sections:[
    ['purpose','Purpose',`<p class="lead">Create a payment when the customer is ready to pay and your system has prepared the order, amount, currency, merchant context and payment details required by the selected integration model.</p>`],
    ['what-it-does','What this step does',`<div class="grid"><div class="card"><h3>Starts the payment lifecycle</h3><p>Creates the initial payment context for the order.</p></div><div class="card"><h3>Links merchant context</h3><p>Associates the payment with configured merchant, terminal and channel information.</p></div><div class="card"><h3>Determines next action</h3><p>The response may move to authentication, authorization, completion or error handling.</p></div><div class="card"><h3>Supports investigation</h3><p>Order and payment references are used later for inquiry and operational review.</p></div></div>`]
  ]},
  'gateway-authenticate-payment':{area:'Product Guides / Payment Gateway',label:'Authenticate a payment',eyebrow:'Start Accepting Payments',title:'Authenticate a payment',subtitle:'Handle 3DS or required cardholder authentication using Octra-managed 3DS or your own 3DS Server.',sections:[
    ['purpose','Purpose',`<p class="lead">Authentication protects eligible e-commerce payments and may be required based on card, region, merchant risk, payment method or regulatory rules. Octra Payment Gateway supports flexible 3DS models: the integrator can use Octra's 3DS capability or complete authentication through its own 3DS Server and submit the authentication result with the payment request.</p>`],
    ['models','3DS integration models',`<div class="table-wrap"><table><thead><tr><th>Model</th><th>How it works</th><th>Best for</th></tr></thead><tbody><tr><td><strong>Octra-managed 3DS</strong></td><td>The payment flow uses Octra's 3DS capability and continues from the authentication outcome returned through the Gateway journey.</td><td>Customers that want a more controlled Gateway-led authentication path.</td></tr><tr><td><strong>Own 3DS Server</strong></td><td>The integrator authenticates the cardholder through its own 3DS Server and sends the required authentication result data when submitting the payment for authorization.</td><td>PSPs, platforms or merchants that already operate a 3DS Server or have an existing 3DS provider.</td></tr></tbody></table></div>`],
    ['outcomes','Authentication outcomes',`<div class="table-wrap"><table><thead><tr><th>Outcome</th><th>Meaning</th><th>Next action</th></tr></thead><tbody><tr><td><strong>Frictionless</strong></td><td>Authentication completes without a visible customer challenge.</td><td>Continue payment authorization or completion with the authentication outcome.</td></tr><tr><td><strong>Challenge required</strong></td><td>The issuer requires the customer to complete an additional authentication step.</td><td>Continue the challenge flow before completing the payment.</td></tr><tr><td><strong>Authenticated</strong></td><td>The cardholder completed the required authentication step.</td><td>Continue authorization, Sale or Capture according to the payment type.</td></tr><tr><td><strong>Failed / abandoned</strong></td><td>Authentication did not complete successfully.</td><td>Do not complete the payment; return or display the appropriate outcome.</td></tr></tbody></table></div>`],
    ['handoff','Authentication result handoff',`<div class="notice"><div class="callout-icon">→</div><div><strong>Authentication must connect to authorization.</strong><p>After authentication is completed, the payment request should carry the required authentication result values according to the selected 3DS model. Endpoint fields, required values and request examples should remain in API Reference / Apidog.</p></div></div>`]
  ]},
  'gateway-complete-payment':{area:'Product Guides / Payment Gateway',label:'Complete a payment',eyebrow:'Start Accepting Payments',title:'Complete a payment',subtitle:'Use Sale or Capture/PostAuth depending on whether payment authorization and completion happen together or separately.',sections:[
    ['models','Completion models',`<div class="table-wrap"><table><thead><tr><th>Model</th><th>When to use</th><th>Business meaning</th></tr></thead><tbody><tr><td><strong>Sale</strong></td><td>The payment should be authorized and completed in one flow.</td><td>Common for straightforward e-commerce payment acceptance.</td></tr><tr><td><strong>PreAuth</strong></td><td>Funds should be reserved before final completion.</td><td>Useful where the final amount or fulfillment timing is confirmed later.</td></tr><tr><td><strong>Capture / PostAuth</strong></td><td>A previous authorization should be completed.</td><td>Moves the authorized payment toward completion according to supported rules.</td></tr></tbody></table></div>`]
  ]},

  'gateway-click-to-pay':{area:'Product Guides / Payment Gateway',label:'Click to Pay',eyebrow:'Payment Methods',title:'Accept Click to Pay',subtitle:'Offer a streamlined scheme-based checkout experience using recognized or stored payment credentials.',sections:[
    ['overview','Overview',`<p class="lead">Octra Payment Gateway supports Click to Pay as a payment method for eligible merchant and card configurations. Click to Pay can reduce manual card entry by allowing customers to use a recognized profile or select an enrolled card through the supported Click to Pay experience.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Availability is configuration-based.</strong><p>Supported schemes, regions, checkout models and production onboarding requirements depend on the merchant and acquiring setup.</p></div></div>`],
    ['flow','Click to Pay flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Customer selects Click to Pay</h3><p>The merchant checkout presents Click to Pay for an eligible transaction.</p></div></div><div class="step"><div class="num">2</div><div><h3>Customer is recognized or signs in</h3><p>The Click to Pay experience identifies the customer or guides them through the supported access flow.</p></div></div><div class="step"><div class="num">3</div><div><h3>Customer chooses a payment credential</h3><p>The customer selects an available enrolled card and completes any required verification.</p></div></div><div class="step"><div class="num">4</div><div><h3>Payment credential is submitted</h3><p>The merchant backend sends the resulting payment context to Octra Gateway with the order, amount, currency and merchant references.</p></div></div><div class="step"><div class="num">5</div><div><h3>Payment result is handled</h3><p>The integration processes the approved, declined, pending or authentication-required outcome and uses inquiry if the final state is unclear.</p></div></div></div>`],
    ['responsibilities','Integration responsibilities',`<div class="table-wrap"><table><thead><tr><th>Area</th><th>Responsibility</th></tr></thead><tbody><tr><td><strong>Merchant eligibility</strong></td><td>Confirm Click to Pay is enabled for the merchant, region, schemes and acquiring relationship.</td></tr><tr><td><strong>Checkout presentation</strong></td><td>Present the payment method and customer interaction according to the supported Click to Pay experience and brand requirements.</td></tr><tr><td><strong>Payment handoff</strong></td><td>Submit the returned credential or payment context through the configured Octra Gateway flow.</td></tr><tr><td><strong>Authentication and result handling</strong></td><td>Handle any required authentication, payment status, decline, retry and inquiry outcomes.</td></tr></tbody></table></div>`],
    ['testing','Recommended tests',`<div class="pill-row"><span class="pill">Recognized customer</span><span class="pill">New customer</span><span class="pill">Card selection</span><span class="pill">Verification required</span><span class="pill">Approved payment</span><span class="pill">Declined payment</span><span class="pill">Cancelled checkout</span><span class="pill">Timeout + inquiry</span></div>`]
  ]},
  'gateway-wallets':{area:'Product Guides / Payment Gateway',label:'Apple Pay and Google Pay',eyebrow:'Payment Methods',title:'Accept Apple Pay and Google Pay',subtitle:'Add tokenized wallet payments to merchant-hosted or supported checkout experiences.',sections:[
    ['overview','Overview',`<p class="lead">Octra Payment Gateway supports Apple Pay and Google Pay for eligible merchant configurations. Both methods allow the customer to approve a payment in the wallet experience and provide a tokenized payment credential that continues through the Gateway payment lifecycle.</p><div class="grid"><div class="card"><h3>Apple Pay</h3><p>Accept wallet payments initiated from supported Apple devices and browser experiences after the required merchant setup is complete.</p></div><div class="card"><h3>Google Pay</h3><p>Accept wallet payments initiated from supported Google Pay devices and browser experiences after the required merchant setup is complete.</p></div></div>`],
    ['flow','Wallet payment flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Wallet is presented</h3><p>The checkout shows Apple Pay or Google Pay when the customer, device, browser, merchant and transaction are eligible.</p></div></div><div class="step"><div class="num">2</div><div><h3>Customer approves in the wallet</h3><p>The customer selects a card and completes device or wallet authentication.</p></div></div><div class="step"><div class="num">3</div><div><h3>Tokenized credential is returned</h3><p>The wallet returns an encrypted or tokenized payment payload to the merchant checkout.</p></div></div><div class="step"><div class="num">4</div><div><h3>Backend submits the payment</h3><p>The merchant backend sends the wallet payload and payment context through the configured Octra Gateway flow.</p></div></div><div class="step"><div class="num">5</div><div><h3>Result is confirmed</h3><p>The merchant handles the Gateway result and uses status inquiry before retrying when the outcome is uncertain.</p></div></div></div>`],
    ['setup','Setup considerations',`<div class="table-wrap"><table><thead><tr><th>Area</th><th>What to confirm</th></tr></thead><tbody><tr><td><strong>Merchant enablement</strong></td><td>Confirm the wallet, merchant, region, currency, card schemes and acquiring relationship are enabled.</td></tr><tr><td><strong>Wallet onboarding</strong></td><td>Complete the applicable Apple Pay or Google Pay merchant registration, domain, application or credential requirements.</td></tr><tr><td><strong>Frontend integration</strong></td><td>Use the supported wallet presentation and customer interaction requirements.</td></tr><tr><td><strong>Backend integration</strong></td><td>Keep wallet payload handling, request signing, order state and payment result processing on the trusted backend.</td></tr><tr><td><strong>Security and compliance</strong></td><td>Confirm token handling, logging, PCI scope and production responsibilities before launch.</td></tr></tbody></table></div>`],
    ['testing','Recommended tests',`<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>Expected validation</th></tr></thead><tbody><tr><td><strong>Eligible wallet</strong></td><td>The correct wallet button is shown and the wallet sheet opens.</td></tr><tr><td><strong>Customer cancellation</strong></td><td>The order remains unpaid and the customer can choose another method.</td></tr><tr><td><strong>Approved wallet payment</strong></td><td>The tokenized credential is processed and the order is confirmed once.</td></tr><tr><td><strong>Declined wallet payment</strong></td><td>The decline is handled without exposing sensitive payment data.</td></tr><tr><td><strong>Unclear result</strong></td><td>Status inquiry is used before another payment attempt is created.</td></tr></tbody></table></div>`]
  ]},


  'gateway-3ds-authentication':{area:'Product Guides / Payment Gateway',label:'3DS authentication models',eyebrow:'Authentication and Stored Credentials',title:'Choose your 3DS authentication model',subtitle:'Use Octra-managed 3DS or your own 3DS Server depending on your architecture, compliance responsibilities and checkout control needs.',sections:[
    ['why-3ds-matters','Why 3DS matters',`<p class="lead">3DS authentication helps verify the cardholder for eligible e-commerce payments before authorization or completion. It supports secure customer authentication, risk-based decisioning and regional compliance requirements such as SCA where applicable.</p><p>Octra Payment Gateway supports a flexible model: customers can either use Octra's 3DS capability or authenticate through their own 3DS Server and pass the authentication result into the payment request.</p>`],
    ['model-comparison','Model comparison',`<div class="table-wrap"><table><thead><tr><th>3DS model</th><th>When to use it</th><th>Primary responsibility</th></tr></thead><tbody><tr><td><strong>Octra-managed 3DS</strong></td><td>You want Octra to connect the authentication step into the Gateway payment flow.</td><td>Octra manages the supported 3DS authentication flow and returns the authentication outcome for the payment lifecycle.</td></tr><tr><td><strong>Integrator-managed 3DS</strong></td><td>You already operate your own 3DS Server or use an existing 3DS provider.</td><td>The integrator performs authentication and submits the required authentication result values with the payment request.</td></tr></tbody></table></div>`],
    ['checkout-impact','Checkout model impact',`<div class="table-wrap"><table><thead><tr><th>Checkout model</th><th>3DS impact</th></tr></thead><tbody><tr><td><strong>Merchant-hosted checkout</strong></td><td>The merchant, PSP or platform can integrate its own 3DS Server or use Octra-managed 3DS depending on the agreed model.</td></tr><tr><td><strong>Octra-hosted checkout</strong></td><td>Octra-managed 3DS is the more natural fit where Octra controls the hosted payment experience and authentication continuation.</td></tr><tr><td><strong>PSP / platform model</strong></td><td>The PSP or platform may centralize 3DS through its own infrastructure or use Octra 3DS for selected merchant flows.</td></tr></tbody></table></div>`],
    ['decision-tree','3DS, SCA and stored credential decision tree',`<p class="lead">Before completing an e-commerce payment, the integration should determine whether authentication is required, which 3DS model will be used, whether SCA or exemption handling applies, and whether the payment is a one-time customer-initiated payment or a stored credential transaction.</p><div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>E-commerce / CNP payment?</strong><p>Confirm whether the payment is an online card-not-present transaction where 3DS, SCA or stored credential rules may apply.</p></div><div class="flow-box"><strong>Is 3DS required?</strong><p>Evaluate region, acquirer setup, merchant risk rules, scheme rules and payment configuration.</p></div><div class="flow-box"><strong>Choose 3DS model</strong><p>Use Octra-managed 3DS or authenticate through the integrator's own 3DS Server.</p></div><div class="flow-box"><strong>Authentication outcome</strong><p>Frictionless, challenge completed, failed, abandoned or unavailable outcome is produced.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box primary"><strong>Classify payment context</strong><p>Determine one-time CIT, initial CIT, subsequent CIT, MIT, recurring, installment or unscheduled credential-on-file.</p></div><div class="flow-box"><strong>Does SCA apply?</strong><p>Confirm whether regional SCA rules apply and whether exemption handling is supported for this model.</p></div><div class="flow-box"><strong>Exemption or challenge?</strong><p>An exemption may be requested or applied, but issuer challenge or decline can still occur.</p></div><div class="flow-box"><strong>Authorize / Sale / Capture</strong><p>Continue the payment with the required authentication, SCA and stored credential context.</p></div></div></div><div class="table-wrap"><table><thead><tr><th>Decision point</th><th>What to decide</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Payment channel</strong></td><td>Is this an e-commerce or card-not-present payment?</td><td>3DS, SCA and stored credential handling primarily affect online card-not-present flows.</td></tr><tr><td><strong>3DS requirement</strong></td><td>Is authentication required?</td><td>Determines whether the payment can continue directly to authorization or must authenticate first.</td></tr><tr><td><strong>3DS model</strong></td><td>Use Octra-managed 3DS or the integrator's own 3DS Server.</td><td>Defines who owns the cardholder authentication flow and authentication result handoff.</td></tr><tr><td><strong>Authentication outcome</strong></td><td>Frictionless, challenge, authenticated, failed or abandoned.</td><td>Determines whether the payment can continue, stop or require another customer action.</td></tr><tr><td><strong>Stored credential status</strong></td><td>One-time CIT, initial CIT, subsequent CIT, MIT or recurring.</td><td>Required for correct COF, recurring and merchant-initiated payment handling.</td></tr><tr><td><strong>SCA applicability</strong></td><td>Does SCA apply to the region, merchant setup and payment type?</td><td>Important for regulated markets such as Europe and the UK.</td></tr><tr><td><strong>Exemption handling</strong></td><td>Is an exemption requested, issuer-applied or not available?</td><td>Can reduce friction but does not guarantee frictionless approval.</td></tr><tr><td><strong>Authorization handoff</strong></td><td>Which authentication, SCA and COF context continues into the payment?</td><td>Ensures the payment request carries the correct context for authorization, reporting and investigation.</td></tr></tbody></table></div><div class="notice"><div class="callout-icon">!</div><div><strong>Exemptions are not guaranteed.</strong><p>An SCA exemption does not guarantee that the payment will be frictionless. The issuer may still require a challenge or decline the transaction based on risk, regulation, scheme rules or cardholder profile.</p></div></div><div class="notice"><div class="callout-icon">→</div><div><strong>Own 3DS Server responsibility</strong><p>When the integrator uses its own 3DS Server, the integrator is responsible for performing authentication correctly and submitting the required authentication result data with the payment request.</p></div></div><div class="notice"><div class="callout-icon">i</div><div><strong>Keep payload details in API Reference.</strong><p>Field-level authentication values, stored credential indicators, exemption request parameters and payload examples are documented in API Reference / Apidog.</p></div></div>`],
    ['flow','3DS model flow',`<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Customer checkout</strong><p>The customer starts an eligible e-commerce payment.</p></div><div class="flow-box"><strong>Choose 3DS model</strong><p>The integration uses Octra-managed 3DS or the integrator's own 3DS Server.</p></div><div class="flow-box"><strong>Authentication outcome</strong><p>Frictionless, challenge, authenticated, failed or abandoned outcome is produced.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box primary"><strong>Payment request</strong><p>The required authentication result data is connected to the payment request.</p></div><div class="flow-box"><strong>Authorize / Sale / Capture</strong><p>The payment continues according to the payment type and authentication outcome.</p></div><div class="flow-box"><strong>Payment result</strong><p>The merchant or platform receives, retrieves or investigates the final outcome.</p></div></div></div>`]
  ]},
  'gateway-octra-managed-3ds':{area:'Product Guides / Payment Gateway',label:'Octra-managed 3DS',eyebrow:'Authentication and Stored Credentials',title:'Octra-managed 3DS',subtitle:'Use Octra 3DS capability as part of the Gateway payment flow.',sections:[
    ['model','Model',`<p class="lead">In the Octra-managed 3DS model, the payment flow uses Octra's 3DS capability to authenticate the cardholder where required. The authentication outcome is then used to continue the Gateway payment lifecycle.</p>`],
