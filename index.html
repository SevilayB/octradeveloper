    ['guides-reference','Product Guides and API Reference',`<div class="table-wrap"><table><thead><tr><th>Product Guides</th><th>API Reference / Apidog</th></tr></thead><tbody><tr><td>Business and payment flows</td><td>Endpoint URLs and HTTP methods</td></tr><tr><td>Routing and recovery behavior</td><td>Request and response schemas</td></tr><tr><td>Payment lifecycle</td><td>Exact status values</td></tr><tr><td>Integration responsibilities</td><td>Required and conditional fields</td></tr><tr><td>Operational guidance</td><td>Headers, signing and result codes</td></tr></tbody></table></div>`],
    ['path','Recommended implementation path',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Select the integration model</h3><p>Confirm checkout ownership, payment data flow and enabled capabilities.</p></div></div><div class="step"><div class="num">2</div><div><h3>Implement the payment flow</h3><p>Use the current Apidog schema for authentication, requests and responses.</p></div></div><div class="step"><div class="num">3</div><div><h3>Implement recovery</h3><p>Add status retrieval, webhooks, idempotency and safe timeout handling.</p></div></div><div class="step"><div class="num">4</div><div><h3>Test and prepare production</h3><p>Validate routing, provider failure, lifecycle operations and operational monitoring.</p></div></div></div>`]
  ]},
  'orchestration-testing':{area:'Product Guides / Payment Orchestration',label:'Testing',eyebrow:'Build Your Integration',title:'Test your orchestration integration',subtitle:'Validate API behavior, routing, provider outcomes, webhooks and merchant order handling before production.',sections:[
    ['required-scenarios','Required scenarios',`<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>What to verify</th></tr></thead><tbody><tr><td><strong>Successful payment</strong></td><td>API result, payment status and webhook agree.</td></tr><tr><td><strong>Issuer decline</strong></td><td>Normalized error and recommended action are correct.</td></tr><tr><td><strong>Provider timeout</strong></td><td>The payment remains protected from duplicate processing.</td></tr><tr><td><strong>Provider unavailable</strong></td><td>Configured failover or final failure behavior is applied.</td></tr><tr><td><strong>No eligible provider</strong></td><td>The integration receives a clear configuration result.</td></tr><tr><td><strong>Authentication</strong></td><td>Success, failure and abandonment reach the correct lifecycle states.</td></tr><tr><td><strong>Duplicate API request</strong></td><td>A second payment is not created.</td></tr><tr><td><strong>Webhook reliability</strong></td><td>Duplicate, delayed and out-of-order events are handled safely.</td></tr><tr><td><strong>Lifecycle actions</strong></td><td>Capture, cancellation and refund rules are enforced.</td></tr><tr><td><strong>Routing and recovery</strong></td><td>The expected provider, retry and failover behavior is recorded.</td></tr></tbody></table></div>`],
    ['evidence','Testing evidence',`<p class="lead">For critical tests, retain the merchant reference, payment ID, attempt ID, API result, final status, webhook event ID, transaction timeline and expected result.</p><div class="notice"><div class="callout-icon">→</div><div><strong>Use supported sandbox values.</strong><p>Exact test values and simulation behavior belong in the Payment Orchestration API Reference.</p></div></div>`]
  ]},
  'orchestration-go-live':{area:'Product Guides / Payment Orchestration',label:'Go-live checklist',eyebrow:'Build Your Integration',title:'Go-live checklist',subtitle:'Confirm integration, routing, webhooks and operational ownership before processing production payments.',sections:[
    ['integration','Integration readiness',`<ul><li>Production credentials are stored securely.</li><li>API authentication and signing are verified.</li><li>Idempotency is implemented.</li><li>Merchant references and payment identifiers are persisted.</li><li>Payment status recovery is implemented.</li><li>Sensitive credentials are not exposed to client applications.</li></ul>`],
    ['routing','Provider and routing readiness',`<ul><li>Production provider credentials are verified.</li><li>Required payment capabilities are enabled.</li><li>Routing and default-route behavior are reviewed.</li><li>No-eligible-route behavior is tested.</li><li>Failover and unknown-outcome handling are tested.</li><li>Routing rollback ownership is confirmed.</li></ul>`],
    ['webhook-ops','Webhooks and operations',`<ul><li>Production webhook endpoints are registered.</li><li>Webhook signatures, duplicates and out-of-order events are handled.</li><li>Payment fulfillment uses verified server-side results.</li><li>Monitoring and required alerts are configured.</li><li>Refund, cancellation and authentication flows are tested.</li><li>Reconciliation and escalation ownership are confirmed.</li><li>A controlled production pilot has been completed.</li></ul><div class="notice"><div class="callout-icon">!</div><div><strong>Final availability depends on onboarding.</strong><p>Production access and capability availability depend on account configuration, enabled providers and commercial scope.</p></div></div>`]
  ]}

const sidebar=document.getElementById('sidebar'),doc=document.getElementById('doc'),toc=document.getElementById('toc'),tocCta=document.getElementById('tocCta'),search=document.getElementById('search');let currentPage='payment-gateway';
function gatewayIds(){return gatewayMenu.flatMap(g=>g.items.map(i=>i[0]));} function acquiringIds(){return acquiringMenu.flatMap(g=>g.items.map(i=>i[0]));} function issuingIds(){return issuingMenu.flatMap(g=>g.items.map(i=>i[0]));} function orchestrationIds(){return orchestrationMenu.flatMap(g=>g.items.map(i=>i[0]));} function isGateway(id){return gatewayIds().includes(id);} function isAcquiring(id){return acquiringIds().includes(id);} function isIssuing(id){return issuingIds().includes(id);} function isOrchestration(id){return orchestrationIds().includes(id);} function pageTitle(id){return pages[id]?.label || pages[id]?.title || id;}
function renderGuideMenu(menu,q,match){return menu.map(g=>{const items=g.items.filter(([id,label])=>match(label)||g.group.toLowerCase().includes(q)); if(q && !items.length)return ''; return `<details class="guide-group" ${g.open||q?'open':''}><summary><span>${g.group}</span><span class="mini-chev">⌄</span></summary><nav class="guide-subnav">${items.map(([id,label])=>`<button type="button" class="side-link" data-page="${id}"><span>${label}</span></button>`).join('')}</nav></details>`}).join('')}
function renderSidebar(filter=''){const q=filter.trim().toLowerCase();const match=(s)=>!q||s.toLowerCase().includes(q);const gatewayHtml=renderGuideMenu(gatewayMenu,q,match);const acquiringHtml=renderGuideMenu(acquiringMenu,q,match);const issuingHtml=renderGuideMenu(issuingMenu,q,match);const orchestrationHtml=renderGuideMenu(orchestrationMenu,q,match);sidebar.innerHTML=`<div class="tree"><details class="tree-block" open><summary><span>Product Guides</span><span class="mini-chev">⌄</span></summary><div class="tree-children"><details class="guide-group" ${isGateway(currentPage)?'open':''}><summary><span>Payment Gateway</span><span class="mini-chev">⌄</span></summary>${gatewayHtml}</details><details class="guide-group" ${isAcquiring(currentPage)?'open':''}><summary><span>Acquiring</span><span class="mini-chev">⌄</span></summary>${acquiringHtml}</details><details class="guide-group" ${isIssuing(currentPage)?'open':''}><summary><span>Issuing</span><span class="mini-chev">⌄</span></summary>${issuingHtml}</details><button type="button" class="product-row" data-page="processing">Processing</button><details class="guide-group" ${isOrchestration(currentPage)?'open':''}><summary><span>Payment Orchestration</span><span class="mini-chev">⌄</span></summary>${orchestrationHtml}</details></div></details><details class="tree-block" open><summary><span>Technical Reference</span><span class="mini-chev">⌄</span></summary><div class="tree-children"><button type="button" class="product-row" data-page="api-reference">API Reference</button><button type="button" class="product-row" data-page="security-compliance">Security &amp; Compliance</button><button type="button" class="product-row" data-page="gateway-request-signing">Gateway request signing</button><button type="button" class="product-row" data-page="gateway-duplicate-prevention">Gateway duplicate prevention</button><button type="button" class="product-row" data-page="gateway-result-codes">Gateway result codes</button><button type="button" class="product-row" data-page="acquiring-request-signing">Acquiring request signing</button><button type="button" class="product-row" data-page="acquiring-result-codes">Acquiring result codes</button><button type="button" class="product-row" data-page="issuing-result-codes">Issuing result codes</button></div></details></div>`; syncActive();}
function actionHtml(target,label,style=''){if(target.startsWith('http'))return `<a class="toc-action ${style}" href="${target}" target="_blank" rel="noopener"><span>${label}</span><span>→</span></a>`; return `<button type="button" class="toc-action ${style}" data-page="${target}"><span>${label}</span><span>→</span></button>`}
function getActions(id){const ids=isAcquiring(id)?acquiringIds():isIssuing(id)?issuingIds():isOrchestration(id)?orchestrationIds():gatewayIds(); const idx=ids.indexOf(id); const actions=[]; if(id==='payment-gateway'){actions.push(['gateway-model-flow','View gateway flow','primary'],['gateway-who-uses','Who uses it','']);} else if(id==='acquiring'){actions.push(['acquiring-operating-model','View acquiring flow','primary'],['acquiring-who-uses','Who uses it','']);} else if(id==='issuing-overview'){actions.push(['issuing-first-api-request','Start with first API request','primary'],['issuing-card-products','Explore card products','']);} else if(id==='orchestration'){actions.push(['orchestration-first-payment','Start your integration','primary'],['orchestration-routing-strategies','Explore routing strategies','']);} else if(idx>=0 && idx<ids.length-1){actions.push([ids[idx+1],`Next: ${pageTitle(ids[idx+1])}`,'primary']);} if(idx>0) actions.push([ids[idx-1],`Back: ${pageTitle(ids[idx-1])}`,'']); if(idx>=0 && isGateway(id) && id!=='payment-gateway') actions.push(['payment-gateway','Back to Payment Gateway overview','']); if(idx>=0 && isAcquiring(id) && id!=='acquiring') actions.push(['acquiring','Back to Acquiring overview','']); if(idx>=0 && isIssuing(id) && id!=='issuing-overview') actions.push(['issuing-overview','Back to Issuing overview','']); if(idx>=0 && isOrchestration(id) && id!=='orchestration') actions.push(['orchestration','Back to Payment Orchestration overview','']); return actions;}
function buildFooter(id){const actions=getActions(id).filter(a=>!a[0].startsWith('http')); if(!actions.length)return ''; const next=actions.find(a=>a[1].startsWith('Next:')||a[2]==='primary')||actions[0]; const back=actions.find(a=>a[1].startsWith('Back:')||a[1].startsWith('Back to')); const cards=[]; if(back)cards.push(`<button type="button" class="page-nav-card" data-page="${back[0]}"><span>Previous</span><strong>${back[1].replace('Back: ','').replace('Back to ','')}</strong></button>`); if(next)cards.push(`<button type="button" class="page-nav-card" data-page="${next[0]}"><span>Next</span><strong>${next[1].replace('Next: ','')}</strong></button>`); return `<nav class="page-nav">${cards.join('')}</nav>`;}
let tocHandler=null;function setupToc(){if(tocHandler){window.removeEventListener('scroll',tocHandler);window.removeEventListener('resize',tocHandler);}const pairs=Array.from(toc.querySelectorAll('a[href^="#"]')).map(link=>({link,section:document.querySelector(link.getAttribute('href'))})).filter(p=>p.section); if(!pairs.length)return; const set=()=>{let active=pairs[0]; const y=window.scrollY+160; pairs.forEach(p=>{if(p.section.offsetTop<=y)active=p}); pairs.forEach(p=>p.link.classList.toggle('active',p===active));}; tocHandler=set; window.addEventListener('scroll',set,{passive:true});window.addEventListener('resize',set,{passive:true});set();}
function renderPage(id){const page=pages[id]||pages['payment-gateway']; currentPage=id; const actions=page.actions?`<div class="hero-actions">${page.actions.map(([target,label,style])=>target.startsWith('http')?`<a class="btn ${style}" href="${target}" target="_blank" rel="noopener">${label}</a>`:`<button type="button" class="btn ${style}" data-page="${target}">${label}</button>`).join('')}</div>`:''; doc.innerHTML=`<div class="breadcrumb"><span>${page.area}</span><span>/</span><strong>${page.label}</strong></div><header class="hero" id="page-top"><div class="eyebrow">${page.eyebrow}</div><h1>${page.title}</h1><p class="subtitle">${page.subtitle}</p>${actions}</header>${page.sections.map(([sid,title,html])=>`<section class="section" id="${sid}"><h2>${title}</h2>${html}</section>`).join('')}${buildFooter(id)}`; toc.innerHTML=[`<a href="#page-top" class="active">Overview</a>`,...page.sections.map(([sid,title])=>`<a href="#${sid}">${title}</a>`)].join(''); const a=getActions(id); tocCta.innerHTML=a.length?`<div class="toc-card"><strong>${a[0][1]}</strong><p>Continue through the recommended product guide journey.</p><div class="toc-actions">${a.slice(0,3).map(x=>actionHtml(x[0],x[1],x[2])).join('')}</div></div>`:''; document.querySelectorAll('#topnav button').forEach(btn=>btn.classList.toggle('active',btn.dataset.page===inferTop(id))); syncActive(); window.scrollTo({top:0,behavior:'smooth'}); requestAnimationFrame(setupToc);}
function inferTop(id){if(isGateway(id)||isAcquiring(id)||isIssuing(id)||isOrchestration(id)||id==='processing')return 'payment-gateway';return id;}
function syncActive(){document.querySelectorAll('[data-page]').forEach(el=>el.classList.toggle('active',el.dataset.page===currentPage));}
document.addEventListener('click',e=>{const btn=e.target.closest('[data-page]'); if(!btn)return; e.preventDefault(); renderPage(btn.dataset.page);}); search.addEventListener('input',e=>renderSidebar(e.target.value)); document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();search.focus();}}); renderSidebar(); renderPage('payment-gateway');
</script>
