  'acquiring-regional-models':{area:'Product Guides / Acquiring',label:'Regional acquiring models',eyebrow:'Understand Acquiring',title:'Regional acquiring models',subtitle:'Prepare acquiring documentation for Europe, Canada, Africa, Asia and other supported markets.',sections:[
    ['regions','Regional focus',`<div class="table-wrap"><table><thead><tr><th>Region</th><th>Acquiring documentation focus</th></tr></thead><tbody><tr><td><strong>Europe</strong></td><td>Compliance, PSD2/SCA impact, GDPR, DORA, wallet readiness, settlement and reporting controls.</td></tr><tr><td><strong>Canada</strong></td><td>Gateway + acquiring model, settlement, reconciliation, acquirer connectivity and merchant operations.</td></tr><tr><td><strong>Africa</strong></td><td>Acquiring reach, SoftPOS, mobile-first acceptance, risk controls and resilient processing.</td></tr><tr><td><strong>Asia</strong></td><td>Scale, multi-currency operations, provider redundancy and tokenized digital payment readiness.</td></tr></tbody></table></div>`]
  ]},
  'acquiring-merchant-profile':{area:'Product Guides / Acquiring',label:'Merchant profile',eyebrow:'Configure Acceptance',title:'Merchant profile',subtitle:'Define the business and operational identity of the merchant.',sections:[
    ['profile','Profile data',`<p class="lead">The merchant profile should capture the business information, category, region, settlement model, supported channels, pricing context and reporting ownership required for acquiring operations. It is a prerequisite to terminal setup, transaction processing and settlement.</p>`],
    ['fields','Profile components',`<div class="table-wrap"><table><thead><tr><th>Component</th><th>Business role</th></tr></thead><tbody><tr><td><strong>Legal and trading identity</strong></td><td>Identifies the merchant entity behind the acquiring relationship.</td></tr><tr><td><strong>Business category (MCC)</strong></td><td>Drives risk, compliance and pricing treatment.</td></tr><tr><td><strong>Operating region</strong></td><td>Determines applicable regional acquiring model and settlement behavior.</td></tr><tr><td><strong>Settlement model</strong></td><td>Defines settlement currency, cycle and payout destination.</td></tr><tr><td><strong>Pricing profile</strong></td><td>Links the merchant to its commercial and commission model.</td></tr><tr><td><strong>Reporting ownership</strong></td><td>Defines who reviews merchant-level transaction, settlement and dispute reporting.</td></tr></tbody></table></div>`],
    ['boundary','Boundary',`<div class="notice"><div class="callout-icon">→</div><div><strong>Not a terminal configuration</strong><p>The merchant profile establishes the business relationship. Acceptance points, MID/TID identifiers and channel behavior are configured separately in terminal setup.</p></div></div>`]
  ]},
  'acquiring-terminal-mid-tid':{area:'Product Guides / Acquiring',label:'Terminal / MID / TID setup',eyebrow:'Configure Acceptance',title:'Terminal / MID / TID setup',subtitle:'Configure identifiers used to process, report and reconcile merchant transactions.',sections:[
    ['terminal','Why it matters',`<p class="lead">MID, TID and terminal setup provide the operational structure that connects transactions to the correct merchant, acceptance point, batch, report and settlement output. This setup should be completed after the merchant profile exists and before transaction processing begins.</p>`],
    ['identifiers','Identifier roles',`<div class="table-wrap"><table><thead><tr><th>Identifier</th><th>Business role</th></tr></thead><tbody><tr><td><strong>MID (Merchant ID)</strong></td><td>Identifies the merchant acceptance relationship for routing, reporting and settlement.</td></tr><tr><td><strong>TID (Terminal ID)</strong></td><td>Identifies a specific acceptance point or channel instance under a merchant.</td></tr><tr><td><strong>Terminal profile</strong></td><td>Defines channel type, supported methods and operational behavior for that acceptance point.</td></tr></tbody></table></div><p>Multiple terminals can exist under a single merchant to separate reporting and settlement by store, channel or region.</p>`]
  ]},
  'acquiring-mcc-category':{area:'Product Guides / Acquiring',label:'MCC and business category',eyebrow:'Configure Acceptance',title:'MCC and business category',subtitle:'Classify merchant activity for risk, pricing, reporting and scheme rules.',sections:[
    ['mcc','Business purpose',`<p class="lead">MCC and business category values influence risk assessment, commercial rules, reporting, eligibility and compliance treatment. They should be configured before merchant transaction processing begins.</p>`],
    ['impact','Where MCC has impact',`<div class="table-wrap"><table><thead><tr><th>Area</th><th>Impact</th></tr></thead><tbody><tr><td><strong>Risk</strong></td><td>Determines baseline risk treatment and monitoring rules.</td></tr><tr><td><strong>Pricing</strong></td><td>Feeds into merchant pricing and commission calculation.</td></tr><tr><td><strong>Scheme rules</strong></td><td>Some categories carry scheme-specific acceptance or reporting rules.</td></tr><tr><td><strong>Compliance</strong></td><td>May trigger additional review or restricted-category handling.</td></tr></tbody></table></div>`]
  ]},
  'acquiring-channels-methods':{area:'Product Guides / Acquiring',label:'Channels and payment methods',eyebrow:'Configure Acceptance',title:'Channels and payment methods',subtitle:'Define where and how the merchant can accept payments.',sections:[
    ['channels','Channels',`<div class="pill-row"><span class="pill">E-commerce</span><span class="pill">POS</span><span class="pill">SoftPOS</span><span class="pill">Wallets</span><span class="pill">Marketplaces</span><span class="pill">Embedded finance</span></div><p class="lead">Each channel enabled on a terminal defines how transactions are captured, reported and grouped for settlement. A merchant may operate more than one channel at a time.</p>`],
    ['methods','Payment method scope',`<p>Payment method availability (cards, wallets, local methods) is configured per merchant or terminal and should align with the merchant's business category, region and risk profile. Method-level technical behavior is documented in API Reference.</p>`]
  ]},
  'acquiring-currencies':{area:'Product Guides / Acquiring',label:'Currencies',eyebrow:'Configure Acceptance',title:'Currencies',subtitle:'Define transaction, settlement and reporting currency behavior.',sections:[
    ['currencies','Currency scope',`<p class="lead">Currency configuration should clarify which currencies can be accepted, which currencies are used for settlement and how currency behavior appears in reports and reconciliation outputs.</p>`],
    ['behavior','Currency behavior',`<div class="table-wrap"><table><thead><tr><th>Layer</th><th>Behavior</th></tr></thead><tbody><tr><td><strong>Transaction currency</strong></td><td>The currency in which the payment is accepted from the customer.</td></tr><tr><td><strong>Settlement currency</strong></td><td>The currency in which the merchant is paid out; may differ from transaction currency.</td></tr><tr><td><strong>FX handling</strong></td><td>Where conversion applies, it should be visible in settlement and reconciliation reports.</td></tr></tbody></table></div>`]
  ]},
  'acquiring-limits-risk':{area:'Product Guides / Acquiring',label:'Limits and risk controls',eyebrow:'Configure Acceptance',title:'Limits and risk controls',subtitle:'Apply merchant or channel-level restrictions that protect acquiring operations.',sections:[
    ['controls','Control examples',`<div class="grid"><div class="card"><h3>Merchant limits</h3><p>Control exposure by merchant or portfolio.</p></div><div class="card"><h3>Channel limits</h3><p>Control e-commerce, POS, SoftPOS or wallet acceptance behavior.</p></div><div class="card"><h3>Risk rules</h3><p>Apply risk controls by merchant, amount, geography, MCC or pattern.</p></div><div class="card"><h3>Operational holds</h3><p>Support controls that may affect settlement or review workflows.</p></div></div>`],
    ['effect','Where controls take effect',`<p class="lead">Limits and risk controls are evaluated at transaction time and can also affect settlement, such as placing a hold on payout pending review. They should be configured alongside the merchant profile and terminal setup, before production transaction volume begins.</p>`]
  ]},
  'acquiring-transactions':{area:'Product Guides / Acquiring',label:'Transactions',eyebrow:'Operate Acquiring',title:'Transactions',subtitle:'Review acquiring transaction records and their operational impact.',sections:[
    ['transactions','Operational view',`<p class="lead">Acquiring transaction views should help operations and finance teams understand merchant, terminal, amount, currency, status, fee, batch, settlement and reconciliation context.</p>`],
    ['attributes','Business-level attributes',`<div class="table-wrap"><table><thead><tr><th>Attribute</th><th>Purpose</th></tr></thead><tbody><tr><td>Merchant / terminal context</td><td>Identifies where the transaction was accepted.</td></tr><tr><td>Status</td><td>Reflects acquiring-side state: accepted, batched, settled, reconciled or disputed.</td></tr><tr><td>Batch reference</td><td>Links the transaction to its clearing group.</td></tr><tr><td>Settlement reference</td><td>Links the transaction to its payout calculation.</td></tr></tbody></table></div><p>Detailed field-level schemas are documented in API Reference / Apidog.</p>`]
  ]},
  'acquiring-batch-clearing':{area:'Product Guides / Acquiring',label:'Batch and clearing preparation',eyebrow:'Operate Acquiring',title:'Batch and clearing preparation',subtitle:'Understand how transaction groups prepare downstream acquiring and processing operations.',sections:[
    ['flow','How batching works',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Transactions accumulate</h3><p>Eligible transactions are collected under a merchant and terminal context.</p></div></div><div class="step"><div class="num">2</div><div><h3>Batch is grouped</h3><p>Transactions are organized into a batch according to the operating model and cut-off schedule.</p></div></div><div class="step"><div class="num">3</div><div><h3>Batch is closed</h3><p>The batch is finalized and made available for downstream clearing and settlement calculation.</p></div></div></div>`],
    ['boundary','Boundary',`<div class="notice"><div class="callout-icon">→</div><div><strong>Batch close is not settlement.</strong><p>Batch and clearing preparation organize transaction activity for downstream settlement and reconciliation. Settlement calculation and financial movement are explained separately.</p></div></div>`]
  ]},
  'acquiring-settlement-lifecycle':{area:'Product Guides / Acquiring',label:'Settlement lifecycle',eyebrow:'Operate Acquiring',title:'Settlement lifecycle',subtitle:'Separate settlement calculation, payout or funding, reconciliation and adjustment handling in the acquiring finance workflow.',sections:[
    ['settlement','Settlement definition',`<p class="lead">Settlement is the acquiring finance process that determines the merchant-level financial outcome of accepted transactions after eligible transaction amounts, fees, commissions, deductions, adjustments and settlement timing rules are applied.</p><div class="notice"><div class="callout-icon">!</div><div><strong>Batch close is not merchant payout.</strong><p>Batch close prepares transaction activity for downstream acquiring, settlement and reconciliation workflows. It does not mean that merchant funding has occurred or that reconciliation is complete.</p></div></div>`],
    ['settlement-payout-reconciliation','Settlement, payout and reconciliation',`<p class="lead">Acquiring finance operations should clearly separate settlement calculation, payout or funding, reconciliation and adjustments. These concepts are connected, but they do not mean the same thing.</p><div class="table-wrap"><table><thead><tr><th>Concept</th><th>Meaning</th><th>Business question answered</th></tr></thead><tbody><tr><td><strong>Settlement calculation</strong></td><td>Merchant-level net amount is calculated after eligible transactions, fees, commissions and adjustments are applied.</td><td>How much should be settled for this merchant?</td></tr><tr><td><strong>Payout / funding</strong></td><td>The calculated amount is moved, or prepared to be moved, to the merchant according to the settlement model.</td><td>When and how does the merchant receive funds?</td></tr><tr><td><strong>Reconciliation</strong></td><td>Transaction, batch, fee, settlement, payout and report records are matched across systems.</td><td>Do all financial records match?</td></tr><tr><td><strong>Adjustment</strong></td><td>Refunds, chargebacks, corrections, fee changes or operational exceptions affect the financial outcome.</td><td>What changed after the original transaction?</td></tr></tbody></table></div>`],
    ['finance-flow','Settlement finance flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Identify eligible transactions</h3><p>Approved, captured or otherwise eligible transaction records are selected for the settlement cycle.</p></div></div><div class="step"><div class="num">2</div><div><h3>Complete batch or clearing preparation</h3><p>Transaction groups, cut-off rules and downstream processing readiness are confirmed.</p></div></div><div class="step"><div class="num">3</div><div><h3>Calculate settlement amount</h3><p>Gross transaction value is converted into merchant-level settlement amounts according to the configured model.</p></div></div><div class="step"><div class="num">4</div><div><h3>Apply fees, commissions and deductions</h3><p>Merchant pricing, scheme fees, interchange or IC+, acquirer markup, refund treatment and other deductions are applied where relevant.</p></div></div><div class="step"><div class="num">5</div><div><h3>Prepare payout or funding</h3><p>The net settlement amount is prepared for merchant payout or funding according to the settlement profile.</p></div></div><div class="step"><div class="num">6</div><div><h3>Generate settlement outputs</h3><p>Settlement reports and finance records are made available for operations, merchant support and finance teams.</p></div></div><div class="step"><div class="num">7</div><div><h3>Reconcile records</h3><p>Transactions, batches, fees, settlement amounts, payout records and reports are compared for financial control.</p></div></div><div class="step"><div class="num">8</div><div><h3>Handle adjustments</h3><p>Refunds, chargebacks, fee corrections, disputes or operational exceptions are reflected in the appropriate settlement or reconciliation cycle.</p></div></div></div>`],
    ['finance-boundary','Operational boundary',`<div class="notice"><div class="callout-icon">→</div><div><strong>Settlement is not the same as reconciliation.</strong><p>Settlement calculates and prepares the merchant financial outcome. Reconciliation validates that transaction, batch, fee, settlement, payout and report records match across the relevant systems.</p></div></div>`]
  ]},
  'acquiring-reconciliation':{area:'Product Guides / Acquiring',label:'Reconciliation',eyebrow:'Operate Acquiring',title:'Reconciliation',subtitle:'Validate transaction, batch, fee, settlement, payout and adjustment records across systems.',sections:[
    ['reconciliation','Reconciliation purpose',`<p class="lead">Reconciliation compares acquiring records across transaction processing, batch preparation, fee calculation, settlement outputs, payout data, dispute activity and reports. Its purpose is to confirm that operational and financial records match before and after merchant finance actions.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Reconciliation is a control process.</strong><p>It does not simply list transactions. It validates whether transaction totals, batch totals, fees, net settlement, payout records and adjustments are consistent across systems and reports.</p></div></div>`],
    ['reconciliation-areas','Reconciliation area matrix',`<div class="table-wrap"><table><thead><tr><th>Reconciliation area</th><th>What is matched</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Transaction reconciliation</strong></td><td>Authorized, captured, refunded, reversed or adjusted transactions.</td><td>Confirms that the transaction record set is complete and correctly classified.</td></tr><tr><td><strong>Batch reconciliation</strong></td><td>Batch totals, transaction counts, open/closed batch status and batch close records.</td><td>Confirms that grouped operational records match the transaction activity.</td></tr><tr><td><strong>Fee reconciliation</strong></td><td>Scheme fees, interchange, IC+, acquirer markup, merchant pricing and commission records.</td><td>Confirms that commercial calculations and deductions are correct.</td></tr><tr><td><strong>Settlement reconciliation</strong></td><td>Gross amount, deductions, adjustments and net settlement amount.</td><td>Confirms the merchant-level financial outcome.</td></tr><tr><td><strong>Payout reconciliation</strong></td><td>Settlement amount compared with payout, funding or merchant payment records.</td><td>Confirms whether the merchant funding record matches the calculated settlement amount.</td></tr><tr><td><strong>Dispute reconciliation</strong></td><td>Chargeback, representment, refund, fee correction and adjustment impact.</td><td>Confirms that post-transaction financial changes are reflected correctly.</td></tr></tbody></table></div>`],
    ['reconciliation-inputs','Typical reconciliation inputs',`<div class="grid"><div class="card"><h3>Transaction records</h3><p>Payment, refund, reversal and adjustment activity by merchant and terminal.</p></div><div class="card"><h3>Batch records</h3><p>Open and closed batch totals, transaction counts and cut-off information.</p></div><div class="card"><h3>Fee records</h3><p>Scheme fees, interchange, IC+, commission, markup and merchant pricing outputs.</p></div><div class="card"><h3>Settlement records</h3><p>Gross amount, deductions, net settlement and settlement cycle details.</p></div><div class="card"><h3>Payout records</h3><p>Funding, payout or merchant payment reference where applicable.</p></div><div class="card"><h3>Dispute records</h3><p>Chargeback, representment, refund and correction impacts.</p></div></div>`],
    ['reconciliation-outcome','Reconciliation outcomes',`<div class="table-wrap"><table><thead><tr><th>Outcome</th><th>Meaning</th><th>Typical next action</th></tr></thead><tbody><tr><td><strong>Matched</strong></td><td>Records align across transaction, batch, settlement, payout and report sources.</td><td>Proceed with finance reporting or merchant statement process.</td></tr><tr><td><strong>Difference identified</strong></td><td>A mismatch exists between one or more record sources.</td><td>Investigate missing transactions, fee differences, payout variance or timing difference.</td></tr><tr><td><strong>Timing difference</strong></td><td>Records are expected to align after the next file, cycle or report update.</td><td>Monitor until the next reconciliation cycle.</td></tr><tr><td><strong>Adjustment required</strong></td><td>A correction, fee adjustment, dispute impact or operational update must be reflected.</td><td>Create or review the adjustment according to the acquiring operations process.</td></tr></tbody></table></div>`]
  ]},
  'acquiring-reports-finance':{area:'Product Guides / Acquiring',label:'Reports and finance operations',eyebrow:'Operate Acquiring',title:'Reports and finance operations',subtitle:'Use acquiring reports to support merchant, operations, reconciliation and finance teams.',sections:[
    ['reports','Report areas',`<div class="grid"><div class="card"><h3>Transaction reports</h3><p>Operational transaction visibility by merchant, terminal, channel, amount and status.</p></div><div class="card"><h3>Batch reports</h3><p>Transaction grouping, batch totals, open or closed batch status and batch-level operational control.</p></div><div class="card"><h3>Settlement reports</h3><p>Finance outputs for settlement amounts, fees, deductions and merchant-level settlement context.</p></div><div class="card"><h3>Reconciliation reports</h3><p>Matching views across transaction, batch, fee, settlement, payout and report records.</p></div><div class="card"><h3>Payout / funding reports</h3><p>Funding timing, payout preparation, payout execution and merchant funding visibility.</p></div><div class="card"><h3>Dispute reports</h3><p>Chargeback, representment, dispute outcome and financial adjustment visibility.</p></div></div>`],
    ['report-catalog','Acquiring report catalog',`<p class="lead">A complete acquiring reporting model should typically cover the following report areas. Actual report names, availability and delivery format may differ by product configuration, region and customer model.</p><div class="table-wrap"><table><thead><tr><th>Report area</th><th>Primary users</th><th>What it answers</th></tr></thead><tbody><tr><td><strong>Transaction Report</strong></td><td>Operations, merchant support, finance</td><td>Which transactions were processed, approved, declined, refunded, voided, reversed or adjusted?</td></tr><tr><td><strong>Batch Report</strong></td><td>Operations, settlement team</td><td>Which transactions were grouped into each batch, what are the batch totals and what is the batch status?</td></tr><tr><td><strong>Settlement Report</strong></td><td>Finance, accounting, merchant operations</td><td>What amount was calculated for merchant settlement after fees, commissions, deductions and adjustments?</td></tr><tr><td><strong>Payout / Funding Report</strong></td><td>Finance, treasury, merchant operations</td><td>When and how was the merchant funded or prepared for funding?</td></tr><tr><td><strong>Fee / Commission Report</strong></td><td>Finance, pricing, commercial teams</td><td>Which scheme fees, interchange, IC+, acquirer markup, merchant pricing or commission values were applied?</td></tr><tr><td><strong>Reconciliation Report</strong></td><td>Finance, reconciliation, audit</td><td>Do transaction, batch, fee, settlement, payout and report records match across systems?</td></tr><tr><td><strong>Chargeback / Dispute Report</strong></td><td>Dispute operations, merchant support, finance</td><td>Which disputes, chargebacks, representments or financial adjustments affected the merchant?</td></tr></tbody></table></div>`],
    ['report-usage-flow','Report usage flow',`<p class="lead">Acquiring reports should follow the same financial control logic as the acquiring lifecycle: transaction activity is grouped, calculated, funded, reconciled and adjusted when exceptions occur.</p><div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Transaction activity</strong><p>Payment activity is reviewed by merchant, terminal, channel, amount, currency and status.</p></div><div class="flow-box"><strong>Batch Report</strong><p>Transactions are grouped by merchant, terminal or processing window for operational control.</p></div><div class="flow-box"><strong>Settlement Report</strong><p>Gross amounts, fees, commissions and deductions are calculated for merchant settlement.</p></div><div class="flow-box"><strong>Fee / Commission Report</strong><p>Commercial components such as scheme fees, interchange, IC+ and markup are reviewed.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box primary"><strong>Payout / Funding Report</strong><p>Finance teams review when and how calculated settlement amounts are funded or prepared for funding.</p></div><div class="flow-box"><strong>Reconciliation Report</strong><p>Transaction, batch, settlement, fee and payout records are matched for financial control.</p></div><div class="flow-box"><strong>Dispute / Adjustment Report</strong><p>Chargebacks, representments, corrections and operational adjustments are tracked.</p></div><div class="flow-box"><strong>Merchant reporting</strong><p>Merchant-facing and internal reporting views support operations, finance and support teams.</p></div></div></div>`],
    ['which-report','Which report should I use?',`<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>Recommended report areas</th></tr></thead><tbody><tr><td><strong>Merchant asks why they received a specific amount</strong></td><td>Settlement Report + Fee / Commission Report + Payout / Funding Report</td></tr><tr><td><strong>A transaction is missing from settlement</strong></td><td>Transaction Report + Batch Report + Reconciliation Report</td></tr><tr><td><strong>Finance wants to validate payout</strong></td><td>Settlement Report + Payout / Funding Report + Reconciliation Report</td></tr><tr><td><strong>Fee calculation is disputed</strong></td><td>Fee / Commission Report + Settlement Report</td></tr><tr><td><strong>A chargeback affected merchant balance</strong></td><td>Chargeback / Dispute Report + Settlement Report + Reconciliation Report</td></tr><tr><td><strong>Batch total does not match the expected amount</strong></td><td>Batch Report + Transaction Report + Reconciliation Report</td></tr><tr><td><strong>Operations needs to investigate an exception</strong></td><td>Transaction Report + Action History + Reconciliation Report where applicable</td></tr></tbody></table></div>`],
    ['reporting-boundary','Reporting boundary',`<div class="notice"><div class="callout-icon">i</div><div><strong>Guide-level report areas</strong><p>This guide describes the report areas a complete acquiring model should make available. Endpoint-level report names, filters, file formats, API response schemas and download methods belong in API Reference / Apidog or the operational reporting guide.</p></div></div>`]
  ]},
  'acquiring-pricing-commission':{area:'Product Guides / Acquiring',label:'Pricing and commission model',eyebrow:'Operate Acquiring',title:'Pricing and commission model',subtitle:'Explain how acquiring commercial rules affect merchant finance, settlement deductions, reporting and reconciliation.',sections:[
    ['pricing','Pricing components',`<p class="lead">Pricing and commission rules define how acquiring costs, commercial margin, merchant fees and settlement deductions are calculated and reported. The guide-level model should show how pricing affects merchant finance without replacing merchant agreements or API-level fee schemas.</p><div class="table-wrap"><table><thead><tr><th>Component</th><th>Business meaning</th></tr></thead><tbody><tr><td><strong>Merchant pricing</strong></td><td>The commercial model applied to the merchant relationship.</td></tr><tr><td><strong>Scheme fees</strong></td><td>Network-related fees where applicable.</td></tr><tr><td><strong>Interchange / IC+</strong></td><td>Cost or pass-through model used in interchange-plus pricing scenarios.</td></tr><tr><td><strong>Acquirer markup</strong></td><td>Commercial margin or acquiring service fee.</td></tr><tr><td><strong>Commission calculation</strong></td><td>Transaction-level or settlement-level fee calculation logic.</td></tr><tr><td><strong>Settlement deductions</strong></td><td>Fees or adjustments deducted from merchant settlement where applicable.</td></tr></tbody></table></div>`],
    ['pricing-model-examples','Pricing model examples',`<div class="table-wrap"><table><thead><tr><th>Pricing model</th><th>Meaning</th><th>Best used when</th></tr></thead><tbody><tr><td><strong>Blended pricing</strong></td><td>The merchant pays a single agreed commercial rate that may combine scheme, interchange and acquiring costs into one price.</td><td>Simpler merchant pricing and easier commercial communication are preferred.</td></tr><tr><td><strong>Interchange++ / IC+</strong></td><td>Interchange, scheme fees and acquirer markup are calculated or shown as separate components.</td><td>Transparent cost-plus pricing is required for enterprise merchants, PSPs or regulated commercial models.</td></tr><tr><td><strong>Fixed fee per transaction</strong></td><td>A fixed amount is charged for each eligible transaction or operation.</td><td>Low-value, high-volume or operational fee models need predictable per-transaction pricing.</td></tr><tr><td><strong>Percentage fee</strong></td><td>A percentage of the transaction amount is charged according to the merchant agreement.</td><td>Merchant pricing should scale with transaction value or volume.</td></tr><tr><td><strong>Scheme fee pass-through</strong></td><td>Scheme-related fees are passed through to the merchant according to the commercial model.</td><td>Merchant agreements require scheme cost visibility or pass-through treatment.</td></tr><tr><td><strong>Acquirer markup</strong></td><td>The acquirer applies its commercial margin on top of underlying costs.</td><td>Acquiring service revenue must be calculated separately from scheme or interchange costs.</td></tr><tr><td><strong>Refund fee treatment</strong></td><td>Refunds may have separate fee behavior depending on merchant agreement and pricing setup.</td><td>Refund-heavy merchants need clear commercial and reporting treatment.</td></tr><tr><td><strong>Chargeback fee treatment</strong></td><td>Chargebacks may create dispute fees, adjustments or settlement deductions.</td><td>Dispute operations must be visible in finance, settlement and reconciliation outputs.</td></tr></tbody></table></div>`],
    ['pricing-settlement-flow','How pricing affects settlement',`<p class="lead">Pricing should connect directly to settlement and reconciliation. A transaction may be approved at the payment layer, but the merchant finance outcome depends on commercial rules, fees, deductions and later adjustments.</p><div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Gross transaction amount</strong><p>The original accepted transaction amount before commercial deductions.</p></div><div class="flow-box"><strong>Refunds / reversals / adjustments</strong><p>Financial events that can reduce, reverse or correct the original transaction impact.</p></div><div class="flow-box"><strong>Scheme fees</strong><p>Network-related costs applied where relevant.</p></div><div class="flow-box"><strong>Interchange / IC+</strong><p>Interchange or interchange-plus cost components applied according to the model.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box"><strong>Acquirer markup</strong><p>Commercial margin or acquiring service fee.</p></div><div class="flow-box"><strong>Fixed / percentage merchant fee</strong><p>Merchant pricing rules applied at transaction or settlement level.</p></div><div class="flow-box"><strong>Chargeback or dispute fees</strong><p>Dispute-related fees or adjustments where applicable.</p></div><div class="flow-box primary"><strong>Net settlement amount</strong><p>The merchant-level financial amount after applicable deductions and adjustments.</p></div></div></div>`],
    ['settlement-view','Example settlement view',`<p class="lead">The exact calculation depends on merchant agreement and acquiring setup, but a guide-level settlement view can be represented as follows:</p><div class="table-wrap"><table><thead><tr><th>Settlement line</th><th>Business meaning</th></tr></thead><tbody><tr><td><strong>Gross transaction amount</strong></td><td>Total eligible transaction amount before deductions.</td></tr><tr><td><strong>Minus applicable scheme fees</strong></td><td>Scheme or network costs where applicable.</td></tr><tr><td><strong>Minus interchange or IC+ cost</strong></td><td>Interchange or cost-plus component where the pricing model requires it.</td></tr><tr><td><strong>Minus acquirer markup</strong></td><td>Commercial acquiring margin or service fee.</td></tr><tr><td><strong>Minus fixed or percentage merchant fee</strong></td><td>Merchant-specific fee model applied to the transaction or settlement period.</td></tr><tr><td><strong>Minus refund, chargeback or adjustment impact</strong></td><td>Post-transaction financial effects that reduce or adjust merchant settlement.</td></tr><tr><td><strong>Equals net settlement amount</strong></td><td>The amount prepared for merchant settlement, payout or funding according to the operating model.</td></tr></tbody></table></div>`],
    ['fee-treatment','Fee treatment examples',`<div class="table-wrap"><table><thead><tr><th>Event</th><th>Pricing impact</th></tr></thead><tbody><tr><td><strong>Approved sale</strong></td><td>Standard merchant pricing and commission rules may apply.</td></tr><tr><td><strong>Refund</strong></td><td>Refund fee behavior depends on merchant agreement, pricing configuration and settlement timing.</td></tr><tr><td><strong>Void</strong></td><td>Usually treated differently from refund because the payment may not have completed the same financial path.</td></tr><tr><td><strong>Chargeback</strong></td><td>May create dispute fees, adjustments or settlement deductions.</td></tr><tr><td><strong>Reversal / correction</strong></td><td>May reverse or adjust previous transaction, fee or settlement records.</td></tr><tr><td><strong>Cross-border transaction</strong></td><td>May trigger additional scheme, regional, FX or cross-border cost components where applicable.</td></tr><tr><td><strong>Multi-currency settlement</strong></td><td>May affect settlement currency, FX visibility and reconciliation outputs.</td></tr></tbody></table></div>`],
    ['pricing-boundary','Pricing boundary',`<div class="notice"><div class="callout-icon">i</div><div><strong>Guide-level pricing concepts</strong><p>Pricing examples are guide-level concepts. Actual fee calculation, merchant pricing configuration, settlement deductions, report fields and reconciliation outputs depend on the commercial agreement, acquiring setup, scheme rules and enabled Octra configuration.</p></div></div>`]
  ]},
  'acquiring-chargebacks-disputes':{area:'Product Guides / Acquiring',label:'Chargebacks and disputes',eyebrow:'Operate Acquiring',title:'Chargebacks and disputes',subtitle:'Manage dispute workflows and their financial impact on merchants.',sections:[['disputes','Dispute flow',`<div class="steps"><div class="step"><div class="num">1</div><div><h3>Dispute is raised</h3><p>The issuer or cardholder disputes a transaction through the relevant scheme or process.</p></div></div><div class="step"><div class="num">2</div><div><h3>Merchant response</h3><p>The merchant may provide evidence or accept the dispute depending on the workflow.</p></div></div><div class="step"><div class="num">3</div><div><h3>Representment or decision</h3><p>The acquiring process manages next actions and outcome tracking.</p></div></div><div class="step"><div class="num">4</div><div><h3>Financial adjustment</h3><p>The final outcome may affect settlement, reporting and reconciliation.</p></div></div></div>`]]},
  'acquiring-request-signing':{area:'Product Guides / Acquiring',label:'Request signing',eyebrow:'Build Your Integration',title:'Request signing',subtitle:'Secure acquiring requests using the assigned credential and signing model.',sections:[
    ['signing','Guidance',`<p class="lead">Use the credential and signing model assigned for the acquiring environment. The guide explains where signing fits in the flow; endpoint-level headers and signature fields should remain in the API reference.</p>`],
    ['boundary','Boundary',`<div class="notice"><div class="callout-icon">i</div><div><strong>Applies to every acquiring call</strong><p>Merchant, terminal, transaction, settlement and reconciliation requests all use the same assigned signing model. There is no separate signing method per operation.</p></div></div>`]
  ]},
  'acquiring-server-to-server':{area:'Product Guides / Acquiring',label:'Server-to-server integration',eyebrow:'Build Your Integration',title:'Server-to-server integration',subtitle:'Connect merchant and acquiring operations through backend API integration.',sections:[
    ['integration','Integration model',`<p class="lead">Server-to-server acquiring integration is used when the platform, PSP, acquirer or operational system needs to create, update, retrieve or operate merchant acquiring records through backend API calls. Octra Acquiring is integrated exclusively through server-to-server API calls; no client-side SDK is provided or required.</p>`],
    ['capabilities','What can be operated server-to-server',`<div class="table-wrap"><table><thead><tr><th>Area</th><th>Typical operation</th></tr></thead><tbody><tr><td>Merchant</td><td>Create, retrieve or update merchant profile records.</td></tr><tr><td>Terminal</td><td>Configure or retrieve MID/TID and terminal settings.</td></tr><tr><td>Transactions</td><td>Retrieve acquiring transaction and status context.</td></tr><tr><td>Settlement &amp; reconciliation</td><td>Retrieve settlement and reconciliation reports.</td></tr></tbody></table></div><p>Request and response schemas are documented in API Reference / Apidog.</p>`]
  ]},
  'acquiring-testing':{area:'Product Guides / Acquiring',label:'Testing',eyebrow:'Build Your Integration',title:'Testing',subtitle:'Validate acquiring setup, transaction, settlement and reconciliation behavior before production.',sections:[['testing','Recommended scenarios',`<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>What it validates</th></tr></thead><tbody><tr><td>Merchant onboarding</td><td>Merchant profile can be created or retrieved correctly.</td></tr><tr><td>Terminal setup</td><td>MID/TID or terminal identifiers are configured correctly.</td></tr><tr><td>Transaction processing</td><td>Transactions are associated with the correct merchant and terminal context.</td></tr><tr><td>Batch / clearing preparation</td><td>Grouped transaction records are ready for downstream processing.</td></tr><tr><td>Settlement report</td><td>Settlement output reflects transaction, fee and commission behavior.</td></tr><tr><td>Reconciliation</td><td>Transaction, batch, settlement and report records can be matched.</td></tr><tr><td>Chargeback / dispute</td><td>Dispute status and financial adjustment visibility are correct.</td></tr></tbody></table></div>`]]},
  'acquiring-result-codes':{area:'Product Guides / Acquiring',label:'Result codes',eyebrow:'Build Your Integration',title:'Result codes',subtitle:'Interpret acquiring operation responses and next actions consistently.',sections:[
    ['codes','Result code approach',`<p class="lead">Acquiring result codes should explain operation outcome and recommended next action for merchant, terminal, settlement, reconciliation and dispute workflows. Endpoint-level code lists belong in API Reference.</p>`],
    ['categories','Outcome categories',`<div class="table-wrap"><table><thead><tr><th>Category</th><th>Recommended action</th></tr></thead><tbody><tr><td><strong>Accepted / completed</strong></td><td>No action required; record continues through batch and settlement.</td></tr><tr><td><strong>Pending / under review</strong></td><td>Monitor status; may require operational follow-up before settlement.</td></tr><tr><td><strong>Rejected / failed</strong></td><td>Review configuration or transaction data; correct and resubmit if applicable.</td></tr><tr><td><strong>Adjusted</strong></td><td>Reflects a dispute, correction or reconciliation adjustment; check settlement impact.</td></tr></tbody></table></div>`]
  ]},
      'issuing-overview': { area: 'Product Guides / Issuing', label: 'Overview', eyebrow: 'Issuing', title: 'Launch and operate card programs with Octra Issuing', subtitle: 'Octra Issuing helps banks, fintechs and program managers configure card programs, register customers, issue cards, manage physical card production and operate the card lifecycle through Issuer APIs.', actions: [
        ['issuing-first-api-request', 'Start with first API request', 'primary'],
        ['issuing-card-products', 'Explore card products', '']
      ], sections: [
        ['what-is-octra-issuing', 'What is Octra Issuing?', `<p class="lead">Octra Issuing enables banks, fintechs, program managers and embedded finance platforms to launch and operate branded card programs across virtual, physical, prepaid, debit, credit and corporate spend use cases.</p><p>The platform brings together the core capabilities required to run an issuing program: program setup, customer registration, card issuance, physical card production, activation, PIN setup, limits, statements, renewals, transactions and operational reporting.</p><p>Before cards are issued, the required program parameters are configured in Octra, including card products, customer types, BINs, logos, limit profiles, statement profiles, interest rules and lifecycle rules. Once the setup is ready, developers use Issuer APIs to register customers, issue cards and manage card operations.</p>`],
        ['who-uses-issuing', 'Who uses Issuing?', `<p class="lead">Octra Issuing is designed for organizations that need to launch, operate or modernize card programs through a configuration-first issuing platform.</p><div class="table-wrap"><table><thead><tr><th>User / customer type</th><th>Issuing need</th></tr></thead><tbody><tr><td><strong>Banks</strong></td><td>Launch or modernize issuer-side card program infrastructure.</td></tr><tr><td><strong>Fintechs and EMIs</strong></td><td>Offer debit, prepaid, credit or virtual card programs as part of digital financial products.</td></tr><tr><td><strong>Program managers</strong></td><td>Operate branded card portfolios across customer segments, products and lifecycle rules.</td></tr><tr><td><strong>Corporate spend platforms</strong></td><td>Issue employee, procurement or business cards with controls, limits and reporting.</td></tr><tr><td><strong>Embedded finance platforms</strong></td><td>Add card issuing into customer journeys, wallets, marketplaces or business platforms.</td></tr></tbody></table></div>`],
        ['issuing-key-benefits', 'Key benefits', `<p class="lead">Octra Issuing helps customers launch and operate card programs by combining program configuration, customer registration, card issuance, physical card production and lifecycle operations.</p><div class="grid"><div class="card"><h3>Launch branded card programs</h3><p>Configure the issuing program foundation before customers and cards are created.</p></div><div class="card"><h3>Support virtual and physical cards</h3><p>Issue cards for instant digital usage, physical fulfillment or hybrid program models.</p></div><div class="card"><h3>Use predefined program rules</h3><p>Reference configured products, BINs, limits, statements, interest and lifecycle rules during runtime API calls.</p></div><div class="card"><h3>Register customers and issue cards</h3><p>Use Issuer APIs to register KYC-completed customers and create cards under the selected product model.</p></div><div class="card"><h3>Operate physical card fulfillment</h3><p>Support card production, personalization, delivery, activation and PIN setup for physical card programs.</p></div><div class="card"><h3>Manage secure card operations</h3><p>Operate controls, limits, transactions, statements, reports, PIN, CVV2 and 3DS password flows.</p></div></div>`],
        ['card-program-operating-model', 'Card program operating model', `<p class="lead">A card program is not only a customer and card creation flow. It starts with configured program rules, continues through customer registration and card issuance, and becomes operational through activation, authorization behavior, controls, reporting and lifecycle management.</p>${issuingProgramOperatingModelDiagram()}<div class="notice"><div class="callout-icon">→</div><div><strong>Configuration comes first.</strong><p>The operating model shows why products, BINs, limits, statements, interest rules, production rules and lifecycle settings must be configured before runtime customer and card APIs are used.</p></div></div>`],
        ['how-the-flow-works', 'How the issuing flow works', `<div class="steps"><div class="step"><div class="num">1</div><div><h3>Configure the card program</h3><p>Define products, customer types, BINs, logos, limits, statements and lifecycle rules.</p></div></div><div class="step"><div class="num">2</div><div><h3>Register the customer</h3><p>Use <code class="inline-code">CreateCustomer</code> to register a KYC-completed customer in Octra Issuing.</p></div></div><div class="step"><div class="num">3</div><div><h3>Issue the card</h3><p>Use <code class="inline-code">CreateCard</code> to issue a card based on predefined card product and program parameters.</p></div></div><div class="step"><div class="num">4</div><div><h3>Trigger physical card production</h3><p>For physical cards, production data is generated and shared with the card production provider.</p></div></div><div class="step"><div class="num">5</div><div><h3>Deliver and activate the card</h3><p>The card is delivered to the customer, then activated and secured with PIN setup.</p></div></div><div class="step"><div class="num">6</div><div><h3>Operate the card lifecycle</h3><p>Manage status, limits, renewals, supplementary cards, statements, interest, transactions and reports.</p></div></div></div>`],
        ['before-you-start', 'Before you start', `<p class="lead">Before using the Issuer APIs, make sure that:</p><div class="table-wrap"><table><thead><tr><th>Requirement</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Issuing program is configured</strong></td><td>Products, customer types, BINs, logos, limit profiles, statement profiles and lifecycle parameters must be ready before runtime API calls.</td></tr><tr><td><strong>Required product and customer values are available</strong></td><td>The API flow uses predefined values. It does not create product types, customer types, BINs or profiles during customer or card creation.</td></tr><tr><td><strong>Test environment and API token are assigned</strong></td><td>Developers need assigned credentials and the correct Issuer API base URL before sending requests.</td></tr><tr><td><strong>Upstream onboarding and KYC are completed</strong></td><td><code class="inline-code">CreateCustomer</code> registers an eligible customer. It does not perform customer onboarding or KYC.</td></tr><tr><td><strong>Card package, product and funding model are known</strong></td><td>The selected package and product determine how the card behaves after issuance.</td></tr></tbody></table></div>`],
        ['recommended-path', 'Recommended path', `<div class="steps"><button class="step" data-page="issuing-first-api-request" style="width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">1</div><div><h3>First API request</h3><p>Verify API access and retrieve configured program values.</p></div></button><button class="step" data-page="issuing-create-cardholder" style="width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">2</div><div><h3>Create a customer</h3><p>Register a KYC-completed customer in Octra Issuing.</p></div></button><button class="step" data-page="issuing-issue-card" style="width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">3</div><div><h3>Issue a card</h3><p>Create a card for the registered customer.</p></div></button><button class="step" data-page="issuing-simulate-transaction" style="width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">4</div><div><h3>Simulate a transaction</h3><p>Validate authorization, limits, status and control behavior.</p></div></button><button class="step" data-page="issuing-card-products" style="width:100%;text-align:left;background:#fff;border:0;cursor:pointer"><div class="num">5</div><div><h3>Build your program</h3><p>Review card products, funding model, card design, shipping and compliance topics.</p></div></button></div>`]
      ]},
      'issuing-first-api-request': { area: 'Product Guides / Issuing', label: 'First API request', eyebrow: 'Start Issuing', title: 'Send your first Issuer API request', subtitle: 'Use a safe lookup request to confirm your token, environment and configured program values before creating customers or cards.', actions: [
        ['issuing-create-cardholder', 'Next: Create a customer', 'primary'],
        ['issuing-card-products', 'Review program configuration', '']
      ], sections: [
        ['why-this-step-exists', 'Why this step exists', `<p class="lead">Before building customer or card logic, confirm that your assigned test credentials can reach the Issuer API host and retrieve configured program values. This page is a technical access step, not the business start of the issuing lifecycle.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Do not start with Card Status here.</strong><p>Card status is an operational API used after a card exists. For the first request, use a read-oriented lookup call that validates connectivity and shows the configured values your runtime APIs will reference.</p></div></div>`],
        ['request-summary', 'Request summary', `<div class="table-wrap"><table><thead><tr><th>Item</th><th>Value</th></tr></thead><tbody><tr><td><strong>API area</strong></td><td>Issuer / Integration common</td></tr><tr><td><strong>Purpose</strong></td><td>Validate connectivity and retrieve configured lookup values.</td></tr><tr><td><strong>Example lookup</strong></td><td><code class="inline-code">PRM_CRD_PRODUCT</code></td></tr><tr><td><strong>Auth header</strong></td><td><code class="inline-code">token</code></td></tr></tbody></table></div>`],
        ['try-it', 'Try it', `<div class="code-card"><div class="code-head"><span class="dots"><span></span><span></span><span></span></span><span>cURL</span></div><pre><code>curl --location 'https://hilarionapi.corpayss.net/api/IntegrationCommon/GetLookupTable?model.tableName=PRM_CRD_PRODUCT' \\
  --header 'token: &lt;ACCESS_TOKEN&gt;'</code></pre></div><div class="notice"><div class="callout-icon">✓</div><div><strong>What a healthy response means</strong><p>A successful response confirms that the token and host are working and that configured product values can be retrieved. After this, continue with the first real business step: registering a customer.</p></div></div>`],
        ['business-flow-starts-next', 'Business flow starts next', `<p class="lead">The first business API in the issuing lifecycle is still <code class="inline-code">CreateCustomer</code>. It registers a KYC-completed customer in Octra Issuing by using predefined customer and program parameters.</p><div class="steps"><button class="step" data-page="issuing-create-cardholder" style="width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--border);cursor:pointer"><div class="num">1</div><div><h3>Create a customer</h3><p>Register a KYC-completed customer in Octra Issuing with CreateCustomer.</p></div></button><button class="step" data-page="issuing-issue-card" style="width:100%;text-align:left;background:#fff;border:0;cursor:pointer"><div class="num">2</div><div><h3>Issue a card</h3><p>Create the card using the predefined product, BIN, funding, limit and lifecycle parameters.</p></div></button></div>`]
      ]},
      'issuing-create-cardholder': { area: 'Product Guides / Issuing', label: 'Create a customer', eyebrow: 'Start Issuing', title: 'Register a customer with CreateCustomer', subtitle: 'Register a KYC-completed banking customer in Octra Issuing before issuing a card.', actions: [
        ['https://docs.corpayss.com/create-customer-13104309e0', 'Open CreateCustomer in Apidog', 'primary'],
        ['issuing-issue-card', 'Next: Issue a card', '']
      ], sections: [
        ['purpose', 'Purpose', `<p class="lead"><code class="inline-code">CreateCustomer</code> is the bridge between the upstream banking or onboarding system and Octra Issuing. It registers an already verified customer as a customer/cardholder record so that a card can be issued.</p><div class="notice"><div class="callout-icon">i</div><div><strong>Business boundary</strong><p>CreateCustomer does not perform customer onboarding, KYC, product setup, BIN setup, limit profile creation or card creation. Those items exist before or after this API depending on the business flow.</p></div></div>`],
        ['what-it-creates', 'What this API creates', `<div class="table-wrap"><table><thead><tr><th>Creates</th><th>Does not create</th></tr></thead><tbody><tr><td>Customer/cardholder profile in Octra Issuing</td><td>Banking customer in the core banking system</td></tr><tr><td>Issuer customer reference linked to <code>CustomerNo</code></td><td>KYC decision or onboarding workflow</td></tr><tr><td>Customer identity, address and contact profile</td><td>Card, transaction or physical production request</td></tr><tr><td>Customer classification using predefined values</td><td>Customer type, product type, BIN, logo or statement profile definitions</td></tr><tr><td>Customer-level risk, limit or allocation data where applicable</td><td>Card-level controls or card lifecycle state</td></tr></tbody></table></div>`],
        ['predefined-values', 'Predefined values used by CreateCustomer', `<p>The request may include business classification fields such as <code class="inline-code">CustomerType</code>, <code class="inline-code">CustomerGroup</code>, <code class="inline-code">SBUType</code>, <code class="inline-code">BankingCustomerType</code>, <code class="inline-code">MainBranch</code>, <code class="inline-code">Limit</code> and <code class="inline-code">LimitCurrency</code>. These values should not be explained as free-form fields created by the API. They are predefined program or banking parameters used to classify the customer correctly.</p><div class="table-wrap"><table><thead><tr><th>Field group</th><th>Examples</th><th>Business meaning</th></tr></thead><tbody><tr><td><strong>Customer reference</strong></td><td><code>CustomerNo</code></td><td>Links the upstream banking customer to the issuer platform.</td></tr><tr><td><strong>Customer classification</strong></td><td><code>CustomerType</code>, <code>CustomerGroup</code>, <code>SBUType</code></td><td>Places the customer into the correct predefined segment, business unit or group.</td></tr><tr><td><strong>Identity profile</strong></td><td>Name, surname, birth date, nationality, identity or passport fields</td><td>Represents the KYC-completed identity profile from upstream systems.</td></tr><tr><td><strong>Address and contact</strong></td><td>Home/work address, email, phone, communication language</td><td>Supports cardholder records, communication and physical card operations.</td></tr><tr><td><strong>Limit and allocation</strong></td><td><code>Limit</code>, <code>LimitCurrency</code>, <code>AllocationDate</code></td><td>Supports customer-level limit or allocation context where applicable.</td></tr></tbody></table></div>`],
        ['when-to-call', 'When to call CreateCustomer', `<ul><li>The customer already exists in the upstream banking, wallet, fintech or onboarding system.</li><li>KYC and eligibility checks have been completed outside Octra Issuing.</li><li>The relevant customer types, groups and program parameters are already configured.</li><li>A card needs to be issued for that customer through Octra Issuing.</li></ul>`],
        ['what-happens-next', 'What happens next', `<p>After the customer is created successfully, use the relevant card creation flow to issue a card. The card will use predefined product, BIN, logo, funding, limit, statement, interest and lifecycle rules according to the selected program setup.</p>`]
      ]},
      'issuing-issue-card': { area: 'Product Guides / Issuing', label: 'Issue a card', eyebrow: 'Start Issuing', title: 'Issue a card with predefined product rules', subtitle: 'Create a card for an existing customer using the configured card product, BIN, funding, limit and lifecycle parameters.', actions: [
        ['issuing-simulate-transaction', 'Next: Simulate a transaction', 'primary'],
        ['issuing-card-design-shipping', 'Physical cards: design and shipping', '']
      ], sections: [
        ['purpose', 'Purpose', `<p class="lead">Card creation is the step where a registered customer becomes able to receive or use a payment card. The API creates the card record, but the behavior of that card comes from predefined program configuration.</p>`],
        ['prerequisites', 'Prerequisites', `<div class="table-wrap"><table><thead><tr><th>Required before card creation</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Customer exists</strong></td><td>The card must be linked to a customer/cardholder created through CreateCustomer.</td></tr><tr><td><strong>Card product exists</strong></td><td>The product defines the card type, behavior, allowed lifecycle actions and default rules.</td></tr><tr><td><strong>BIN and logo are configured</strong></td><td>Physical or branded card programs require BIN and branding configuration.</td></tr><tr><td><strong>Limit and funding rules are configured</strong></td><td>The card must follow the correct prepaid, debit, credit or account-linked behavior.</td></tr><tr><td><strong>Statement or interest profiles are configured where applicable</strong></td><td>Credit card programs may require statement profile, due date and interest behavior before cards are issued.</td></tr></tbody></table></div>`],
        ['what-createcard-does', 'What CreateCard does', `<div class="notice"><div class="callout-icon">→</div><div><strong>CreateCard uses configuration; it does not define configuration.</strong><p>The card creation flow references predefined card product, product type, card type, BIN, logo, limit, funding, statement and lifecycle rules. The API creates a card instance for the customer based on these rules.</p></div></div>`],
        ['card-types', 'Card types and scenarios', `<div class="grid"><div class="card"><h3>Virtual card</h3><p>Issued for immediate digital usage without physical production.</p></div><div class="card"><h3>Physical card</h3><p>Requires card production, personalization and delivery after card creation.</p></div><div class="card"><h3>Supplementary card</h3><p>Issued as an additional card linked to a primary customer, account or card relationship where supported.</p></div><div class="card"><h3>Renewal card</h3><p>Created as part of lifecycle management when an existing card approaches expiry or must be replaced.</p></div></div>`],
        ['next-step', 'Next step for physical cards', `<p>If the card is physical, continue with card production and fulfillment. A created card is not the same as a printed and shipped card.</p>`]
      ]},
      'issuing-simulate-transaction': { area: 'Product Guides / Issuing', label: 'Simulate a transaction', eyebrow: 'Start Issuing', title: 'Simulate a transaction', subtitle: 'Validate issuer authorization behavior before production by testing approval, decline, control and security scenarios.', actions: [
        ['issuing-authorization-behavior', 'Understand authorization behavior', 'primary'],
        ['issuing-controls-limits', 'Review controls and limits', '']
      ], sections: [
        ['purpose', 'Purpose', `<p class="lead">Simulation helps product, operations and integration teams validate how an issued card behaves at authorization time before production traffic starts. It should confirm that card status, funding, limits, merchant category controls, channel controls, security checks and configured program rules produce the expected approve or decline outcome.</p><div class="notice"><div class="callout-icon">→</div><div><strong>Simulation validates configuration.</strong><p>A successful simulation does not only prove that the card exists. It proves that the configured card product, customer setup, limits, funding model and control rules work together during authorization.</p></div></div>`],
        ['simulation', 'Recommended simulations', `<div class="table-wrap"><table><thead><tr><th>Scenario</th><th>Business question answered</th><th>Expected validation</th></tr></thead><tbody><tr><td><strong>Approved transaction</strong></td><td>Can the issued card authorize successfully?</td><td>Card is active, funding is available and all controls allow the transaction.</td></tr><tr><td><strong>Inactive or blocked card</strong></td><td>Does card status prevent authorization?</td><td>Inactive, blocked, closed or restricted cards should not authorize.</td></tr><tr><td><strong>Insufficient balance or funding</strong></td><td>Does authorization evaluate available balance or funding correctly?</td><td>Debit or prepaid cards decline when available funds are not sufficient.</td></tr><tr><td><strong>Credit or card limit exceeded</strong></td><td>Do customer, card and transaction limits work as expected?</td><td>The transaction is declined or restricted when the relevant limit is exceeded.</td></tr><tr><td><strong>MCC not allowed</strong></td><td>Do merchant category controls block restricted spend?</td><td>The transaction is declined when the merchant category is not permitted.</td></tr><tr><td><strong>Unsupported channel</strong></td><td>Do channel controls block ATM, POS, e-commerce, wallet or no-PIN usage?</td><td>The transaction is declined when the selected channel is not enabled.</td></tr><tr><td><strong>PIN, CVV2 or 3DS requirement</strong></td><td>Are security requirements evaluated correctly?</td><td>The transaction follows the configured PIN, CVV2 or 3DS behavior.</td></tr><tr><td><strong>Velocity or frequency limit</strong></td><td>Do daily, monthly, count-based or pattern-based controls work?</td><td>The transaction is declined or flagged when velocity limits are exceeded.</td></tr></tbody></table></div>`],
        ['result-interpretation', 'Simulation result interpretation', `<div class="table-wrap"><table><thead><tr><th>Result category</th><th>What it means</th><th>Recommended action</th></tr></thead><tbody><tr><td><strong>Approved</strong></td><td>The card, funding and control setup allowed the transaction.</td><td>Continue with additional positive and negative test cases.</td></tr><tr><td><strong>Declined by status</strong></td><td>The card or customer status blocked authorization.</td><td>Review activation, block, closure or lifecycle state.</td></tr><tr><td><strong>Declined by funding or limit</strong></td><td>Balance, credit limit, customer limit or transaction limit was not sufficient.</td><td>Review funding model and configured limit profile.</td></tr><tr><td><strong>Declined by controls</strong></td><td>MCC, channel, region or velocity controls prevented usage.</td><td>Review card product and control configuration.</td></tr><tr><td><strong>Declined by security check</strong></td><td>PIN, CVV2, 3DS or other required verification failed or was missing.</td><td>Review security operation setup and test data.</td></tr></tbody></table></div>`],
        ['boundary', 'Guide-level boundary', `<div class="notice"><div class="callout-icon">i</div><div><strong>Keep payload details in API Reference.</strong><p>This guide explains what to validate and why. Exact simulation request fields, authorization message values, response codes and test payloads should remain in API Reference / Apidog.</p></div></div>`]
      ]},

      'issuing-authorization-behavior': { area: 'Product Guides / Issuing', label: 'Authorization behavior', eyebrow: 'Understand Card Programs', title: 'Authorization behavior', subtitle: 'Understand how Octra Issuing evaluates a card transaction at authorization time.', sections: [
        ['purpose', 'Purpose', `<p class="lead">Authorization behavior explains how an issuer-side card transaction is evaluated before it is approved or declined. The decision should reflect the configured card program, customer and card status, funding model, limits, controls, security checks and transaction context.</p><p>This page helps integrators and product teams understand what must be configured and tested before production card usage begins.</p>`],
        ['decision-flow', 'Authorization decision flow', `<div class="flow-diagram"><div class="flow-row"><div class="flow-box"><strong>Transaction request</strong><p>A card transaction is received with amount, currency, merchant, channel and security context.</p></div><div class="flow-box"><strong>Card and customer status</strong><p>The issuer checks whether the customer and card are active, valid and allowed to transact.</p></div><div class="flow-box"><strong>Funding and balance</strong><p>The system evaluates available balance, prepaid funds, account funds or credit limit according to the product model.</p></div><div class="flow-box"><strong>Limits and controls</strong><p>Customer, card, transaction, MCC, channel, region and velocity controls are evaluated.</p></div></div><div class="flow-down">↓</div><div class="flow-row"><div class="flow-box"><strong>Security checks</strong><p>PIN, CVV2, 3DS password or other configured security requirements are validated where applicable.</p></div><div class="flow-box primary"><strong>Authorization decision</strong><p>The transaction is approved, declined or routed to the relevant operational response.</p></div><div class="flow-box"><strong>Balance and limit impact</strong><p>Approved transactions affect available balance, exposure, limit usage or transaction history according to the product model.</p></div><div class="flow-box"><strong>Reporting and investigation</strong><p>The result becomes visible for transaction history, reports, support and operational review.</p></div></div></div>`],
        ['decision-checks', 'Authorization decision checks', `<div class="table-wrap"><table><thead><tr><th>Check</th><th>Business question</th><th>Typical impact</th></tr></thead><tbody><tr><td><strong>Customer and card status</strong></td><td>Is the customer/card active and allowed to transact?</td><td>Blocked, inactive, closed or restricted cards should decline.</td></tr><tr><td><strong>Funding / balance</strong></td><td>Are sufficient funds or credit available?</td><td>Insufficient balance or credit can decline the transaction.</td></tr><tr><td><strong>Customer, card and transaction limits</strong></td><td>Does the transaction fit configured limits?</td><td>Limit breach can decline or restrict the transaction.</td></tr><tr><td><strong>MCC controls</strong></td><td>Is this merchant category allowed?</td><td>Restricted merchant categories can decline.</td></tr><tr><td><strong>Channel controls</strong></td><td>Is ATM, POS, e-commerce, wallet or no-PIN usage allowed?</td><td>Unsupported channels can decline.</td></tr><tr><td><strong>Security requirements</strong></td><td>Are PIN, CVV2, 3DS or other checks satisfied?</td><td>Missing or failed verification can stop authorization.</td></tr><tr><td><strong>Velocity and frequency rules</strong></td><td>Does usage pattern fit daily, monthly or count-based controls?</td><td>Velocity breach can decline or trigger review.</td></tr><tr><td><strong>Program and product rules</strong></td><td>Does the card product allow this transaction type?</td><td>Product-level restrictions can decline unsupported behavior.</td></tr></tbody></table></div>`],
        ['approval-decline-model', 'Approval and decline model', `<div class="grid"><div class="card"><h3>Approved</h3><p>The card is active, funding is available, controls allow the transaction and required security checks pass.</p></div><div class="card"><h3>Declined by status</h3><p>The customer or card lifecycle state prevents usage.</p></div><div class="card"><h3>Declined by funding</h3><p>Balance, available funds, credit line or limit usage is not sufficient.</p></div><div class="card"><h3>Declined by controls</h3><p>MCC, channel, region, transaction type or velocity controls block the transaction.</p></div><div class="card"><h3>Declined by security</h3><p>PIN, CVV2, 3DS or other configured verification requirements fail or are not completed.</p></div><div class="card"><h3>Operational review</h3><p>Some outcomes may require support, risk, compliance or operations review depending on the program setup.</p></div></div>`],
        ['simulation-link', 'Use simulation to validate behavior', `<p class="lead">Before production, use transaction simulation to validate positive and negative authorization cases. Simulation should prove that the configured card product, funding model, limit profiles, controls and security requirements produce the expected authorization outcome.</p><p><button type="button" class="btn primary" data-page="issuing-simulate-transaction">Open simulation scenarios</button></p>`],
        ['boundary', 'Boundary', `<div class="notice"><div class="callout-icon">i</div><div><strong>Authorization behavior is configuration-driven.</strong><p>Exact authorization rules, message fields, response codes and payload examples depend on the configured card program and should be documented in API Reference / Apidog. This guide explains the business decision model and testing strategy.</p></div></div>`]
      ]},

      'issuing-how-it-works': { area: 'Product Guides / Issuing', label: 'How issuing works', eyebrow: 'Understand Card Programs', title: 'How issuing works', subtitle: 'Understand the difference between program configuration, runtime API calls, physical production and lifecycle operations.', sections: [
        ['operating-model', 'Card program operating model', `<p class="lead">Octra Issuing should be read as an end-to-end card program operating model: configuration defines the program, runtime APIs create customers and cards, production and security flows make cards usable, and lifecycle operations keep the program controlled after launch.</p>${issuingProgramOperatingModelDiagram()}`],
        ['operating-model-decisions', 'Operating model decisions', `<div class="table-wrap"><table><thead><tr><th>Decision area</th><th>What must be decided</th><th>Why it matters</th></tr></thead><tbody><tr><td><strong>Program configuration</strong></td><td>Products, card types, customer types, BINs, logos, limits, statements, interest and lifecycle rules.</td><td>Runtime APIs reference predefined values rather than creating product definitions during customer or card creation.</td></tr><tr><td><strong>Card format</strong></td><td>Virtual, physical, supplementary, renewal or hybrid program behavior.</td><td>Determines whether production, delivery, activation and PIN setup are required.</td></tr><tr><td><strong>Funding model</strong></td><td>Prepaid, debit, credit or corporate spend behavior.</td><td>Determines balance, limit, authorization and statement behavior.</td></tr><tr><td><strong>Authorization behavior</strong></td><td>Status, balance, limits, MCC, channel and security checks.</td><td>Determines how card transactions are approved, declined or investigated.</td></tr><tr><td><strong>Lifecycle operations</strong></td><td>Activation, blocking, renewal, replacement, closure, reports and secure operations.</td><td>Determines how the card program is operated after issuance.</td></tr></tbody></table></div>`],
        ['layers', 'Four operating layers', `<div class="table-wrap"><table><thead><tr><th>Layer</th><th>Business meaning</th><th>Examples</th></tr></thead><tbody><tr><td><strong>1. Configuration layer</strong></td><td>Defines how the card program behaves before APIs are used.</td><td>Card types, product types, customer types, BIN, logo, statement profiles, limit profiles, interest profiles.</td></tr><tr><td><strong>2. Runtime API layer</strong></td><td>Creates operational customer and card records using the configured values.</td><td>CreateCustomer, CreateCard, supplementary card, card renewal request.</td></tr><tr><td><strong>3. Production and fulfillment layer</strong></td><td>Handles physical card printing, personalization data and shipping.</td><td>Single print request, batch upload, production file, card bureau handoff, delivery.</td></tr><tr><td><strong>4. Lifecycle operations layer</strong></td><td>Operates the card after it exists.</td><td>Activation, PIN, status, limits, statements, interest, transactions, reports.</td></tr></tbody></table></div>`],
        ['why-it-matters', 'Why this matters', `<p class="lead">This structure prevents the documentation from looking like a simple API list. It shows that Octra supports a broader enterprise issuing model: configure the program, register the customer, issue the card, produce physical cards when needed and operate the lifecycle.</p>`]
      ]},
      'issuing-object-model': { area: 'Product Guides / Issuing', label: 'Cardholder, card and product', eyebrow: 'Understand Card Programs', title: 'Cardholder, card and product', subtitle: 'Understand the main business objects used by Octra Issuing.', sections: [
        ['objects', 'Core objects', `<div class="table-wrap"><table><thead><tr><th>Object</th><th>Meaning</th><th>How it is used</th></tr></thead><tbody><tr><td><strong>Program configuration</strong></td><td>The predefined setup that controls the card program.</td><td>Created before runtime API usage.</td></tr><tr><td><strong>Customer / Cardholder</strong></td><td>The KYC-completed person or business that owns one or more cards.</td><td>Registered through CreateCustomer.</td></tr><tr><td><strong>Card product</strong></td><td>The product definition that controls card type, behavior, limits, statement and lifecycle rules.</td><td>Referenced during card creation.</td></tr><tr><td><strong>Card</strong></td><td>The payment instrument issued to the customer.</td><td>Created through card issuance APIs.</td></tr><tr><td><strong>Production request</strong></td><td>The operational request to print and personalize a physical card.</td><td>Used for physical card programs.</td></tr><tr><td><strong>Transaction</strong></td><td>The authorization, posting, reversal, adjustment or activity generated by card usage.</td><td>Managed under balances and transactions.</td></tr></tbody></table></div>`],
        ['relationship', 'Relationship', `<p>The customer does not define the card product. The card does not define the program. Program configuration comes first, then the customer is registered, then the card is issued and operated.</p>`]
      ]},
      'issuing-virtual-physical': { area: 'Product Guides / Issuing', label: 'Virtual vs physical cards', eyebrow: 'Understand Card Programs', title: 'Virtual vs physical cards', subtitle: 'Choose the right card format for your use case.', sections: [['comparison', 'Comparison', `<div class="table-wrap"><table><thead><tr><th>Card type</th><th>Best for</th><th>Operational impact</th></tr></thead><tbody><tr><td><strong>Virtual</strong></td><td>Instant, online, app-based use cases</td><td>No physical production; secure display rules apply.</td></tr><tr><td><strong>Physical</strong></td><td>In-store, ATM, hybrid use cases</td><td>Requires design, production, shipping, activation and PIN handling.</td></tr></tbody></table></div>`]]},
      'issuing-credit-debit-prepaid': { area: 'Product Guides / Issuing', label: 'Credit, debit and prepaid', eyebrow: 'Understand Card Programs', title: 'Credit, debit and prepaid models', subtitle: 'Understand how spending is funded and controlled.', sections: [['models', 'Funding behavior', `<div class="table-wrap"><table><thead><tr><th>Model</th><th>How it works</th></tr></thead><tbody><tr><td><strong>Credit</strong></td><td>Spending is controlled by assigned credit limits and authorization rules.</td></tr><tr><td><strong>Debit</strong></td><td>Spending is checked against available account or balance-linked funds.</td></tr><tr><td><strong>Prepaid</strong></td><td>Funds are loaded before the card can be used.</td></tr></tbody></table></div>`]]},
      'issuing-card-glossary': { area: 'Product Guides / Issuing', label: 'Card glossary', eyebrow: 'Understand Card Programs', title: 'Card glossary', subtitle: 'Plain-English definitions for card issuing terms.', sections: [['glossary', 'Terms', `<div class="table-wrap"><table><thead><tr><th>Term</th><th>Meaning</th></tr></thead><tbody><tr><td><strong>BIN</strong></td><td>Bank Identification Number used to identify the issuing range.</td></tr><tr><td><strong>PAN</strong></td><td>Primary Account Number printed or assigned to the card.</td></tr><tr><td><strong>MCC</strong></td><td>Merchant Category Code used for merchant restrictions.</td></tr><tr><td><strong>CVV2</strong></td><td>Card verification value used for card-not-present checks.</td></tr><tr><td><strong>CAVV / ECI</strong></td><td>3D Secure authentication values used in e-commerce authorization.</td></tr></tbody></table></div>`]]},
      'issuing-package-overview': { area: 'Product Guides / Issuing', label: 'Package overview', eyebrow: 'Issuing Packages', title: 'Issuing Packages', subtitle: 'Octra does not sell its own cards. It provides issuing packages that help customers launch their own branded card programs after upstream onboarding and KYC are completed.', sections: [['packages', 'Package overview', `<div class="table-wrap package-table"><table><thead><tr><th>Package</th><th>Best for</th><th>Core capabilities</th></tr></thead><tbody><tr><td><strong>Instant Virtual Card Program</strong></td><td>Digital-first, online, embedded finance</td><td>Customer/cardholder, virtual card, controls, transaction simulation</td></tr><tr><td><strong>Physical Card Program</strong></td><td>Plastic card, in-store, ATM, hybrid use cases</td><td>Design, production, activation, status, PIN</td></tr><tr><td><strong>Prepaid Card Program</strong></td><td>Payroll, wallet, gift, expense</td><td>Load balance, transfer, spending limits</td></tr><tr><td><strong>Debit Card Program</strong></td><td>Account or balance-linked cards</td><td>Available balance, authorization, transaction history</td></tr><tr><td><strong>Credit Card Program</strong></td><td>Limit-based programs</td><td>Credit limit, authorization, controls</td></tr><tr><td><strong>Corporate Spend Program</strong></td><td>Employee cards, travel, procurement</td><td>MCC, channel, spend controls</td></tr><tr><td><strong>Secure Card Operations</strong></td><td>PCI-sensitive flows</td><td>PAN/token, PIN, CVV2, 3DS password</td></tr></tbody></table></div>`]]},
      'issuing-choose-package': { area: 'Product Guides / Issuing', label: 'Choose the right issuing package', eyebrow: 'Issuing Packages', title: 'Choose the right issuing package', subtitle: 'Use the package decision guide to map your business use case to the right capabilities.', sections: [['decision', 'Decision guide', `<div class="mini-grid"><div class="card"><h3>Need instant online cards?</h3><p>Start with the Instant Virtual Card Program.</p></div><div class="card"><h3>Need plastic cards?</h3><p>Start with the Physical Card Program and card design/shipping guide.</p></div><div class="card"><h3>Need loaded value?</h3><p>Start with the Prepaid Card Program.</p></div><div class="card"><h3>Need employee spend controls?</h3><p>Start with the Corporate Spend Program.</p></div></div>`]]},
      'issuing-card-products': { area: 'Product Guides / Issuing', label: 'Card products', eyebrow: 'Build Your Program', title: 'Card products and program definitions', subtitle: 'A card product is the configuration bundle a card is issued against. It is set up before runtime APIs and referenced when customers and cards are created.', sections: [
